// trees_lz: 800×192, each tree ~64px wide, 90px tall at top row (y=0-95)
// Tree A (pine): x=0  Tree B (oak): x=66

  // Right forest area
  {tx:0, oy:0, sh:90, dx:220,dy:20, dw:32,dh:45},
  {tx:0, oy:0, sh:90, dx:254,dy:14, dw:32,dh:45},
  {tx:66,oy:0, sh:90, dx:288,dy:18, dw:32,dh:45},
  {tx:0, oy:0, sh:90, dx:318,dy:12, dw:30,dh:42},
  {tx:66,oy:0, sh:90, dx:346,dy:16, dw:30,dh:42},
  // Below main forest
  {tx:0, oy:0, sh:90, dx:230,dy:62, dw:28,dh:38},
  {tx:66,oy:0, sh:90, dx:260,dy:58, dw:32,dh:45},
  {tx:0, oy:0, sh:90, dx:296,dy:54, dw:28,dh:38},
  {tx:66,oy:0, sh:90, dx:328,dy:60, dw:32,dh:45},
  // Scattered right
  {tx:66,oy:0, sh:90, dx:290,dy:100, dw:26,dh:36},
  {tx:0, oy:0, sh:90, dx:320,dy:96, dw:26,dh:36},
  {tx:66,oy:0, sh:90, dx:350,dy:102, dw:26,dh:36},
];

// ── House (from serene.png) ──────────────────────────────────────────────────
// Big house at serene.png: x=165,y=330, sw=73,sh=76
// Placed on right side of map
const HOUSE={sx:165,sy:330,sw:73,sh:76, dx:176,dy:126,dw:55,dh:57};

// ── Character ─────────────────────────────────────────────────────────────────
const CHW=20, CHH=Math.round(20*218/120);
const ch={x:MAPX+14,y:MAPY+7*TW-CHH,frame:0,facing:1,timer:0,speed:0.8,
          target:MAPX+14, dir:1};
const CH_WALK_W=22*TW; // walk across full map width area

// ── State ─────────────────────────────────────────────────────────────────────
let t=0;

// ── Draw helpers ──────────────────────────────────────────────────────────────
function rect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}

function woodPanel(x,y,w,h,title){
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(x+3,y+3,w,h);
  // Body gradient
  const g=ctx.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0,'#3d1f0a');g.addColorStop(0.5,'#291408');g.addColorStop(1,'#3d1f0a');
  ctx.fillStyle=g;ctx.fillRect(x,y,w,h);
  // Wood grain
  for(let i=0;i<w;i+=4){ctx.fillStyle='rgba(0,0,0,0.12)';ctx.fillRect(x+i,y,2,h);}
  // Borders
  [[1,'#7a5c14'],[2,'#c8a040'],[3,'#523a0c']].forEach(([o,c])=>{
    ctx.strokeStyle=c;ctx.lineWidth=1;ctx.strokeRect(x+o+0.5,y+o+0.5,w-2*o-1,h-2*o-1);
  });
  // Title bar
  if(title){
    rect(x+4,y+4,w-8,13,'rgba(0,0,0,0.6)');
    ctx.font='bold 7px monospace';ctx.fillStyle='#f0d070';ctx.textAlign='center';
    ctx.fillText(title,x+w/2,y+13);
  }
}

function bar(x,y,w,cur,max,c1,c2){
  rect(x,y,w,5,'#111');
  const fw=Math.round((w-2)*cur/max);
  rect(x+1,y+1,fw,3,c1);
  if(fw>1)rect(x+1,y+1,fw-1,1,c2);
}

// ── Map panel ─────────────────────────────────────────────────────────────────
function drawMap(){
  woodPanel(MP.x,MP.y,MP.w,MP.h,'— 农场全景 —');
  ctx.save();
  ctx.beginPath();ctx.rect(MAPX,MAPY,COLS*TW,ROWS*TW);ctx.clip();

  // Ground tiles
  if(serene.complete&&serene.naturalWidth>0){
    const wf=Math.floor(t/700)%2;
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        let tid=TMAP[r][c];
        let [sx,sy]=TILE_SRC[tid]||TILE_SRC[0];
        // animate water
        if(tid===2){ sx=wf?192:176; sy=16; }
        ctx.drawImage(serene,sx,sy,16,16,MAPX+c*TW,MAPY+r*TW,TW,TW);
      }
    }
  } else {
    // Fallback solid colors
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      const t0=TMAP[r][c];
      ctx.fillStyle=t0===1?'#8B6914':t0===2?'#4a90d9':t0===4?'#c8a850':'#4a8f32';
      ctx.fillRect(MAPX+c*TW,MAPY+r*TW,TW,TW);
    }
  }

  // Farm fence (col 9 boundary) — vertical wooden posts
  ctx.fillStyle='#6b4c14';
  for(let r=0;r<=8;r++){
    const fx=MAPX+9*TW-1,fy=MAPY+r*TW;
    ctx.fillRect(fx,fy,3,TW);   // post
    ctx.fillStyle='#9a7030';ctx.fillRect(fx+1,fy,1,TW);ctx.fillStyle='#6b4c14';
  }
  // Horizontal rails
  ctx.fillStyle='#8B6020';
  for(let r=1;r<=7;r+=2){
    ctx.fillRect(MAPX,MAPY+r*TW+5,9*TW,2);
    ctx.fillRect(MAPX,MAPY+r*TW+10,9*TW,2);
  }

  // Crops (drawn as pixel art plants)
  for(const cp of CROPS){
    const cx=MAPX+cp.col*TW+6, cy=MAPY+cp.row*TW+3;
    const [c1,c2]=CSTAGE[cp.st];
    // Stem
    ctx.fillStyle='#3d6618';ctx.fillRect(cx+2,cy+5,2,6);
    // Leaves
    ctx.fillStyle=c1;ctx.fillRect(cx,cy+2,6,5);
    ctx.fillStyle=c2;ctx.fillRect(cx+1,cy+1,4,2);ctx.fillRect(cx,cy+3,6,2);
    if(cp.st===3){
      // Red tomato
      ctx.fillStyle='#e03020';ctx.fillRect(cx+1,cy,4,4);
      ctx.fillStyle='#ff6040';ctx.fillRect(cx+2,cy,2,2);
    }
  }

  // House (from serene.png)
  if(serene.complete&&serene.naturalWidth>0){
    const {sx,sy,sw,sh,dx,dy,dw,dh}=HOUSE;
    ctx.drawImage(serene,sx,sy,sw,sh,dx,dy,dw,dh);
  }

  // Trees (from trees_lz.png)
  if(treesImg.complete&&treesImg.naturalWidth>0){
    for(const tr of TREES){
      ctx.drawImage(treesImg,tr.tx,tr.oy,64,tr.sh,tr.dx,tr.dy,tr.dw,tr.dh);
    }
  }

  // Character
  if(charSpr.complete&&charSpr.naturalWidth>0){
    ctx.save();
    ctx.translate(ch.x+CHW/2,ch.y+CHH);
    if(ch.facing<0)ctx.scale(-1,1);
    ctx.drawImage(charSpr,ch.frame*120,0,120,218,-CHW/2,-CHH,CHW,CHH);
    ctx.restore();
  }

  // Water label
  ctx.font='6px monospace';ctx.fillStyle='rgba(80,160,255,0.7)';ctx.textAlign='center';
  ctx.fillText('〜 湖 〜',MAPX+6*TW,MAPY+11*TW+5);

  // Farm label
  ctx.fillStyle='rgba(220,170,60,0.9)';
  ctx.fillText('我的农田',MAPX+4.5*TW,MAPY+TW-3);

  // Path arrow / label
  ctx.fillStyle='rgba(180,220,100,0.8)';
  ctx.fillText('→ 小路',MAPX+10.5*TW,MAPY+3*TW-3);

  ctx.restore();
}

// ── Catalog panel ──────────────────────────────────────────────────────────────
const CATALOG=[
  {name:'番茄',color:'#e03020'},
  {name:'豌豆',color:'#4cb83c'},
  {name:'草莓',color:'#e02868'},
  {name:'玉米',color:'#e8c020'},
  {name:'蘑菇',color:'#a06830'},
  {name:'南瓜',color:'#e06820'},
];
function drawCatalog(){
  woodPanel(CP.x,CP.y,CP.w,CP.h,'素材');
  for(let i=0;i<6;i++){
    const col=i%2, row=Math.floor(i/2);
    const ix=CP.x+6+col*48, iy=CP.y+20+row*67;
    const iw=41,ih=60;
    // Item slot
    rect(ix,iy,iw,ih,'rgba(0,0,0,0.45)');
    ctx.strokeStyle='#5a3c0e';ctx.lineWidth=1;ctx.strokeRect(ix,iy,iw,ih);
    // Draw little plant icon
    const [c1,c2]=[CATALOG[i].color,'#2d1008'];
    const mx=ix+iw/2, my=iy+ih/2-4;
    ctx.fillStyle='#3a6010';ctx.fillRect(mx-1,my-2,2,14);
    ctx.fillStyle=c1;ctx.beginPath();ctx.arc(mx,my-4,7,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillRect(mx-3,my-8,4,2);
    // Name
    ctx.font='5.5px monospace';ctx.fillStyle='#ddc070';ctx.textAlign='center';
    ctx.fillText(CATALOG[i].name,ix+iw/2,iy+ih-5);
    // Season dot
    const sCol=['#4cc040','#e0a020','#e06020','#80b8ff'][i%4];
    ctx.fillStyle=sCol;ctx.beginPath();ctx.arc(ix+5,iy+7,3,0,Math.PI*2);ctx.fill();
  }
}

  rect(HP.x+124,HP.y+4,100,HP.h-8,'rgba(0,0,0,0.4)');

  rect(HP.x+350,HP.y+4,126,HP.h-8,'rgba(0,0,0,0.4)');

    ctx.fillText(ACTIONS[i].label,bx+bw/2,by+bh-5);

// ── Tab header ───────────────────────────────────────────────────────────────
function drawTabs(){
  // Tab strip at very top
  const tabs=['农场','厨房','仓库','对话','Ethan'];
  const TW2=480/tabs.length;
  for(let i=0;i<tabs.length;i++){
    const tx=i*TW2;
    ctx.fillStyle=i===0?'#4a2c08':'#1e0e04';
    ctx.fillRect(tx,0,TW2-1,10);
    ctx.font='bold 6px monospace';
    ctx.fillStyle=i===0?'#ffe880':'#907040';
    ctx.textAlign='center';
    ctx.fillText(tabs[i],tx+TW2/2,8);
    if(i===0){
      ctx.fillStyle='#c8a040';ctx.fillRect(tx,9,TW2-1,1);
    }
  }
}

// ── Animation ────────────────────────────────────────────────────────────────
const FARM_LEFT =MAPX+CHW/2;
const FARM_RIGHT=MAPX+9*TW-CHW;

function updateCharacter(dt){
  ch.timer+=dt;
  if(ch.timer>120){ch.timer=0;ch.frame=(ch.frame+1)%10;}

  ch.x+=ch.dir*ch.speed;
  if(ch.x>FARM_RIGHT){ch.x=FARM_RIGHT;ch.dir=-1;ch.facing=-1;}
  if(ch.x<FARM_LEFT){ch.x=FARM_LEFT;ch.dir=1;ch.facing=1;}
}

// ── Main loop ────────────────────────────────────────────────────────────────
let last=0;
function frame(now){
  const dt=now-last;last=now;
  t=now;
  updateCharacter(dt);

  ctx.clearRect(0,0,480,374);
  // Sky gradient background
  const sky=ctx.createLinearGradient(0,0,0,374);
  sky.addColorStop(0,'#87ceeb');sky.addColorStop(1,'#d4f4a4');
  ctx.fillStyle=sky;ctx.fillRect(0,0,480,374);

  drawTabs();
  drawMap();
  drawCatalog();
  drawHUD();

  requestAnimationFrame(frame);
}

// Wait for assets before starting
Promise.all([serene,treesImg,charSpr].map(img=>
  new Promise(r=>{if(img.complete)r();else{img.onload=r;img.onerror=r;}})
)).then(()=>requestAnimationFrame(frame));
</script>
