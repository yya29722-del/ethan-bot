  {name:'Tree S',   icon:{sx:0,sy:0,sw:24,sh:38}},
];

// Inventory slots
const INV=[
  {sx:30,sy:96,sw:8,sh:22,name:'Tomato',qty:12},
  {sx:20,sy:96,sw:8,sh:22,name:'Carrot',qty:8},
  {sx:10,sy:96,sw:8,sh:22,name:'Sprout',qty:3},
  {sx:0,sy:0,sw:0,sh:0,name:'',qty:0},
  {sx:0,sy:0,sw:0,sh:0,name:'',qty:0},
  {sx:0,sy:0,sw:0,sh:0,name:'',qty:0},
];

// ─── Drawing helpers ──────────────────────────────────────────────────────────
function rect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}

function woodPanel(x,y,w,h,title){
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(x+3,y+3,w,h);
  // Wood grain background
  const grd=ctx.createLinearGradient(x,y,x+w,y+h);
  grd.addColorStop(0,'#3a200e');
  grd.addColorStop(0.5,'#2e180a');
  grd.addColorStop(1,'#3a200e');
  ctx.fillStyle=grd;
  ctx.fillRect(x,y,w,h);
  // Grain lines
  ctx.strokeStyle='rgba(0,0,0,0.25)';
  ctx.lineWidth=1;
  for(let i=0;i<w;i+=5){
    ctx.beginPath();ctx.moveTo(x+i,y);ctx.lineTo(x+i+2,y+h);ctx.stroke();
  }
  // Triple border
  ctx.strokeStyle='#8a6a20'; ctx.lineWidth=1;
  ctx.strokeRect(x+1,y+1,w-2,h-2);
  ctx.strokeStyle='#c8a84c'; ctx.lineWidth=1;
  ctx.strokeRect(x+2,y+2,w-4,h-4);
  ctx.strokeStyle='#6a4e12'; ctx.lineWidth=1;
  ctx.strokeRect(x+3,y+3,w-6,h-6);
  // Title bar
  if(title){
    rect(x+4,y+4,w-8,14,'rgba(0,0,0,0.5)');
    ctx.fillStyle='#f0d080';
    ctx.font='bold 8px monospace';
    ctx.textAlign='center';
    ctx.fillText(title, x+w/2, y+13);
  }
}

function labelText(txt,x,y,col,sz){
  ctx.font=(sz||7)+'px monospace';
  ctx.fillStyle=col||'#e0c060';
  ctx.textAlign='left';
  ctx.fillText(txt,x,y);
}

function barHP(x,y,w,cur,max,c1,c2){
  rect(x,y,w,5,'#1a1008');
  rect(x+1,y+1,Math.round((w-2)*cur/max),3,c1);
  rect(x+1,y+1,Math.round((w-2)*cur/max)-1,1,c2);
}

// ─── Render map panel ─────────────────────────────────────────────────────────
function drawMapPanel(){
  woodPanel(MAP_PANEL.x,MAP_PANEL.y,MAP_PANEL.w,MAP_PANEL.h,'— FARM MAP —');
  // Clip to inner area for tile rendering
  ctx.save();
  ctx.beginPath();
  ctx.rect(MAPX, MAPY, COLS*TW, ROWS*TW);
  ctx.clip();
  drawTilemap();
  drawFence();
  drawMapSprites();
  drawCharOnMap();
  ctx.restore();
  // Lake label
  ctx.fillStyle='rgba(60,120,200,0.4)';
  ctx.fillRect(MAPX+2, MAPY+9*TW+2, 7*TW-4, 4*TW-4);
  ctx.font='7px monospace'; ctx.fillStyle='#a0c8f0'; ctx.textAlign='center';
  ctx.fillText('~LAKE~', MAPX+7*TW/2, MAPY+11*TW);
  // Farm label
  ctx.font='6px monospace'; ctx.fillStyle='#c8a44c'; ctx.textAlign='center';
  ctx.fillText('FARM', MAPX+4*TW, MAPY+TW);
  // Mini compass rose
  const cx2=MAP_PANEL.w-14, cy2=MAPY+10;
  ctx.font='7px monospace'; ctx.fillStyle='#e0c060'; ctx.textAlign='center';
  ctx.fillText('N', cx2, cy2-2);
}

function drawTilemap(){
  if(!tileset.complete)return;
  const wf=Math.floor(Date.now()/700)%2;
  for(let r=0;r<ROWS;r++){
    for(let col=0;col<COLS;col++){
      let tid=TILEMAP[r][col];
      // animate water
      if(tid===4||tid===5) tid=4+wf;
      // vary grass tiles
      else if(tid===0||tid===1) tid=GRASS_VAR[r][col];
      const tx=(tid%8)*16;
      ctx.drawImage(tileset,tx,0,16,16,MAPX+col*TW,MAPY+r*TW,TW,TW);
    }
  }
}

function drawFence(){
  // Wood fence along col=8 (farm right border), rows 2-7
  ctx.fillStyle='#8B6914';
  for(let r=2;r<=8;r++){
    const fx=MAPX+8*TW, fy=MAPY+r*TW;
    ctx.fillRect(fx, fy, 2, TW);
    ctx.fillRect(fx+TW-2, fy, 2, TW);
    // rails
    ctx.fillRect(fx, fy+4, TW, 2);
    ctx.fillRect(fx, fy+TW-6, TW, 2);
  }
  // Fence posts
  ctx.fillStyle='#6a4a0e';
  for(let r=2;r<=8;r++){
    ctx.fillRect(MAPX+8*TW-1, MAPY+r*TW, 3, TW);
  }
}

function drawMapSprites(){
  if(!sprites.complete)return;
  // Crops
  for(const cp of CROPS){
    const cx=MAPX+cp.col*TW+(TW-8)/2;
    const cy=MAPY+cp.row*TW+(TW-22);
    ctx.drawImage(sprites, cp.st*10,96,8,22, cx,cy,8,22);
  }
  // House (bottom-aligned to row 8 bottom, left edge at col 9)
  const hx=MAPX+9*TW-4;
  const hy=MAPY+8*TW-92;
  ctx.drawImage(sprites,108,0,84,92, hx,hy,84,92);
  // Trees (bottom-aligned to their position)
  for(const t of TREES){
    const ti=TREE_INFO[t.tp];
    ctx.drawImage(sprites,ti.sx,ti.sy,ti.sw,ti.sh, t.mx,t.my,ti.sw,ti.sh);
  }
}

function drawCharOnMap(){
  if(!charSpr.complete)return;
  ctx.save();
  const cx=ch.x+CHW/2, cy=ch.y+CHH;
  ctx.translate(cx,cy);
  if(ch.facing<0) ctx.scale(-1,1);
  ctx.drawImage(charSpr, ch.frame*120,0,120,218, -CHW/2,-CHH,CHW,CHH);
  ctx.restore();
}

// ─── Render catalog panel ─────────────────────────────────────────────────────
function drawCatalogPanel(){
  woodPanel(CAT_PANEL.x,CAT_PANEL.y,CAT_PANEL.w,CAT_PANEL.h,'ITEMS');
  // Item slots (2×3 grid)
  for(let i=0;i<6;i++){
    const col=i%2, row=Math.floor(i/2);
    const ix=CAT_PANEL.x+8+col*48;
    const iy=CAT_PANEL.y+20+row*68;
    const iw=40, ih=60;
    rect(ix,iy,iw,ih,'rgba(0,0,0,0.4)');
    ctx.strokeStyle='#6a4e12';ctx.lineWidth=1;
    ctx.strokeRect(ix,iy,iw,ih);
    // sprite
    if(i<CATALOG_ITEMS.length && sprites.complete){
      const it=CATALOG_ITEMS[i];
      const sp=it.icon;
      const scale=Math.min((iw-4)/sp.sw, (ih-14)/sp.sh);
      const dw=Math.round(sp.sw*scale), dh=Math.round(sp.sh*scale);
      const dx=ix+(iw-dw)/2, dy=iy+(ih-14-dh)/2+2;
      ctx.drawImage(sprites,sp.sx,sp.sy,sp.sw,sp.sh,dx,dy,dw,dh);
    }
    // label
    if(i<CATALOG_ITEMS.length){
      ctx.font='5px monospace'; ctx.fillStyle='#c8a84c'; ctx.textAlign='center';
      ctx.fillText(CATALOG_ITEMS[i].name, ix+iw/2, iy+ih-3);
    }
  }
}

// ─── Render HUD panel ─────────────────────────────────────────────────────────
function drawHUDPanel(){
  woodPanel(HUD_PANEL.x,HUD_PANEL.y,HUD_PANEL.w,HUD_PANEL.h,null);
  const hy=HUD_PANEL.y;
  
  // Character portrait area (left)
  rect(6, hy+5, 56, 76, 'rgba(0,0,0,0.5)');
  ctx.strokeStyle='#c8a84c'; ctx.lineWidth=1;
  ctx.strokeRect(6, hy+5, 56, 76);
  // Draw character in portrait (show first frame, slightly larger)
  if(charSpr.complete){
    const PW=40, PH=Math.round(40*218/120);
    ctx.drawImage(charSpr,0,0,120,218, 6+(56-PW)/2, hy+5+(76-PH)/2, PW, PH);
  }
  // Portrait label
  ctx.font='bold 7px monospace'; ctx.fillStyle='#f0d080'; ctx.textAlign='center';
  ctx.fillText('ETHAN', 34, hy+87);
  
  // Stats area
  const sx=68;
  ctx.font='bold 7px monospace'; ctx.fillStyle='#e0c060'; ctx.textAlign='left';
  ctx.fillText('Lv.8  Farmer', sx, hy+14);
  // HP
  ctx.font='6px monospace'; ctx.fillStyle='#e06060';
  ctx.fillText('HP', sx, hy+25);
  barHP(sx+14, hy+20, 80, 82, 100, '#d03030', '#f04040');
  ctx.font='5px monospace'; ctx.fillStyle='#c8a84c';
  ctx.fillText('82/100', sx+96, hy+25);
  // Stamina
  ctx.font='6px monospace'; ctx.fillStyle='#60d060';
  ctx.fillText('ST', sx, hy+36);
  barHP(sx+14, hy+31, 80, 65, 100, '#1a7a1a', '#2aaa2a');
  ctx.font='5px monospace'; ctx.fillStyle='#c8a84c';
  ctx.fillText('65/100', sx+96, hy+36);
  // Gold
  ctx.font='7px monospace'; ctx.fillStyle='#f0d040';
  ctx.fillText('⬡ 1,240 G', sx, hy+49);
  // Date & time
  ctx.font='6px monospace'; ctx.fillStyle='#c8e0ff'; ctx.textAlign='right';
  ctx.fillText('Spring · Day 12', CW-6, hy+14);
  ctx.fillStyle='#a0c8f0';
  ctx.fillText('☀ 9:30 AM', CW-6, hy+24);
  
  // Divider
  ctx.strokeStyle='#6a4e12'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(68, hy+55); ctx.lineTo(470, hy+55); ctx.stroke();
  
  // Inventory grid (5 cols × 2 rows of 38×34 slots)
  ctx.font='bold 6px monospace'; ctx.fillStyle='#e0c060'; ctx.textAlign='left';
  ctx.fillText('INVENTORY', 68, hy+64);
  const INV_ITEMS=[
    {sprite:{sx:30,sy:96,sw:8,sh:22},name:'Tomato',qty:12},
    {sprite:{sx:20,sy:96,sw:8,sh:22},name:'Carrot',qty:8},
    {sprite:{sx:10,sy:96,sw:8,sh:22},name:'Sprout',qty:3},
    null,null,null,null,null,null,null
  ];
  for(let i=0;i<10;i++){
    const ic=i%5, ir=Math.floor(i/5);
    const ix=68+ic*40, iy=hy+67+ir*34;
    const iw=36, ih=30;
    rect(ix,iy,iw,ih,'rgba(0,0,0,0.35)');
    ctx.strokeStyle=(i===0?'#f0d040':'#4a3010'); ctx.lineWidth=1;
    ctx.strokeRect(ix,iy,iw,ih);
    const it=INV_ITEMS[i];
    if(it && sprites.complete){
      const sp=it.sprite;
      const scale=Math.min((iw-4)/sp.sw,(ih-10)/sp.sh);
      const dw=Math.round(sp.sw*scale),dh=Math.round(sp.sh*scale);
      ctx.drawImage(sprites,sp.sx,sp.sy,sp.sw,sp.sh,ix+(iw-dw)/2,iy+(ih-10-dh)/2+1,dw,dh);
      ctx.font='5px monospace'; ctx.fillStyle='#f0d040'; ctx.textAlign='right';
      ctx.fillText(it.qty, ix+iw-2, iy+ih-2);
    }
  }
  
  // Quest panel (right of inventory)
  const qx=272, qy=hy+5, qw=200, qh=124;
  rect(qx,qy,qw,qh,'rgba(0,0,0,0.4)');
  ctx.strokeStyle='#6a4e12'; ctx.strokeRect(qx,qy,qw,qh);
  ctx.font='bold 7px monospace'; ctx.fillStyle='#f0d080'; ctx.textAlign='left';
  ctx.fillText('QUESTS', qx+4, qy+11);
  ctx.strokeStyle='#4a3010';
  ctx.beginPath(); ctx.moveTo(qx+4,qy+14); ctx.lineTo(qx+qw-4,qy+14); ctx.stroke();
  const quests=[
    {done:true,  txt:'Water the crops (6/6)'},
    {done:false, txt:'Harvest tomatoes (0/5)'},
    {done:false, txt:'Talk to the miller'},
  ];
  quests.forEach((q,i)=>{
    ctx.font='6px monospace';
    ctx.fillStyle=q.done?'#60c060':'#c8a84c';
    ctx.textAlign='left';
    ctx.fillText((q.done?'✓ ':'○ ')+q.txt, qx+4, qy+24+i*16);
  });
  ctx.font='6px monospace'; ctx.fillStyle='#806030'; ctx.textAlign='left';
  ctx.fillText('Season: Spring  Days left: 18', qx+4, qy+78);
  ctx.fillStyle='#f0d040';
  ctx.fillText('⬡ Daily income: +120 G', qx+4, qy+90);
  // mini map inset
  rect(qx+4, qy+98, 30, 20, '#1a300a');
  ctx.strokeStyle='#4a7020'; ctx.strokeRect(qx+4,qy+98,30,20);
  // tiny char dot
  ctx.fillStyle='#f0e060';
  ctx.fillRect(qx+14, qy+104, 2, 2);
  ctx.font='5px monospace'; ctx.fillStyle='#a0c080'; ctx.textAlign='left';
  ctx.fillText('mini-map', qx+36, qy+109);
}

// ─── Animation loop ───────────────────────────────────────────────────────────
let last=0;
function tick(ts){
  const dt=Math.min((ts-last)/1000,0.05); last=ts;
  
  // Move character on map path (row 8 = y MAPY+8*TW-CHH)
  ch.x+=chDir*ch.speed*60*dt;
  // Walk between fence and village
  const minX=MAPX+2, maxX=MAPX+8*TW-CHW-4;
  if(ch.x>maxX){ch.x=maxX;chDir=-1;ch.facing=-1;}
  if(ch.x<minX){ch.x=minX;chDir=1;ch.facing=1;}
  // Animate frame
  ch.ft+=dt;
  if(ch.ft>=0.1){ch.ft-=0.1;ch.frame=(ch.frame+1)%10;}
  
  // Draw
  ctx.clearRect(0,0,CW,CH);
  drawMapPanel();
  drawCatalogPanel();
  drawHUDPanel();
  
  requestAnimationFrame(tick);
}

// Wait for images to load then start
let loaded=0;
[tileset,sprites,charSpr].forEach(img=>{
  img.onload=()=>{if(++loaded===3) requestAnimationFrame(tick);};
});
// Fallback if already cached
if(tileset.complete&&sprites.complete&&charSpr.complete) requestAnimationFrame(tick);
</script>
