<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { margin: 0; background: #0a0a0a; display: flex; align-items: center; justify-content: center; height: 100vh; }

  .mirror-wrap {
    width: 240px; height: 240px;
    animation: breathe 6s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(180deg) scale(1.04); }
  }

  .mirror-wrap svg {
    width: 100%; height: 100%;
  }
</style>
</head>
<body>
<div class="mirror-wrap">
<svg viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- top-left corner ornament -->
  <g opacity="0.9">
    <path d="M20 20 Q20 50 50 50" stroke="#c9a96e" stroke-width="0.8" fill="none"/>
    <path d="M20 20 Q50 20 50 50" stroke="#c9a96e" stroke-width="0.5" fill="none" opacity="0.5"/>
    <path d="M10 30 Q15 20 20 20 Q25 15 35 12" stroke="#c9a96e" stroke-width="0.6" fill="none"/>
    <path d="M30 10 Q20 15 20 20 Q15 25 12 35" stroke="#c9a96e" stroke-width="0.6" fill="none"/>
    <circle cx="20" cy="20" r="1.2" fill="#c9a96e"/>
    <circle cx="8" cy="28" r="0.8" fill="#c9a96e" opacity="0.6"/>
    <circle cx="28" cy="8" r="0.8" fill="#c9a96e" opacity="0.6"/>
    <path d="M36 14 Q32 10 28 8 Q24 6 22 10 Q20 14 24 16 Q28 18 30 14" stroke="#c9a96e" stroke-width="0.5" fill="none" opacity="0.7"/>
    <path d="M14 36 Q10 32 8 28 Q6 24 10 22 Q14 20 16 24 Q18 28 14 30" stroke="#c9a96e" stroke-width="0.5" fill="none" opacity="0.7"/>
  </g>

  <!-- top-right corner ornament (mirror of top-left) -->
  <g opacity="0.9" transform="scale(-1,1) translate(-240,0)">
    <path d="M20 20 Q20 50 50 50" stroke="#c9a96e" stroke-width="0.8" fill="none"/>
    <path d="M20 20 Q50 20 50 50" stroke="#c9a96e" stroke-width="0.5" fill="none" opacity="0.5"/>
    <path d="M10 30 Q15 20 20 20 Q25 15 35 12" stroke="#c9a96e" stroke-width="0.6" fill="none"/>
    <path d="M30 10 Q20 15 20 20 Q15 25 12 35" stroke="#c9a96e" stroke-width="0.6" fill="none"/>
    <circle cx="20" cy="20" r="1.2" fill="#c9a96e"/>
    <circle cx="8" cy="28" r="0.8" fill="#c9a96e" opacity="0.6"/>
    <circle cx="28" cy="8" r="0.8" fill="#c9a96e" opacity="0.6"/>
    <path d="M36 14 Q32 10 28 8 Q24 6 22 10 Q20 14 24 16 Q28 18 30 14" stroke="#c9a96e" stroke-width="0.5" fill="none" opacity="0.7"/>
    <path d="M14 36 Q10 32 8 28 Q6 24 10 22 Q14 20 16 24 Q18 28 14 30" stroke="#c9a96e" stroke-width="0.5" fill="none" opacity="0.7"/>
  </g>

  <!-- bottom-left corner ornament -->
  <g opacity="0.9" transform="scale(1,-1) translate(0,-240)">
    <path d="M20 20 Q20 50 50 50" stroke="#c9a96e" stroke-width="0.8" fill="none"/>
    <path d="M20 20 Q50 20 50 50" stroke="#c9a96e" stroke-width="0.5" fill="none" opacity="0.5"/>
    <path d="M10 30 Q15 20 20 20 Q25 15 35 12" stroke="#c9a96e" stroke-width="0.6" fill="none"/>
    <path d="M30 10 Q20 15 20 20 Q15 25 12 35" stroke="#c9a96e" stroke-width="0.6" fill="none"/>
    <circle cx="20" cy="20" r="1.2" fill="#c9a96e"/>
    <circle cx="8" cy="28" r="0.8" fill="#c9a96e" opacity="0.6"/>
    <circle cx="28" cy="8" r="0.8" fill="#c9a96e" opacity="0.6"/>
    <path d="M36 14 Q32 10 28 8 Q24 6 22 10 Q20 14 24 16 Q28 18 30 14" stroke="#c9a96e" stroke-width="0.5" fill="none" opacity="0.7"/>
    <path d="M14 36 Q10 32 8 28 Q6 24 10 22 Q14 20 16 24 Q18 28 14 30" stroke="#c9a96e" stroke-width="0.5" fill="none" opacity="0.7"/>
  </g>

  <!-- bottom-right corner ornament -->
  <g opacity="0.9" transform="scale(-1,-1) translate(-240,-240)">
    <path d="M20 20 Q20 50 50 50" stroke="#c9a96e" stroke-width="0.8" fill="none"/>
    <path d="M20 20 Q50 20 50 50" stroke="#c9a96e" stroke-width="0.5" fill="none" opacity="0.5"/>
    <path d="M10 30 Q15 20 20 20 Q25 15 35 12" stroke="#c9a96e" stroke-width="0.6" fill="none"/>
    <path d="M30 10 Q20 15 20 20 Q15 25 12 35" stroke="#c9a96e" stroke-width="0.6" fill="none"/>
    <circle cx="20" cy="20" r="1.2" fill="#c9a96e"/>
    <circle cx="8" cy="28" r="0.8" fill="#c9a96e" opacity="0.6"/>
    <circle cx="28" cy="8" r="0.8" fill="#c9a96e" opacity="0.6"/>
    <path d="M36 14 Q32 10 28 8 Q24 6 22 10 Q20 14 24 16 Q28 18 30 14" stroke="#c9a96e" stroke-width="0.5" fill="none" opacity="0.7"/>
    <path d="M14 36 Q10 32 8 28 Q6 24 10 22 Q14 20 16 24 Q18 28 14 30" stroke="#c9a96e" stroke-width="0.5" fill="none" opacity="0.7"/>
  </g>

  <!-- center star/diamond -->
  <g opacity="0.4">
    <line x1="120" y1="108" x2="120" y2="132" stroke="#c9a96e" stroke-width="0.5"/>
    <line x1="108" y1="120" x2="132" y2="120" stroke="#c9a96e" stroke-width="0.5"/>
    <circle cx="120" cy="120" r="1.5" fill="#c9a96e"/>
  </g>
</svg>
</div>
</body>
</html>
