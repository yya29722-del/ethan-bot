<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>和Ethan通话</title>
<style>
  body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:#111;color:#eee;font-family:system-ui,-apple-system,"PingFang SC",sans-serif;gap:18px}
  button{width:140px;height:140px;border-radius:50%;border:0;font-size:18px;font-weight:700;
    background:#3a3a3a;color:#fff;cursor:pointer;touch-action:none}
  button.recording{background:#c0392b}
  #status{min-height:1.6em;color:#aaa;font-size:14px;max-width:80vw;text-align:center}
  #log{max-width:80vw;font-size:14px;line-height:1.6;white-space:pre-wrap;color:#ccc}
</style>
</head>
<body>
  <button id="talk">按住说话</button>
  <div id="status">按住说，松开发送</div>
  <div id="log"></div>
  <audio id="player" autoplay></audio>
<script>
const btn = document.getElementById('talk')
const statusEl = document.getElementById('status')
const logEl = document.getElementById('log')
const player = document.getElementById('player')

let mediaRecorder, chunks = []

async function start() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true })
  mediaRecorder = new MediaRecorder(stream)
  chunks = []
  mediaRecorder.ondataavailable = (e) => chunks.push(e.data)
  mediaRecorder.onstop = onStop
  mediaRecorder.start()
  btn.classList.add('recording')
  statusEl.textContent = '录音中…松开发送'
}

async function onStop() {
  statusEl.textContent = '识别中…'
  const blob = new Blob(chunks, { type: 'audio/webm' })
  const key = localStorage.getItem('voiceRelayKey') || ''
  try {
    const r = await fetch('/voice', {
      method: 'POST',
      headers: { 'content-type': 'audio/webm', ...(key ? { authorization: `Bearer ${key}` } : {}) },
      body: blob,
    })
    const data = await r.json()
    if (!data.transcript) { statusEl.textContent = '没听清，再试一次'; return }
    logEl.textContent = `你: ${data.transcript}\nEthan: ${data.reply_text}\n\n` + logEl.textContent
    player.src = 'data:audio/mp3;base64,' + data.audio_base64
    statusEl.textContent = '按住说话'
  } catch (err) {
    statusEl.textContent = '出错了: ' + err.message
  }
}

btn.addEventListener('pointerdown', (e) => { e.preventDefault(); start() })
btn.addEventListener('pointerup', () => mediaRecorder && mediaRecorder.stop())
btn.addEventListener('pointercancel', () => mediaRecorder && mediaRecorder.stop())
</script>
</body>
</html>
