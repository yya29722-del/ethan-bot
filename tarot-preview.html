<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarot</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold: #c9a96e;
  --gold2: #f0d898;
  --gold-dim: rgba(201,169,110,0.3);
  --text: #2a1a20;
  --text-mid: #8a6070;
  --text-light: #c0a0aa;
}

body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse at 15% 0%, #ffe0ec 0%, transparent 50%),
    radial-gradient(ellipse at 85% 5%, #fff4d6 0%, transparent 48%),
    radial-gradient(ellipse at 50% 100%, #ffdde8 0%, transparent 55%),
    linear-gradient(160deg, #fff8fa 0%, #fff4f6 45%, #fffbf3 100%);
  font-family: 'Cormorant Garamond', Georgia, serif;
  overflow-x: hidden;
}

/* ambient stars */
.deco-field { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.deco-star {
  position: absolute;
  opacity: 0;
  animation: twinkle ease-in-out infinite;
}
@keyframes twinkle {
  0%,100% { opacity:0; transform:scale(0.5) rotate(0deg); }
  50%      { opacity:0.5; transform:scale(1.1) rotate(18deg); }
}

/* wrap */
.tarot-wrap {
  position: relative; z-index:1;
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center;
  padding: 50px 20px 70px;
}

/* header */
.tarot-eyebrow {
  font-family:'Cinzel Decorative',serif;
  font-size:0.7rem; letter-spacing:0.38em; color:#d4a0b0;
  text-align:center; margin-bottom:12px;
}
.tarot-title {
  font-family:'Cinzel Decorative',serif;
  font-size:2.8rem; font-weight:700; letter-spacing:0.14em;
  background: linear-gradient(135deg,#b8862a 0%,#e8c96a 40%,#c9a96e 65%,#f0d898 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  text-align:center; line-height:1; margin-bottom:10px;
}
.tarot-subtitle {
  font-size:1.05rem; color:var(--text-mid); letter-spacing:0.1em;
  font-style:italic; text-align:center;
}

/* ornament */
.orn { display:flex; align-items:center; gap:10px; margin:18px auto 28px; }
.orn-l { width:44px; height:1px; background:linear-gradient(to right,transparent,#e8b0c0); }
.orn-r { width:44px; height:1px; background:linear-gradient(to left,transparent,#e8b0c0); }
.orn-c { font-size:0.8rem; color:var(--gold); letter-spacing:0.12em; }

/* question */
.q-wrap { width:100%; max-width:420px; margin-bottom:28px; }
.q-label {
  font-family:'Cinzel Decorative',serif;
  font-size:0.62rem; letter-spacing:0.28em; color:var(--gold);
  margin-bottom:10px; text-transform:uppercase;
}
.q-wrap textarea {
  width:100%; background:rgba(255,252,250,0.88);
  border:1.5px solid rgba(201,169,110,0.38); border-radius:18px;
  color:var(--text); font-family:'Cormorant Garamond',serif; font-size:1.05rem;
  padding:16px 18px; resize:none; outline:none; line-height:1.8;
  box-shadow:0 4px 20px rgba(240,180,200,0.18), inset 0 1px 0 rgba(255,255,255,0.9);
  transition:border-color 0.3s, box-shadow 0.3s;
}
.q-wrap textarea::placeholder { color:#d0b0ba; font-style:italic; }
.q-wrap textarea:focus {
  border-color:rgba(201,169,110,0.65);
  box-shadow:0 4px 28px rgba(240,180,200,0.3), inset 0 1px 0 rgba(255,255,255,0.9);
}

/* button */
.draw-btn {
  background:linear-gradient(135deg,#c9a96e 0%,#f0d898 50%,#c9a96e 100%);
  background-size:200% 100%;
  border:none; color:#2a1810;
  font-family:'Cinzel Decorative',serif; font-size:0.8rem; font-weight:700;
  letter-spacing:0.22em; padding:15px 44px; border-radius:50px; cursor:pointer;
  box-shadow:0 6px 24px rgba(201,169,110,0.42), 0 2px 8px rgba(201,169,110,0.2);
  transition:background-position 0.4s, transform 0.15s, box-shadow 0.3s;
  margin-bottom:50px; position:relative; overflow:hidden;
}
.draw-btn::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.28),transparent 55%);
  border-radius:inherit;
}
.draw-btn:hover { background-position:100% 0; transform:translateY(-2px); box-shadow:0 10px 32px rgba(201,169,110,0.5); }
.draw-btn:active { transform:translateY(0); }
.draw-btn:disabled { opacity:0.38; cursor:default; transform:none; box-shadow:none; }

/* card scene */
.deck-area { display:flex; justify-content:center; margin-bottom:44px; }
.card-scene { width:200px; height:340px; perspective:1100px; }

.tarot-card {
  width:100%; height:100%;
  position:relative; transform-style:preserve-3d;
}

.card-face {
  position:absolute; inset:0; border-radius:20px;
  backface-visibility:hidden; -webkit-backface-visibility:hidden;
  overflow:hidden;
}

/* flip animations */
@keyframes cardLift {
  0%   { transform:translateY(0) rotateY(0deg) rotateX(0deg); }
  25%  { transform:translateY(-30px) rotateY(0deg) rotateX(-10deg); }
  100% { transform:translateY(-30px) rotateY(90deg) rotateX(0deg); }
}
@keyframes cardReveal {
  0%   { transform:translateY(-30px) rotateY(90deg); }
  55%  { transform:translateY(-8px) rotateY(198deg); }
  72%  { transform:translateY(-1px) rotateY(184deg); }
  86%  { transform:translateY(0) rotateY(176deg); }
  100% { transform:translateY(0) rotateY(180deg); }
}
.tarot-card.flipping-out { animation:cardLift 0.5s cubic-bezier(0.55,0,1,0.45) forwards; }
.tarot-card.flipping-in  { animation:cardReveal 0.9s cubic-bezier(0.25,1,0.5,1) forwards; }

/* hover */
.card-scene.hoverable .tarot-card { transition:transform 0.5s cubic-bezier(0.23,1,0.32,1); }
.card-scene.hoverable:hover .tarot-card { transform:translateY(-14px) rotateX(4deg); }

/* burst */
.burst-p {
  position:absolute; width:5px; height:5px; border-radius:50%;
  pointer-events:none; z-index:100;
  animation:burstOut 0.75s ease-out forwards;
}
@keyframes burstOut {
  0%   { transform:translate(0,0) scale(1); opacity:1; }
  100% { transform:translate(var(--bx),var(--by)) scale(0); opacity:0; }
}

/* result */
.tarot-result {
  width:100%; max-width:440px;
  opacity:0; transform:translateY(14px);
  transition:opacity 0.65s 0.8s, transform 0.65s 0.8s;
  pointer-events:none;
}
.tarot-result.visible { opacity:1; transform:translateY(0); pointer-events:auto; }

.result-name {
  font-family:'Cinzel Decorative',serif;
  font-size:1.5rem; text-align:center; letter-spacing:0.1em;
  background:linear-gradient(135deg,#b8862a,#e8c96a,#c9a96e);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  margin-bottom:4px;
}
.result-suit {
  font-size:0.88rem; color:var(--text-mid);
  text-align:center; letter-spacing:0.16em; margin-bottom:22px; font-style:italic;
}

.reading-box {
  background:rgba(255,252,250,0.82); backdrop-filter:blur(10px);
  border:1.5px solid rgba(201,169,110,0.32); border-radius:22px;
  padding:28px 26px;
  box-shadow:0 6px 36px rgba(240,180,200,0.15), inset 0 1px 0 rgba(255,255,255,0.95);
  position:relative; overflow:hidden;
}
.reading-box::before {
  content:'✦'; position:absolute; top:14px; left:18px;
  color:var(--gold); font-size:0.55rem; opacity:0.45;
}
.reading-box::after {
  content:'✦'; position:absolute; bottom:14px; right:18px;
  color:var(--gold); font-size:0.55rem; opacity:0.45;
}
.reading-label {
  font-family:'Cinzel Decorative',serif;
  font-size:0.62rem; letter-spacing:0.3em; color:var(--gold);
  text-align:center; margin-bottom:12px;
}
.reading-sep {
  height:1px;
  background:linear-gradient(to right,transparent,rgba(201,169,110,0.4),transparent);
  margin-bottom:16px;
}
.reading-content {
  font-size:1.08rem; color:var(--text); line-height:2.1;
  text-align:center; min-height:64px;
}
.reading-placeholder { color:var(--text-light); font-style:italic; }
</style>
</head>
<body>

let current=null, isDrawn=false, animating=false;

function spawnBurst(scene) {
  const colors = ['#c9a96e','#f0d898','#f2c4ce','#e8a0b0'];
  for (let i=0;i<18;i++) {
    const p = document.createElement('div');
    p.className = 'burst-p';
    const angle = (i/18)*360, dist = 50+Math.random()*70;
    const rad = angle*Math.PI/180;
    p.style.setProperty('--bx',`${Math.cos(rad)*dist}px`);
    p.style.setProperty('--by',`${Math.sin(rad)*dist}px`);
    p.style.cssText += `left:50%;top:50%;margin:-2.5px 0 0 -2.5px;background:${colors[i%colors.length]};animation-delay:${Math.random()*0.08}s`;
    scene.appendChild(p);
    setTimeout(()=>p.remove(),900);
  }
}

function drawTarot() {
  if (animating) return;
  if (isDrawn) { resetTarot(); return; }

  const deck=document.getElementById('deckArea');
  const card=document.getElementById('tarotCard');
  const scene=document.getElementById('cardScene');
  const btn=document.getElementById('tarotDrawBtn');

  current = DECK[Math.floor(Math.random()*DECK.length)];
  document.getElementById('cfSuit').textContent = current.suit;
  document.getElementById('cfNumber').textContent = current.number;
  document.getElementById('cfSymbol').textContent = current.symbol;
  document.getElementById('cfName').textContent = current.name;
  document.getElementById('cfKeywords').textContent = current.keywords;

  deck.style.display='flex';
  btn.disabled=true;
  animating=true;
  card.classList.add('flipping-out');

  setTimeout(()=>{
    spawnBurst(scene);
    card.classList.remove('flipping-out');
    card.classList.add('flipping-in');
    setTimeout(()=>{
      card.classList.remove('flipping-in');
      card.style.transform='rotateY(180deg)';
      scene.classList.add('hoverable');
      showResult();
      btn.disabled=false;
      btn.textContent='✦ 再 抽 一 张 ✦';
      isDrawn=true; animating=false;
    },900);
  },500);
}

function showResult() {
  const result=document.getElementById('tarotResult');
  document.getElementById('resultName').textContent=current.name;
  document.getElementById('resultSuit').textContent=current.suit+'  ·  '+current.number;
  const content=document.getElementById('readingContent');
  content.innerHTML='<span class="reading-placeholder">正在解读…</span>';
  result.classList.add('visible');

  // ── Replace with your Edge Function ──
  // fetch('/functions/v1/tarot-reading',{method:'POST',headers:{'Content-Type':'application/json'},
  //   body:JSON.stringify({question:document.getElementById('tarotQuestion').value,card:current})
  // }).then(r=>r.json()).then(d=>{content.textContent=d.reading;});

  setTimeout(()=>{
    if(content.querySelector('.reading-placeholder')) content.textContent=current.meaning;
  },1400);
}

function resetTarot() {
  if(animating)return;
  animating=true;
  const card=document.getElementById('tarotCard');
  const result=document.getElementById('tarotResult');
  const scene=document.getElementById('cardScene');
  const btn=document.getElementById('tarotDrawBtn');
  result.classList.remove('visible');
  scene.classList.remove('hoverable');
  card.style.transition='transform 0.5s ease-in';
  card.style.transform='rotateY(0deg)';
  setTimeout(()=>{
    card.style.transition='';
    document.getElementById('deckArea').style.display='none';
    btn.textContent='✦ 抽 一 张 牌 ✦';
    isDrawn=false;animating=false;current=null;
  },600);
}
