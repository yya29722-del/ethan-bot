<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarot</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold: #c9a96e;
  --gold2: #e2c07a;
  --gold-dim: rgba(201,169,110,0.3);
  --pink: #f2c4ce;
  --rose: #e8a0b0;
  --blush: #fce8ed;
  --white: #fffcfa;
  --text: #2a1a20;
  --text-mid: #8a6070;
  --text-light: #c0a0aa;
}

body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse at 20% 0%, #ffe8ef 0%, transparent 55%),
    radial-gradient(ellipse at 80% 10%, #fff3e0 0%, transparent 50%),
    radial-gradient(ellipse at 50% 100%, #fce8f0 0%, transparent 60%),
    linear-gradient(160deg, #fff8fa 0%, #fff4f7 40%, #fffbf2 70%, #fff6f9 100%);
  font-family: 'Cormorant Garamond', 'Georgia', serif;
  overflow-x: hidden;
}

/* ── Scattered deco stars ── */
.deco-field {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.deco-star {
  position: absolute;
  color: var(--gold);
  font-size: 0.9rem;
  opacity: 0;
  animation: twinkle ease-in-out infinite;
}
@keyframes twinkle {
  0%,100% { opacity: 0; transform: scale(0.6) rotate(0deg); }
  50%      { opacity: 0.55; transform: scale(1.1) rotate(20deg); }
}

/* ── Page wrap ── */
.tarot-wrap {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 52px 20px 70px;
}

/* ── Header ── */
.tarot-header { text-align: center; margin-bottom: 10px; }

.tarot-eyebrow {
  font-size: 0.72rem;
  letter-spacing: 0.38em;
  color: var(--rose);
  margin-bottom: 12px;
  font-family: 'Cinzel Decorative', serif;
}

.tarot-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 2.8rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  background: linear-gradient(135deg, #c9a96e 0%, #f0d898 45%, #c9a96e 70%, #e2b86a 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
  margin-bottom: 10px;
  filter: drop-shadow(0 2px 8px rgba(201,169,110,0.3));
}

.tarot-subtitle {
  font-size: 1.0rem;
  color: var(--text-mid);
  letter-spacing: 0.1em;
  font-style: italic;
}

/* ── Ornament ── */
.ornament {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 18px auto 26px;
}
.orn-line {
  width: 48px;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--pink));
}
.orn-line.r { background: linear-gradient(to left, transparent, var(--pink)); }
.orn-center {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--gold);
  font-size: 0.75rem;
  letter-spacing: 0.1em;
}

/* ── Question ── */
.question-wrap { width: 100%; max-width: 420px; margin-bottom: 28px; }

.question-label {
  font-size: 0.68rem;
  letter-spacing: 0.28em;
  color: var(--gold);
  margin-bottom: 10px;
  text-transform: uppercase;
  font-family: 'Cinzel Decorative', serif;
}

.question-wrap textarea {
  width: 100%;
  background: rgba(255,252,250,0.85);
  border: 1.5px solid rgba(201,169,110,0.38);
  border-radius: 18px;
  color: var(--text);
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.05rem;
  padding: 16px 18px;
  resize: none;
  outline: none;
  line-height: 1.8;
  box-shadow: 0 4px 20px rgba(242,196,206,0.2), inset 0 1px 0 rgba(255,255,255,0.9);
  transition: border-color 0.3s, box-shadow 0.3s;
}
.question-wrap textarea::placeholder { color: #d0b0ba; font-style: italic; }
.question-wrap textarea:focus {
  border-color: rgba(201,169,110,0.65);
  box-shadow: 0 4px 28px rgba(242,196,206,0.35), inset 0 1px 0 rgba(255,255,255,0.9);
}

/* ── Button ── */
.draw-btn {
  background: linear-gradient(135deg, #c9a96e 0%, #f0d898 50%, #c9a96e 100%);
  background-size: 200% 100%;
  border: none;
  color: #2a1a20;
  font-family: 'Cinzel Decorative', serif;
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0.22em;
  padding: 15px 42px;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 6px 22px rgba(201,169,110,0.4), 0 2px 8px rgba(201,169,110,0.2);
  transition: background-position 0.4s, transform 0.15s, box-shadow 0.3s;
  margin-bottom: 50px;
  position: relative;
  overflow: hidden;
}
.draw-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.28), transparent 55%);
  border-radius: inherit;
}
.draw-btn:hover { background-position: 100% 0; transform: translateY(-2px); box-shadow: 0 10px 32px rgba(201,169,110,0.5); }
.draw-btn:active { transform: translateY(0); }
.draw-btn:disabled { opacity: 0.4; cursor: default; transform: none; box-shadow: none; }

/* ── Card scene ── */
.deck-area { display: flex; justify-content: center; margin-bottom: 44px; }

.card-scene {
  width: 190px;
  height: 320px;
  perspective: 1100px;
}

.tarot-card {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
}

.card-face {
  position: absolute;
  inset: 0;
  border-radius: 20px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  overflow: hidden;
}

/* ── Card back ── */
.card-back {
  background: linear-gradient(160deg, #0e0a0c 0%, #1a0f14 50%, #0e0a0c 100%);
  border: 2px solid var(--gold);
  box-shadow:
    0 20px 55px rgba(0,0,0,0.35),
    0 6px 18px rgba(0,0,0,0.25),
    inset 0 1px 0 rgba(201,169,110,0.2),
    0 0 0 1px rgba(201,169,110,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Card front ── */
.card-front {
  transform: rotateY(180deg);
  background: linear-gradient(160deg, #fff8fa 0%, #fff2f5 60%, #fff8f0 100%);
  border: 2px solid var(--gold);
  box-shadow:
    0 22px 60px rgba(201,169,110,0.22),
    0 8px 24px rgba(0,0,0,0.08),
    inset 0 1px 0 rgba(255,255,255,1),
    0 0 0 1px rgba(201,169,110,0.25);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 22px 16px 18px;
  gap: 9px;
  position: relative;
}

/* ── Front inner frame ── */
.front-frame-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.cf-number {
  font-family: 'Cinzel Decorative', serif;
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  color: var(--gold);
  opacity: 0.85;
  z-index: 1;
}

.cf-symbol {
  font-size: 3.2rem;
  line-height: 1;
  color: var(--gold);
  filter: drop-shadow(0 3px 10px rgba(201,169,110,0.55));
  z-index: 1;
}

.cf-name {
  font-family: 'Cinzel Decorative', serif;
  font-size: 1.0rem;
  color: var(--text);
  text-align: center;
  letter-spacing: 0.08em;
  line-height: 1.4;
  z-index: 1;
}

.cf-divider {
  width: 50px;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  z-index: 1;
}

.cf-keywords {
  font-size: 0.72rem;
  color: var(--text-mid);
  text-align: center;
  letter-spacing: 0.1em;
  line-height: 1.8;
  font-style: italic;
  z-index: 1;
}

/* ── Hover float ── */
.card-scene.hoverable .tarot-card {
  transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
}
.card-scene.hoverable:hover .tarot-card {
  transform: translateY(-14px) rotateX(4deg);
}
.card-scene.hoverable:hover .card-back {
  box-shadow:
    0 28px 65px rgba(0,0,0,0.4),
    0 0 35px rgba(201,169,110,0.3),
    inset 0 1px 0 rgba(201,169,110,0.2);
}

/* ── Flip animations ── */
@keyframes cardLift {
  0%   { transform: translateY(0) rotateY(0deg) rotateX(0deg); }
  25%  { transform: translateY(-28px) rotateY(0deg) rotateX(-9deg); }
  100% { transform: translateY(-28px) rotateY(90deg) rotateX(0deg); }
}
@keyframes cardReveal {
  0%   { transform: translateY(-28px) rotateY(90deg); }
  55%  { transform: translateY(-6px) rotateY(198deg); }
  72%  { transform: translateY(-1px) rotateY(184deg); }
  86%  { transform: translateY(0) rotateY(176deg); }
  100% { transform: translateY(0) rotateY(180deg); }
}

.tarot-card.flipping-out { animation: cardLift 0.5s cubic-bezier(0.55,0,1,0.45) forwards; }
.tarot-card.flipping-in  { animation: cardReveal 0.9s cubic-bezier(0.25,1,0.5,1) forwards; }

/* ── Burst ── */
.burst-p {
  position: absolute;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--gold2);
  pointer-events: none;
  z-index: 100;
  animation: burstOut 0.7s ease-out forwards;
}
@keyframes burstOut {
  0%   { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--bx),var(--by)) scale(0); opacity: 0; }
}

/* ── Result ── */
.tarot-result {
  width: 100%; max-width: 420px;
  opacity: 0; transform: translateY(14px);
  transition: opacity 0.6s 0.8s, transform 0.6s 0.8s;
  pointer-events: none;
}
.tarot-result.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

.result-name {
  font-family: 'Cinzel Decorative', serif;
  font-size: 1.45rem;
  text-align: center;
  letter-spacing: 0.1em;
  background: linear-gradient(135deg, #c9a96e, #f0d898, #c9a96e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
}

.result-suit {
  font-size: 0.85rem;
  color: var(--text-mid);
  text-align: center;
  letter-spacing: 0.15em;
  margin-bottom: 22px;
  font-style: italic;
}

.reading-box {
  background: rgba(255,252,250,0.8);
  backdrop-filter: blur(10px);
  border: 1.5px solid rgba(201,169,110,0.32);
  border-radius: 22px;
  padding: 26px 24px;
  box-shadow: 0 6px 36px rgba(242,196,206,0.18), inset 0 1px 0 rgba(255,255,255,0.95);
  position: relative;
  overflow: hidden;
}
.reading-box::before {
  content: '✦';
  position: absolute;
  top: 14px; left: 18px;
  color: var(--gold);
  font-size: 0.6rem;
  opacity: 0.5;
}
.reading-box::after {
  content: '✦';
  position: absolute;
  bottom: 14px; right: 18px;
  color: var(--gold);
  font-size: 0.6rem;
  opacity: 0.5;
}

.reading-label {
  font-family: 'Cinzel Decorative', serif;
  font-size: 0.62rem;
  letter-spacing: 0.3em;
  color: var(--gold);
  text-align: center;
  margin-bottom: 12px;
}

.reading-gold-line {
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
  margin-bottom: 16px;
}

.reading-content {
  font-size: 1.05rem;
  color: var(--text);
  line-height: 2;
  min-height: 64px;
  text-align: center;
}

.reading-placeholder { color: var(--text-light); font-style: italic; }
</style>
</head>
<body>

<!-- Scattered star deco -->
<div class="deco-field" id="decoField"></div>

<div class="tarot-wrap">

  <header class="tarot-header">
    <div class="tarot-eyebrow">✦ 塔 罗 占 卜 ✦</div>
    <div class="tarot-title">TAROT</div>
    <div class="tarot-subtitle">问出你心中的困惑，让牌给你答案</div>
  </header>

  <div class="ornament">
    <div class="orn-line"></div>
    <div class="orn-center">☽ &nbsp;✦&nbsp; ☾</div>
    <div class="orn-line r"></div>
  </div>

  <div class="question-wrap">
    <div class="question-label">你 的 问 题</div>
    <textarea id="tarotQuestion" rows="3" placeholder="此刻，你想问什么…"></textarea>
  </div>

  <button class="draw-btn" id="tarotDrawBtn" onclick="drawTarot()">✦ 抽 一 张 牌 ✦</button>

  <div class="deck-area" id="deckArea" style="display:none">
    <div class="card-scene" id="cardScene">
      <div class="tarot-card" id="tarotCard">

        <!-- ── Back face ── -->
        <div class="card-face card-back">
          <svg width="100%" height="100%" viewBox="0 0 190 320" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Outer gold border -->
            <rect x="8" y="8" width="174" height="304" rx="14" stroke="#c9a96e" stroke-width="1.5" opacity="0.9"/>
            <!-- Second inner border -->
            <rect x="15" y="15" width="160" height="290" rx="10" stroke="#c9a96e" stroke-width="0.7" opacity="0.5"/>
            <!-- Third inner border -->
            <rect x="22" y="22" width="146" height="276" rx="7" stroke="#c9a96e" stroke-width="0.5" stroke-dasharray="3 2" opacity="0.35"/>

            <!-- Top center ribbon banner -->
            <path d="M65 26 Q95 20 125 26 L128 38 Q95 32 62 38 Z" fill="#c9a96e" opacity="0.2"/>
            <path d="M65 26 Q95 20 125 26 L128 38 Q95 32 62 38 Z" stroke="#c9a96e" stroke-width="0.7" opacity="0.6"/>
            <!-- Bottom ribbon -->
            <path d="M65 294 Q95 300 125 294 L128 282 Q95 288 62 282 Z" fill="#c9a96e" opacity="0.2"/>
            <path d="M65 294 Q95 300 125 294 L128 282 Q95 288 62 282 Z" stroke="#c9a96e" stroke-width="0.7" opacity="0.6"/>

            <!-- Corner star ornaments -->
            <!-- TL -->
            <g transform="translate(30,36)">
              <polygon points="0,-9 2,-3 8,-3 3,1 5,7 0,3 -5,7 -3,1 -8,-3 -2,-3" fill="#c9a96e" opacity="0.7"/>
            </g>
            <!-- TR -->
            <g transform="translate(160,36)">
              <polygon points="0,-9 2,-3 8,-3 3,1 5,7 0,3 -5,7 -3,1 -8,-3 -2,-3" fill="#c9a96e" opacity="0.7"/>
            </g>
            <!-- BL -->
            <g transform="translate(30,284)">
              <polygon points="0,-9 2,-3 8,-3 3,1 5,7 0,3 -5,7 -3,1 -8,-3 -2,-3" fill="#c9a96e" opacity="0.7"/>
            </g>
            <!-- BR -->
            <g transform="translate(160,284)">
              <polygon points="0,-9 2,-3 8,-3 3,1 5,7 0,3 -5,7 -3,1 -8,-3 -2,-3" fill="#c9a96e" opacity="0.7"/>
            </g>

            <!-- Center large circle -->
            <circle cx="95" cy="160" r="68" stroke="#c9a96e" stroke-width="0.8" opacity="0.35"/>
            <circle cx="95" cy="160" r="54" stroke="#c9a96e" stroke-width="0.6" opacity="0.45"/>
            <circle cx="95" cy="160" r="36" stroke="#c9a96e" stroke-width="1" opacity="0.55"/>
            <!-- Center dot -->
            <circle cx="95" cy="160" r="5" fill="#c9a96e" opacity="0.8"/>
            <circle cx="95" cy="160" r="2" fill="#fff" opacity="0.6"/>

            <!-- Cross lines through center -->
            <line x1="95" y1="92" x2="95" y2="228" stroke="#c9a96e" stroke-width="0.5" opacity="0.3"/>
            <line x1="27" y1="160" x2="163" y2="160" stroke="#c9a96e" stroke-width="0.5" opacity="0.3"/>

            <!-- Diagonal lines -->
            <line x1="47" y1="110" x2="143" y2="210" stroke="#c9a96e" stroke-width="0.4" opacity="0.18"/>
            <line x1="143" y1="110" x2="47" y2="210" stroke="#c9a96e" stroke-width="0.4" opacity="0.18"/>

            <!-- 4 cardinal small stars on circle edge -->
            <g transform="translate(95,96)">
              <polygon points="0,-7 1.5,-2.5 6,-2.5 2.5,0.8 4,5.5 0,2.5 -4,5.5 -2.5,0.8 -6,-2.5 -1.5,-2.5" fill="#c9a96e" opacity="0.8"/>
            </g>
            <g transform="translate(95,224)">
              <polygon points="0,-7 1.5,-2.5 6,-2.5 2.5,0.8 4,5.5 0,2.5 -4,5.5 -2.5,0.8 -6,-2.5 -1.5,-2.5" fill="#c9a96e" opacity="0.8"/>
            </g>
            <g transform="translate(27,160)">
              <polygon points="0,-7 1.5,-2.5 6,-2.5 2.5,0.8 4,5.5 0,2.5 -4,5.5 -2.5,0.8 -6,-2.5 -1.5,-2.5" fill="#c9a96e" opacity="0.8"/>
            </g>
            <g transform="translate(163,160)">
              <polygon points="0,-7 1.5,-2.5 6,-2.5 2.5,0.8 4,5.5 0,2.5 -4,5.5 -2.5,0.8 -6,-2.5 -1.5,-2.5" fill="#c9a96e" opacity="0.8"/>
            </g>

            <!-- Moon crescent top-left area -->
            <path d="M52 80 Q44 92 52 104 Q38 96 38 92 Q38 84 52 80Z" fill="#c9a96e" opacity="0.45"/>
            <!-- Moon crescent bottom-right area -->
            <path d="M138 216 Q146 228 138 240 Q152 232 152 228 Q152 220 138 216Z" fill="#c9a96e" opacity="0.45"/>

            <!-- Tiny star scatter inside circle -->
            <text x="68" y="140" font-size="7" fill="#c9a96e" opacity="0.5" text-anchor="middle">✦</text>
            <text x="122" y="145" font-size="5" fill="#c9a96e" opacity="0.4" text-anchor="middle">✦</text>
            <text x="80" y="182" font-size="6" fill="#c9a96e" opacity="0.4" text-anchor="middle">✦</text>
            <text x="112" y="178" font-size="8" fill="#c9a96e" opacity="0.35" text-anchor="middle">✦</text>

            <!-- Side vertical ornament lines -->
            <line x1="28" y1="56" x2="28" y2="264" stroke="#c9a96e" stroke-width="0.5" opacity="0.25" stroke-dasharray="2 4"/>
            <line x1="162" y1="56" x2="162" y2="264" stroke="#c9a96e" stroke-width="0.5" opacity="0.25" stroke-dasharray="2 4"/>
          </svg>
        </div>

        <!-- ── Front face ── -->
        <div class="card-face card-front">
          <!-- Ornate frame SVG overlay -->
          <svg class="front-frame-svg" viewBox="0 0 190 320" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Double border -->
            <rect x="7" y="7" width="176" height="306" rx="15" stroke="#c9a96e" stroke-width="1.2" opacity="0.7"/>
            <rect x="13" y="13" width="164" height="294" rx="11" stroke="#c9a96e" stroke-width="0.6" opacity="0.4"/>
            <!-- Corner flourishes -->
            <g transform="translate(20,22)">
              <polygon points="0,-7 1.5,-2.5 6.5,-2.5 2.5,1 4,6 0,3 -4,6 -2.5,1 -6.5,-2.5 -1.5,-2.5" fill="#c9a96e" opacity="0.65"/>
            </g>
            <g transform="translate(170,22)">
              <polygon points="0,-7 1.5,-2.5 6.5,-2.5 2.5,1 4,6 0,3 -4,6 -2.5,1 -6.5,-2.5 -1.5,-2.5" fill="#c9a96e" opacity="0.65"/>
            </g>
            <g transform="translate(20,298)">
              <polygon points="0,-7 1.5,-2.5 6.5,-2.5 2.5,1 4,6 0,3 -4,6 -2.5,1 -6.5,-2.5 -1.5,-2.5" fill="#c9a96e" opacity="0.65"/>
            </g>
            <g transform="translate(170,298)">
              <polygon points="0,-7 1.5,-2.5 6.5,-2.5 2.5,1 4,6 0,3 -4,6 -2.5,1 -6.5,-2.5 -1.5,-2.5" fill="#c9a96e" opacity="0.65"/>
            </g>
            <!-- Top ribbon area line -->
            <line x1="30" y1="55" x2="160" y2="55" stroke="#c9a96e" stroke-width="0.7" opacity="0.4"/>
            <!-- Bottom ribbon area line -->
            <line x1="30" y1="265" x2="160" y2="265" stroke="#c9a96e" stroke-width="0.7" opacity="0.4"/>
            <!-- Side dash lines -->
            <line x1="20" y1="68" x2="20" y2="252" stroke="#c9a96e" stroke-width="0.5" opacity="0.2" stroke-dasharray="2 5"/>
            <line x1="170" y1="68" x2="170" y2="252" stroke="#c9a96e" stroke-width="0.5" opacity="0.2" stroke-dasharray="2 5"/>
            <!-- Tiny corner moons -->
            <path d="M26 32 Q22 38 26 44 Q18 40 18 38 Q18 34 26 32Z" fill="#c9a96e" opacity="0.4"/>
            <path d="M164 32 Q168 38 164 44 Q172 40 172 38 Q172 34 164 32Z" fill="#c9a96e" opacity="0.4"/>
          </svg>

          <div class="cf-number" id="cfNumber"></div>
          <div class="cf-symbol" id="cfSymbol"></div>
          <div class="cf-name" id="cfName"></div>
          <div class="cf-divider"></div>
          <div class="cf-keywords" id="cfKeywords"></div>
        </div>

      </div>
    </div>
  </div>

  <!-- Result -->
  <div class="tarot-result" id="tarotResult">
    <div class="result-name" id="resultName"></div>
    <div class="result-suit" id="resultSuit"></div>

let current = null, isDrawn = false, animating = false;

function spawnBurst(scene) {
  for (let i = 0; i < 16; i++) {
    const p = document.createElement('div');
    p.className = 'burst-p';
    const angle = (i / 16) * 360;
    const dist = 55 + Math.random() * 65;
    const rad = angle * Math.PI / 180;
    p.style.setProperty('--bx', `${Math.cos(rad)*dist}px`);
    p.style.setProperty('--by', `${Math.sin(rad)*dist}px`);
    p.style.cssText += `left:50%;top:50%;margin:-2.5px;animation-delay:${Math.random()*0.1}s;background:${Math.random()>.5?'#c9a96e':'#f2c4ce'}`;
    scene.appendChild(p);
    setTimeout(() => p.remove(), 900);
  }
}

function drawTarot() {
  if (animating) return;
  if (isDrawn) { resetTarot(); return; }

  const deck = document.getElementById('deckArea');
  const card = document.getElementById('tarotCard');
  const scene = document.getElementById('cardScene');
  const btn = document.getElementById('tarotDrawBtn');

  current = DECK[Math.floor(Math.random() * DECK.length)];
  document.getElementById('cfNumber').textContent = current.number;
  document.getElementById('cfSymbol').textContent = current.symbol;
  document.getElementById('cfName').textContent = current.name;
  document.getElementById('cfKeywords').textContent = current.keywords;

  deck.style.display = 'flex';
  btn.disabled = true;
  animating = true;

  card.classList.add('flipping-out');
  setTimeout(() => {
    spawnBurst(scene);
    card.classList.remove('flipping-out');
    card.classList.add('flipping-in');
    setTimeout(() => {
      card.classList.remove('flipping-in');
      card.style.transform = 'rotateY(180deg)';
      scene.classList.add('hoverable');
      showResult();
      btn.disabled = false;
      btn.textContent = '✦ 再 抽 一 张 ✦';
      isDrawn = true;
      animating = false;
    }, 900);
  }, 500);
}

function showResult() {
  const result = document.getElementById('tarotResult');
  document.getElementById('resultName').textContent = current.name;
  document.getElementById('resultSuit').textContent = current.suit + '  ·  ' + current.number;
  const content = document.getElementById('readingContent');
  content.innerHTML = '<span class="reading-placeholder">正在解读…</span>';
  result.classList.add('visible');

  // ── Replace with Edge Function ──
  // fetch('/functions/v1/tarot-reading', { method:'POST', headers:{'Content-Type':'application/json'},
  //   body: JSON.stringify({ question: document.getElementById('tarotQuestion').value, card: current })
  // }).then(r=>r.json()).then(d=>{ content.textContent = d.reading; });

  setTimeout(() => {
    if (content.querySelector('.reading-placeholder')) content.textContent = current.meaning;
  }, 1400);
}

function resetTarot() {
  if (animating) return;
  animating = true;
  const card = document.getElementById('tarotCard');
  const result = document.getElementById('tarotResult');
  const scene = document.getElementById('cardScene');
  const btn = document.getElementById('tarotDrawBtn');

  result.classList.remove('visible');
  scene.classList.remove('hoverable');
  card.style.transition = 'transform 0.5s ease-in';
  card.style.transform = 'rotateY(0deg)';

  setTimeout(() => {
    card.style.transition = '';
    document.getElementById('deckArea').style.display = 'none';
    btn.textContent = '✦ 抽 一 张 牌 ✦';
