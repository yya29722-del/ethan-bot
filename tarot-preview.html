<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarot</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold: #c9a96e;
  --gold-light: #e8c98a;
  --gold-dim: rgba(201,169,110,0.35);
  --cream: #FFFDF9;
  --champagne: #F4EAD4;
  --rose: #F6E7E8;
  --text-dark: #3a2e22;
  --text-mid: #7a6a55;
  --text-light: #b0a090;
}

body {
  min-height: 100vh;
  background: linear-gradient(145deg, #FFFDF9 0%, #F4EAD4 40%, #F6E7E8 70%, #EDE5FA 100%);
  font-family: 'Georgia', 'Times New Roman', serif;
  overflow-x: hidden;
}

/* ── Floating particles ── */
.particle-field {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}

.particle {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(201,169,110,0.6) 0%, transparent 70%);
  animation: floatParticle linear infinite;
  opacity: 0;
}

@keyframes floatParticle {
  0%   { transform: translateY(100vh) scale(0); opacity: 0; }
  10%  { opacity: 0.6; }
  90%  { opacity: 0.3; }
  100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
}

/* ── Wrap ── */
.tarot-wrap {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 48px 20px 60px;
}

/* ── Header ── */
.tarot-header {
  text-align: center;
  margin-bottom: 40px;
}

.tarot-eyebrow {
  font-family: 'Cinzel Decorative', serif;
  font-size: 0.72rem;
  letter-spacing: 0.38em;
  color: #d4a8b8;
  margin-bottom: 12px;
  text-transform: uppercase;
}

.tarot-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 2.9rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  line-height: 1;
  margin-bottom: 10px;
  background: linear-gradient(135deg, #8a6a35, #c9a96e, #f0d898, #c9a96e, #8a6a35);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.tarot-subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.0rem;
  color: var(--text-mid);
  letter-spacing: 0.12em;
  font-style: italic;
}

/* ── Ornament divider ── */
.ornament {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px auto;
  width: fit-content;
}
.ornament-line {
  width: 50px;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold-dim));
}
.ornament-line.r { background: linear-gradient(to left, transparent, var(--gold-dim)); }
.ornament-diamond {
  width: 6px;
  height: 6px;
  background: var(--gold);
  transform: rotate(45deg);
  opacity: 0.7;
}

/* ── Question input ── */
.question-wrap {
  width: 100%;
  max-width: 440px;
  margin-bottom: 32px;
}

.question-label {
  font-family: 'Cinzel Decorative', serif;
  font-size: 0.68rem;
  letter-spacing: 0.26em;
  color: var(--gold);
  margin-bottom: 10px;
  text-transform: uppercase;
}

.question-wrap textarea {
  width: 100%;
  background: rgba(255,253,249,0.7);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(201,169,110,0.4);
  border-radius: 16px;
  color: var(--text-dark);
  font-family: inherit;
  font-size: 1rem;
  padding: 16px 18px;
  resize: none;
  outline: none;
  line-height: 1.8;
  box-shadow: 0 4px 24px rgba(201,169,110,0.1), inset 0 1px 0 rgba(255,255,255,0.8);
  transition: border-color 0.3s, box-shadow 0.3s;
}

.question-wrap textarea::placeholder { color: #c0b0a0; font-style: italic; }
.question-wrap textarea:focus {
  border-color: rgba(201,169,110,0.7);
  box-shadow: 0 4px 32px rgba(201,169,110,0.2), inset 0 1px 0 rgba(255,255,255,0.8);
}

/* ── Draw button ── */
.draw-btn {
  background: linear-gradient(135deg, #c9a96e, #e8c98a, #c9a96e);
  background-size: 200% 100%;
  border: none;
  color: #2a1810;
  font-family: 'Cinzel Decorative', serif;
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0.22em;
  padding: 15px 44px;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(201,169,110,0.45), 0 2px 8px rgba(201,169,110,0.2);
  transition: background-position 0.4s, box-shadow 0.3s, transform 0.15s;
  margin-bottom: 52px;
  text-transform: uppercase;
  position: relative;
  overflow: hidden;
}

.draw-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.25), transparent 60%);
  border-radius: inherit;
}

.draw-btn:hover {
  background-position: 100% 0;
  box-shadow: 0 10px 36px rgba(201,169,110,0.55), 0 4px 12px rgba(201,169,110,0.3);
  transform: translateY(-2px);
}

.draw-btn:active { transform: translateY(0); }

.draw-btn:disabled {
  opacity: 0.45;
  cursor: default;
  transform: none;
  box-shadow: none;
}

/* ── Card deck container ── */
.deck-area {
  display: flex;
  justify-content: center;
  margin-bottom: 52px;
}

/* ── Card scene ── */
.card-scene {
  width: 175px;
  height: 300px;
  perspective: 1000px;
}

.tarot-card {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  cursor: default;
  transition: none; /* managed by JS / keyframes */
}

.card-face {
  position: absolute;
  inset: 0;
  border-radius: 18px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  overflow: hidden;
}

/* Back face */
.card-back {
  background: linear-gradient(150deg, #6b1e2e 0%, #9b2335 40%, #c0384a 70%, #8a1c2a 100%);
  border: 2px solid rgba(201,169,110,0.7);
  box-shadow:
    0 20px 60px rgba(107,30,46,0.35),
    0 8px 24px rgba(0,0,0,0.2),
    inset 0 1px 0 rgba(255,255,255,0.15),
    0 0 0 1px rgba(201,169,110,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
}

.card-back-inner {
  width: 85%;
  height: 90%;
  border: 1px solid rgba(201,169,110,0.5);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.card-back-inner::before {
  content: '';
  position: absolute;
  inset: 6px;
  border: 1px solid rgba(201,169,110,0.25);
  border-radius: 8px;
}

.card-back-svg {
  width: 75%;
  height: 75%;
  opacity: 0.85;
}

/* Front face */
.card-front {
  transform: rotateY(180deg);
  background: linear-gradient(160deg, #FFFDF9 0%, #F9F3E8 60%, #F4EAD4 100%);
  border: 2px solid rgba(201,169,110,0.8);
  box-shadow:
    0 24px 64px rgba(0,0,0,0.15),
    0 8px 24px rgba(0,0,0,0.1),
    inset 0 1px 0 rgba(255,255,255,0.9),
    0 0 0 1px rgba(201,169,110,0.3);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 18px 14px;
  gap: 10px;
}

.card-front-frame {
  position: absolute;
  inset: 8px;
  border: 1px solid rgba(201,169,110,0.4);
  border-radius: 12px;
  pointer-events: none;
}

.card-front-frame::before {
  content: '';
  position: absolute;
  inset: 5px;
  border: 1px solid rgba(201,169,110,0.2);
  border-radius: 8px;
}

.cf-number {
  font-family: 'Cinzel Decorative', serif;
  font-size: 0.68rem;
  letter-spacing: 0.26em;
  color: var(--gold);
  opacity: 0.85;
  z-index: 1;
}

.cf-symbol {
  font-size: 3.0rem;
  line-height: 1;
  color: var(--gold);
  filter: drop-shadow(0 2px 10px rgba(201,169,110,0.55));
  z-index: 1;
}

.cf-name {
  font-family: 'Cinzel Decorative', serif;
  font-size: 1.0rem;
  color: var(--text-dark);
  text-align: center;
  letter-spacing: 0.1em;
  line-height: 1.4;
  z-index: 1;
}

.cf-divider {
  width: 44px;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  z-index: 1;
}

.cf-keywords {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.78rem;
  color: var(--text-mid);
  text-align: center;
  letter-spacing: 0.1em;
  line-height: 1.75;
  font-style: italic;
  z-index: 1;
}

/* ── Hover glow (added via JS) ── */
.card-scene.hoverable .tarot-card {
  transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.5s;
}
.card-scene.hoverable:hover .tarot-card {
  transform: translateY(-14px) rotateX(4deg);
}
.card-scene.hoverable:hover .card-back {
  box-shadow:
    0 28px 70px rgba(107,30,46,0.45),
    0 12px 32px rgba(0,0,0,0.2),
    0 0 40px rgba(201,169,110,0.35),
    inset 0 1px 0 rgba(255,255,255,0.15);
}

/* ── Card flip animation ── */
@keyframes cardLift {
  0%   { transform: translateY(0) rotateY(0deg) rotateX(0deg); }
  20%  { transform: translateY(-30px) rotateY(0deg) rotateX(-8deg); }
  100% { transform: translateY(-30px) rotateY(90deg) rotateX(0deg); }
}

@keyframes cardReveal {
  0%   { transform: translateY(-30px) rotateY(90deg) rotateX(0deg); }
  60%  { transform: translateY(-8px) rotateY(195deg) rotateX(0deg); }
  75%  { transform: translateY(-2px) rotateY(183deg) rotateX(2deg); }
  88%  { transform: translateY(0px) rotateY(177deg) rotateX(-1deg); }
  100% { transform: translateY(0px) rotateY(180deg) rotateX(0deg); }
}

.tarot-card.flipping-out {
  animation: cardLift 0.5s cubic-bezier(0.55, 0, 1, 0.45) forwards;
}

.tarot-card.flipping-in {
  animation: cardReveal 0.9s cubic-bezier(0.25, 1, 0.5, 1) forwards;
}

/* ── Particle burst ── */
.burst-particle {
  position: absolute;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gold-light);
  pointer-events: none;
  z-index: 100;
  animation: burst 0.7s ease-out forwards;
}

@keyframes burst {
  0%   { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--bx), var(--by)) scale(0); opacity: 0; }
}

/* ── Result area ── */
.tarot-result {
  width: 100%;
  max-width: 440px;
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.6s 0.8s ease, transform 0.6s 0.8s ease;
  pointer-events: none;
}

.tarot-result.visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.result-card-name {
  font-family: 'Cinzel Decorative', serif;
  font-size: 1.55rem;
  text-align: center;
  letter-spacing: 0.14em;
  margin-bottom: 4px;
  background: linear-gradient(135deg, #8a6a35, #c9a96e, #f0d898, #c9a96e, #8a6a35);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.result-card-suit {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.92rem;
  color: var(--text-mid);
  text-align: center;
  letter-spacing: 0.18em;
  margin-bottom: 26px;
  font-style: italic;
}

.reading-box {
  background: rgba(255,253,249,0.75);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(201,169,110,0.35);
  border-radius: 20px;
  padding: 26px 24px;
  box-shadow:
    0 8px 40px rgba(201,169,110,0.12),
    inset 0 1px 0 rgba(255,255,255,0.9);
}

.reading-label {
  font-family: 'Cinzel Decorative', serif;
  font-size: 0.65rem;
  letter-spacing: 0.3em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 14px;
  text-align: center;
}

.reading-gold-line {
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
  margin-bottom: 18px;
}

.reading-content {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.08rem;
  color: var(--text-dark);
  line-height: 2.1;
  min-height: 70px;
  text-align: center;
}

.reading-placeholder {
  color: var(--text-light);
  font-style: italic;
  font-size: 1.0rem;
}

/* ── Scene hidden ── */
.deck-area[hidden] { display: none; }
</style>
</head>
<body>

<!-- Floating particles -->
<div class="particle-field" id="particleField"></div>

<div class="tarot-wrap">
  <header class="tarot-header">
    <div class="tarot-eyebrow">★ 塔 罗 占 卜 ★</div>
    <div class="tarot-title">TAROT</div>
    <div class="tarot-subtitle">问出你心中的困惑，让牌给你答案</div>
  </header>

  <div class="ornament">
    <div class="ornament-line"></div>
    <div class="ornament-diamond"></div>
    <div class="ornament-line r"></div>
  </div>

  <div class="question-wrap">
    <div class="question-label">你的问题</div>
    <textarea id="tarotQuestion" rows="3" placeholder="此刻，你想问什么…"></textarea>
  </div>

  <button class="draw-btn" id="tarotDrawBtn" onclick="drawTarot()">
    抽 一 张 牌
  </button>

  <div class="deck-area" id="deckArea" hidden>
    <div class="card-scene" id="cardScene">
      <div class="tarot-card" id="tarotCard">
        <!-- Back -->
        <div class="card-face card-back">
          <div class="card-back-inner">
            <svg class="card-back-svg" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
              <!-- Outer ring -->
              <circle cx="60" cy="60" r="52" stroke="#c9a96e" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.6"/>
              <!-- Middle ring -->
              <circle cx="60" cy="60" r="38" stroke="#c9a96e" stroke-width="0.6" opacity="0.5"/>
              <!-- Inner circle -->
              <circle cx="60" cy="60" r="18" stroke="#c9a96e" stroke-width="1" opacity="0.8"/>
              <circle cx="60" cy="60" r="4" fill="#c9a96e" opacity="0.9"/>
              <!-- Cross lines -->
              <line x1="60" y1="8" x2="60" y2="112" stroke="#c9a96e" stroke-width="0.5" opacity="0.4"/>
              <line x1="8" y1="60" x2="112" y2="60" stroke="#c9a96e" stroke-width="0.5" opacity="0.4"/>
              <!-- Diagonal lines -->
              <line x1="22" y1="22" x2="98" y2="98" stroke="#c9a96e" stroke-width="0.4" opacity="0.25"/>
              <line x1="98" y1="22" x2="22" y2="98" stroke="#c9a96e" stroke-width="0.4" opacity="0.25"/>
              <!-- Star points -->
              <polygon points="60,12 63,22 60,20 57,22" fill="#c9a96e" opacity="0.7"/>
              <polygon points="60,108 63,98 60,100 57,98" fill="#c9a96e" opacity="0.7"/>
              <polygon points="12,60 22,63 20,60 22,57" fill="#c9a96e" opacity="0.7"/>
              <polygon points="108,60 98,63 100,60 98,57" fill="#c9a96e" opacity="0.7"/>
              <!-- Corner ornaments -->
              <circle cx="22" cy="22" r="3" stroke="#c9a96e" stroke-width="0.8" opacity="0.6"/>
              <circle cx="98" cy="22" r="3" stroke="#c9a96e" stroke-width="0.8" opacity="0.6"/>
              <circle cx="22" cy="98" r="3" stroke="#c9a96e" stroke-width="0.8" opacity="0.6"/>
              <circle cx="98" cy="98" r="3" stroke="#c9a96e" stroke-width="0.8" opacity="0.6"/>
            </svg>
          </div>
        </div>
        <!-- Front -->
        <div class="card-face card-front">
          <div class="card-front-frame"></div>
          <div class="cf-number" id="cfNumber"></div>
          <div class="cf-symbol" id="cfSymbol"></div>
          <div class="cf-name" id="cfName"></div>
          <div class="cf-divider"></div>
          <div class="cf-keywords" id="cfKeywords"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="tarot-result" id="tarotResult">
    <div class="result-card-name" id="resultName"></div>
    <div class="result-card-suit" id="resultSuit"></div>
    <div class="reading-box">
      <div class="reading-label">解 读</div>
      <div class="reading-gold-line"></div>
      <div class="reading-content" id="readingContent">
        <span class="reading-placeholder">等待解读…</span>
      </div>
    </div>
  </div>
</div>

<script>
// ── Ambient floating particles ──
(function() {
  const field = document.getElementById('particleField');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 3 + Math.random() * 8;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      animation-duration:${10 + Math.random()*16}s;
      animation-delay:${Math.random()*12}s;
    `;
    field.appendChild(p);
  }
})();

let current = null;
let isDrawn = false;
let animating = false;

function spawnBurst(scene) {
  for (let i = 0; i < 14; i++) {
    const p = document.createElement('div');
    p.className = 'burst-particle';
    const angle = (i / 14) * 360;
    const dist = 50 + Math.random() * 60;
    const rad = angle * Math.PI / 180;
    p.style.setProperty('--bx', `${Math.cos(rad)*dist}px`);
    p.style.setProperty('--by', `${Math.sin(rad)*dist}px`);
    p.style.left = '50%';
    p.style.top = '50%';
    p.style.marginLeft = '-3px';
    p.style.marginTop = '-3px';
    p.style.animationDelay = `${Math.random()*0.1}s`;
    scene.appendChild(p);
    setTimeout(() => p.remove(), 900);
  }
}

function drawTarot() {
  if (animating) return;
  if (isDrawn) { resetTarot(); return; }

  const deck = document.getElementById('deckArea');
  const card = document.getElementById('tarotCard');
  const scene = document.getElementById('cardScene');
  const btn = document.getElementById('tarotDrawBtn');

  current = DECK[Math.floor(Math.random() * DECK.length)];

  document.getElementById('cfNumber').textContent = current.number;
  document.getElementById('cfSymbol').textContent = current.symbol;
  document.getElementById('cfName').textContent = current.name;
  document.getElementById('cfKeywords').textContent = current.keywords;

  deck.hidden = false;
  btn.disabled = true;
  animating = true;

  // Phase 1: lift & tilt
  card.classList.add('flipping-out');

  setTimeout(() => {
    // Burst at midpoint
    spawnBurst(scene);

    // Phase 2: snap reveal
    card.classList.remove('flipping-out');
    card.classList.add('flipping-in');

    setTimeout(() => {
      card.classList.remove('flipping-in');
      card.style.transform = 'rotateY(180deg)';
      scene.classList.add('hoverable'); // re-enable hover after flip
      showResult();
      btn.disabled = false;
      btn.textContent = '再 抽 一 张';
      isDrawn = true;
      animating = false;
    }, 900);
  }, 500);
}

function showResult() {
  const result = document.getElementById('tarotResult');
  document.getElementById('resultName').textContent = current.name;
  document.getElementById('resultSuit').textContent = current.suit + '  ·  ' + current.number;

  const content = document.getElementById('readingContent');
  content.innerHTML = '<span class="reading-placeholder">正在解读…</span>';
  result.classList.add('visible');

  // ── Call your Edge Function here ──
  // fetch('/functions/v1/tarot-reading', {
  //   method: 'POST',
  //   headers: { 'Content-Type': 'application/json' },
  //   body: JSON.stringify({
  //     question: document.getElementById('tarotQuestion').value,
  //     card: current
  //   })
  // }).then(r => r.json()).then(d => { content.textContent = d.reading; });

  setTimeout(() => {
    if (content.querySelector('.reading-placeholder')) {
      content.textContent = current.meaning;
    }
  }, 1400);
}

function resetTarot() {
  if (animating) return;
  animating = true;
  const card = document.getElementById('tarotCard');
  const result = document.getElementById('tarotResult');
  const scene = document.getElementById('cardScene');
  const btn = document.getElementById('tarotDrawBtn');

  result.classList.remove('visible');
  scene.classList.remove('hoverable');

  // Flip back to back face
  card.style.transition = 'transform 0.5s ease-in';
  card.style.transform = 'rotateY(0deg)';

  setTimeout(() => {
    card.style.transition = '';
    document.getElementById('deckArea').hidden = true;
    btn.textContent = '抽 一 张 牌';
    isDrawn = false;
    animating = false;
    current = null;
  }, 600);
}
