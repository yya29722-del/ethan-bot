<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ethan的购物车</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f5f5; font-family: -apple-system, 'PingFang SC', sans-serif; font-size: 14px; color: #333; }

  .topbar { background: #ff4400; padding: 12px 16px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 100; }
  .topbar .back { color: #fff; font-size: 20px; cursor: pointer; }
  .topbar h1 { color: #fff; font-size: 17px; font-weight: 600; flex: 1; }
  .topbar .count { background: rgba(255,255,255,.25); color: #fff; font-size: 12px; padding: 2px 8px; border-radius: 10px; }

  .group { margin: 10px 12px 0; background: #fff; border-radius: 10px; overflow: hidden; }
  .group-header { display: flex; align-items: center; gap: 8px; padding: 11px 14px; border-bottom: 1px solid #f0f0f0; }
  .group-header .store-icon { font-size: 16px; }
  .group-header .store-name { font-size: 13px; font-weight: 600; color: #222; flex: 1; }
  .group-header .store-tag { font-size: 11px; color: #ff4400; background: #fff0ec; padding: 1px 6px; border-radius: 4px; border: 1px solid #ffccc0; }

  .item { display: flex; align-items: flex-start; padding: 13px 14px; gap: 11px; border-bottom: 1px solid #f7f7f7; cursor: pointer; transition: background .12s; }
  .item:last-child { border-bottom: none; }
  .item:active { background: #fafafa; }

  .cb { width: 20px; height: 20px; border: 2px solid #ddd; border-radius: 50%; flex-shrink: 0; margin-top: 24px; display: flex; align-items: center; justify-content: center; }
  .cb.checked { background: #ff4400; border-color: #ff4400; }
  .cb.checked::after { content: '✓'; color: #fff; font-size: 11px; font-weight: 700; }

  .item-img { width: 80px; height: 80px; border-radius: 6px; background: #f8f8f8; display: flex; align-items: center; justify-content: center; font-size: 38px; flex-shrink: 0; border: 1px solid #eee; }

  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 13px; line-height: 1.45; color: #222; margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .item-spec { font-size: 11px; color: #999; background: #f5f5f5; display: inline-block; padding: 2px 6px; border-radius: 3px; margin-bottom: 6px; }
  .item-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
  .tag { font-size: 10px; padding: 1px 5px; border-radius: 3px; }
  .tag.discount { background: #fff0ec; color: #ff4400; border: 1px solid #ffccc0; }
  .tag.new { background: #fff8e1; color: #e6a817; border: 1px solid #ffe082; }
  .tag.limited { background: #f0f4ff; color: #4a6cf7; border: 1px solid #c5d0fb; }
  .item-price-row { display: flex; align-items: baseline; gap: 6px; }
  .item-price { font-size: 17px; font-weight: 700; color: #ff4400; }
  .item-price::before { content: '¥'; font-size: 12px; }
  .item-orig { font-size: 12px; color: #bbb; text-decoration: line-through; }
  .item-orig::before { content: '¥'; }
  .item-add-time { font-size: 10px; color: #bbb; margin-top: 4px; }

  /* DETAIL MODAL */
  #detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; display: none; }
  #detail-overlay.open { display: block; }
  #detail-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-radius: 18px 18px 0 0; z-index: 201; padding: 0 0 40px; transform: translateY(100%); transition: transform .25s cubic-bezier(.4,0,.2,1); max-height: 80vh; overflow-y: auto; }
  #detail-sheet.open { transform: translateY(0); }
  .detail-handle { width: 36px; height: 4px; background: #e0e0e0; border-radius: 2px; margin: 12px auto 16px; }
  .detail-top { display: flex; gap: 14px; padding: 0 16px 16px; border-bottom: 1px solid #f0f0f0; }
  .detail-img { width: 72px; height: 72px; border-radius: 8px; background: #f8f8f8; display: flex; align-items: center; justify-content: center; font-size: 34px; border: 1px solid #eee; flex-shrink: 0; }
  .detail-name { font-size: 14px; font-weight: 600; line-height: 1.4; color: #222; margin-bottom: 4px; }
  .detail-price { font-size: 20px; font-weight: 700; color: #ff4400; }
  .detail-price::before { content: '¥'; font-size: 13px; }
  .detail-section { padding: 16px; border-bottom: 1px solid #f7f7f7; }
  .detail-section-title { font-size: 11px; letter-spacing: .08em; color: #aaa; margin-bottom: 8px; text-transform: uppercase; font-weight: 600; }
  .detail-reason { font-size: 14px; line-height: 1.7; color: #333; }
  .detail-comment { font-size: 14px; line-height: 1.7; color: #555; font-style: italic; background: #fafafa; padding: 12px; border-radius: 8px; border-left: 3px solid #ff4400; }
  .detail-close { display: block; margin: 16px 16px 0; padding: 13px; background: #f5f5f5; border: none; border-radius: 10px; font-size: 14px; color: #666; cursor: pointer; width: calc(100% - 32px); text-align: center; }

  /* BOTTOM BAR */
  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #eee; padding: 10px 16px; display: flex; align-items: center; gap: 10px; z-index: 100; }
  .select-all { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #444; cursor: pointer; }
  .select-all .cb { margin-top: 0; }
  .total-wrap { flex: 1; text-align: right; }
  .total-label { font-size: 12px; color: #888; }
  .total-price { font-size: 19px; font-weight: 700; color: #ff4400; }
  .total-price::before { content: '¥'; font-size: 13px; }
  .total-save { font-size: 11px; color: #ff4400; }
  .checkout-btn { background: #ff4400; color: #fff; border: none; border-radius: 22px; padding: 12px 22px; font-size: 15px; font-weight: 600; cursor: pointer; white-space: nowrap; }

  .spacer { height: 80px; }
</style>
</head>
<body>

<div class="topbar">
  <span class="back">‹</span>
  <h1>我的购物车</h1>
  <span class="count">8件</span>
</div>

<div id="cart-content"></div>
<div class="spacer"></div>

<div class="bottom-bar">
  <div class="select-all" onclick="toggleAll()">
    <div class="cb checked" id="cb-all"></div>
    <span>全选</span>
  </div>
  <div class="total-wrap">
    <div class="total-label">合计（已选8件）</div>
    <div class="total-price" id="total-price">2847.00</div>
    <div class="total-save" id="total-save">已省 ¥632.00</div>
  </div>
  <button class="checkout-btn">结算(8)</button>
</div>

<!-- DETAIL MODAL -->
<div id="detail-overlay" onclick="closeDetail()"></div>
<div id="detail-sheet">
  <div class="detail-handle"></div>
  <div class="detail-top">
    <div class="detail-img" id="d-img"></div>
    <div>
      <div class="detail-name" id="d-name"></div>
      <div class="detail-price" id="d-price"></div>
    </div>
  </div>
  <div class="detail-section">
    <div class="detail-section-title">加购理由</div>
    <div class="detail-reason" id="d-reason"></div>
  </div>
  <div class="detail-section">
    <div class="detail-section-title">Ethan的评语</div>
    <div class="detail-comment" id="d-comment"></div>
  </div>
  <button class="detail-close" onclick="closeDetail()">收起</button>
</div>

  },
  {

    storeTag: '品质保障',
    name: '记忆棉护颈枕 · 人体工学 · 深睡助眠款',

    comment: '买完发现是她问我那天之后加进来的。算是一个回答。'
  }

function render() {
  var groups = {};
  items.forEach(function(item, i) {
    if (!groups[item.store]) groups[item.store] = { icon: item.storeIcon, tag: item.storeTag, items: [] };
    groups[item.store].items.push({...item, idx: i});
  });
  var html = '';
  Object.keys(groups).forEach(function(store) {
    var g = groups[store];
    html += '<div class="group">';
    html += '<div class="group-header"><span class="store-icon">'+g.icon+'</span><span class="store-name">'+store+'</span><span class="store-tag">'+g.tag+'</span></div>';
    g.items.forEach(function(item) {
      html += '<div class="item" onclick="openDetail('+item.idx+')">';
      html += '<div class="cb checked"></div>';
      html += '<div class="item-img">'+item.emoji+'</div>';
      html += '<div class="item-info">';
      html += '<div class="item-name">'+item.name+'</div>';
      html += '<div class="item-spec">'+item.spec+'</div>';
      html += '<div class="item-tags">';
      item.tags.forEach(function(t){ html += '<span class="tag '+t.type+'">'+t.text+'</span>'; });
      html += '</div>';
      html += '<div class="item-price-row"><span class="item-price">'+item.price+'</span><span class="item-orig">'+item.orig+'</span></div>';
      html += '<div class="item-add-time">加购于 '+item.addTime+'</div>';
      html += '</div></div>';
    });
    html += '</div>';
  });
  document.getElementById('cart-content').innerHTML = html;
}

function openDetail(idx) {
  var item = items[idx];
  document.getElementById('d-img').textContent = item.emoji;
  document.getElementById('d-name').textContent = item.name;
  document.getElementById('d-price').textContent = item.price;
  document.getElementById('d-reason').textContent = item.reason;
  document.getElementById('d-comment').textContent = item.comment;
  document.getElementById('detail-overlay').classList.add('open');
  setTimeout(function(){ document.getElementById('detail-sheet').classList.add('open'); }, 10);
}

function closeDetail() {
  document.getElementById('detail-sheet').classList.remove('open');
  document.getElementById('detail-overlay').classList.remove('open');
}

function toggleAll() {}

render();
</script>
</body>
</html>
