<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Round Table</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --ivory:#FFFDF9;--champagne:#F4EAD4;--gold:#C9A84C;--gold-dim:rgba(201,168,76,.28);
  --burgundy:#8B1E2F;--text:#2C1810;--text2:#7A5C4A;--text3:#B09080;
  --cc-bg:#fef9ec;--cc-border:rgba(201,168,76,.35);--cc-dot:#b8860b;
  --arch-bg:#f0f4f8;--arch-border:rgba(100,140,180,.3);--arch-dot:#4a7a9b;
  --sidebar-w:260px;
}
body{font-family:-apple-system,sans-serif;background:var(--champagne);color:var(--text);height:100dvh;overflow:hidden;display:flex;}

/* SIDEBAR */
#sidebar{width:var(--sidebar-w);flex-shrink:0;background:linear-gradient(180deg,var(--ivory),#FAF5ED);border-right:1px solid var(--gold-dim);display:flex;flex-direction:column;overflow:hidden;transition:transform .28s ease;}
.sb-brand{padding:max(20px,env(safe-area-inset-top)) 16px 14px;border-bottom:1px solid var(--gold-dim);}
.sb-brand-top{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.3em;color:var(--text3);text-transform:uppercase;}
.sb-brand-title{font-family:'Great Vibes',cursive;font-size:24px;color:var(--burgundy);margin-top:2px;}
.sb-section{padding:12px 14px 4px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.25em;color:var(--gold);text-transform:uppercase;}
.sb-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:16px;}
.room-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;transition:.15s;font-size:13px;color:var(--text2);position:relative;border:none;background:none;width:100%;text-align:left;}
.room-item.active{background:rgba(201,168,76,.1);color:var(--burgundy);}
.room-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:2px;background:var(--gold);border-radius:0 2px 2px 0;}
.room-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0;}
.room-name-txt{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.06em;}
.topic-item{display:flex;align-items:center;padding:7px 14px 7px 22px;cursor:pointer;font-size:12px;color:var(--text3);gap:8px;transition:.15s;border:none;background:none;width:100%;text-align:left;}
.topic-item.active{background:rgba(201,168,76,.08);color:var(--text);}
.topic-item.active .t-dot{background:var(--gold);}
.t-dot{width:5px;height:5px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.t-label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.t-date{font-size:10px;color:var(--text3);flex-shrink:0;}
.sb-add{display:flex;align-items:center;gap:8px;padding:8px 14px;font-size:11px;color:var(--text3);cursor:pointer;font-family:'Cinzel',serif;letter-spacing:.05em;border:none;background:none;width:100%;text-align:left;}
.sb-add:active{color:var(--gold);}
.sb-footer{padding:10px 14px max(12px,env(safe-area-inset-bottom));border-top:1px solid var(--gold-dim);}
.back-btn{font-size:11px;color:var(--text3);font-family:'Cinzel',serif;letter-spacing:.06em;background:none;border:none;cursor:pointer;padding:4px 0;}

/* SCRIM */
#scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:40;}

/* MAIN */
#main{flex:1;min-width:0;display:flex;flex-direction:column;height:100dvh;}
#header{display:flex;align-items:center;gap:8px;padding:max(14px,env(safe-area-inset-top)) 16px 11px;background:rgba(255,253,249,.97);border-bottom:1px solid var(--gold-dim);flex-shrink:0;}
#hamburger{display:none;background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2);padding:0 4px 0 0;}
#h-room{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.1em;color:var(--burgundy);text-transform:uppercase;}
#h-sep{color:var(--gold-dim);}
#h-topic{font-size:12px;color:var(--text3);font-family:'Cinzel',serif;}
.export-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;display:flex;align-items:center;flex-shrink:0;}
.export-btn:hover{color:var(--gold);}
.msg-export-btn{background:none;border:none;cursor:pointer;color:var(--text3);opacity:.5;padding:2px;display:inline-flex;align-items:center;vertical-align:middle;margin-left:4px;flex-shrink:0;}
.msg-export-btn:hover{opacity:1;color:var(--gold);}
.mtime-row{display:flex;align-items:center;gap:2px;}
.msg-row.user .mtime-row{justify-content:flex-end;}
.sdots{display:flex;gap:10px;margin-left:auto;}
.schip{display:flex;align-items:center;gap:5px;font-size:10px;font-family:'Cinzel',serif;color:var(--text3);}
.sdot{width:7px;height:7px;border-radius:50%;background:#22c55e;transition:background .3s;}
.sdot.thinking{background:#eab308;animation:pulse .7s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* MESSAGES */
#messages{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 8px;display:flex;flex-direction:column;gap:12px;}
.msg-row{display:flex;gap:8px;max-width:88%;}
.msg-row.user{align-self:flex-end;flex-direction:row-reverse;}
.msg-row.claude,.msg-row.codex{align-self:flex-start;}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:'Cinzel',serif;font-weight:600;flex-shrink:0;margin-top:2px;}
.msg-row.user .av{background:var(--burgundy);color:#fff;}
.msg-row.claude .av{background:var(--cc-dot);color:#fff;}
.msg-row.codex .av{background:var(--arch-dot);color:#fff;}
.mbody{display:flex;flex-direction:column;gap:3px;}
.mname{font-size:10px;font-family:'Cinzel',serif;letter-spacing:.04em;color:var(--text3);}
.msg-row.user .mname{text-align:right;}
.bubble{padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
.msg-row.user   .bubble{background:var(--champagne);border:1px solid var(--cc-border);border-radius:14px 14px 4px 14px;}
.msg-row.claude .bubble{background:var(--cc-bg);border:1px solid var(--cc-border);border-radius:4px 14px 14px 14px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.msg-row.codex  .bubble{background:var(--arch-bg);border:1px solid var(--arch-border);border-radius:4px 14px 14px 14px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.bubble-text:empty{display:none;}
.atts{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.att-img{display:block;max-width:min(280px,70vw);max-height:260px;border-radius:10px;border:1px solid rgba(201,168,76,.25);object-fit:cover;background:#fff;}
.att-file{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:10px;border:1px solid var(--gold-dim);background:rgba(255,253,249,.58);color:var(--text);text-decoration:none;white-space:normal;}
.att-ico{font-size:18px;line-height:1;}
.att-name{font-size:13px;font-weight:600;word-break:break-word;}
.att-meta{font-size:10px;color:var(--text3);margin-top:1px;}
.mtime{font-size:10px;color:var(--text3);}
.msg-row.user .mtime{text-align:right;}
.typing .bubble{display:flex;align-items:center;gap:4px;padding:12px 16px;}
.typing .bubble span{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.5;animation:tb 1.1s ease-in-out infinite;}
.typing .bubble span:nth-child(2){animation-delay:.18s;}
.typing .bubble span:nth-child(3){animation-delay:.36s;}
@keyframes tb{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.day-div{text-align:center;font-size:10px;color:var(--text3);font-family:'Cinzel',serif;letter-spacing:.1em;display:flex;align-items:center;gap:10px;padding:2px 0;}
.day-div::before,.day-div::after{content:'';flex:1;height:1px;background:var(--gold-dim);}
.sum-banner{background:rgba(201,168,76,.07);border:1px solid var(--gold-dim);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:4px;}
.sum-banner-lbl{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.15em;color:var(--gold);margin-bottom:4px;text-transform:uppercase;}
.empty-hint{text-align:center;color:var(--text3);font-size:12px;font-family:'Cinzel',serif;letter-spacing:.06em;padding:60px 24px;line-height:2.2;}

/* INPUT */
#input-bar{flex-shrink:0;border-top:1px solid var(--gold-dim);background:rgba(255,253,249,.98);padding:10px 16px max(14px,env(safe-area-inset-bottom));}
.tbar{display:flex;gap:6px;margin-bottom:8px;}
.tbtn{padding:5px 12px;border-radius:20px;border:1px solid var(--gold-dim);background:none;font-size:11px;font-family:'Cinzel',serif;letter-spacing:.06em;color:var(--text2);cursor:pointer;transition:.15s;}
.tbtn.active{background:var(--burgundy);color:#fff;border-color:var(--burgundy);}
.irow{display:flex;gap:8px;align-items:flex-end;}
#msg-input{flex:1;border:1px solid var(--gold-dim);border-radius:20px;padding:9px 14px;font-size:14px;background:rgba(255,253,249,.95);outline:none;font-family:inherit;color:var(--text);resize:none;max-height:120px;line-height:1.5;overflow-y:auto;}
#attach-btn{width:36px;height:36px;border-radius:50%;background:rgba(201,168,76,.12);color:var(--text2);border:1px solid var(--gold-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#attach-btn:disabled{opacity:.4;}
#file-input{display:none;}
#attach-tray{display:none;gap:6px;flex-wrap:wrap;margin:0 0 8px;}
#attach-tray.has{display:flex;}
.chip-file{display:flex;align-items:center;gap:6px;max-width:210px;border:1px solid var(--gold-dim);border-radius:999px;background:rgba(255,253,249,.9);padding:5px 8px;font-size:11px;color:var(--text2);}
.chip-file span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chip-file button{border:0;background:none;color:var(--burgundy);font-size:14px;cursor:pointer;line-height:1;}
#send-btn{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--burgundy),#A02540);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#send-btn:disabled{opacity:.4;}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:flex-end;justify-content:center;}
.modal-ov.open{display:flex;}
.modal-sh{width:100%;max-width:420px;background:var(--ivory);border-radius:20px 20px 0 0;padding:24px 20px max(24px,env(safe-area-inset-bottom));animation:su .25s ease;}
@keyframes su{from{transform:translateY(30px);opacity:0}to{transform:none;opacity:1}}
.modal-title{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.1em;color:var(--burgundy);margin-bottom:14px;text-transform:uppercase;}
.modal-inp{width:100%;border:1px solid var(--gold-dim);border-radius:10px;padding:10px 14px;font-size:14px;font-family:inherit;color:var(--text);background:var(--ivory);outline:none;margin-bottom:10px;}
.icon-grid{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.ico-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--gold-dim);background:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ico-btn.sel{background:rgba(201,168,76,.2);border-color:var(--gold);}
.modal-btns{display:flex;gap:8px;}
.mbtn{flex:1;padding:11px;border-radius:10px;font-size:12px;font-family:'Cinzel',serif;letter-spacing:.06em;cursor:pointer;border:1px solid var(--gold-dim);background:none;color:var(--text2);}
.mbtn.p{background:var(--burgundy);color:#fff;border-color:var(--burgundy);}

@media(max-width:680px){
  #sidebar{position:fixed;left:0;top:0;bottom:0;z-index:50;transform:translateX(-100%);}
  #sidebar.open{transform:none;}
  #scrim.open{display:block;}
  #hamburger{display:block;}
}
</style>
</head>
<body>

<div id="scrim" onclick="closeSidebar()"></div>

<aside id="sidebar">
  <div class="sb-brand">
    <div class="sb-brand-top">Y A Y A &amp; E T H A N</div>
    <div class="sb-brand-title">Round Table</div>
  </div>
  <div class="sb-scroll">
    <div class="sb-section">房间</div>
    <div id="room-list"></div>
    <button class="sb-add" onclick="showCreateRoom()">＋ &nbsp;新建房间</button>
    <div class="sb-section" id="convo-label">对话</div>
    <div id="topic-list"></div>
    <button class="sb-add" onclick="newConvo()">＋ &nbsp;新对话</button>
  </div>
  <div class="sb-footer">
    <button class="back-btn" onclick="history.back()">← 返回 ours</button>
  </div>
</aside>

<div id="main">
  <div id="header">
    <button id="hamburger" onclick="toggleSidebar()">☰</button>
    <span id="h-room">圆桌</span>
    <span id="h-sep">·</span>
    <span id="h-topic">对话 1</span>
    <button id="export-all-btn" class="export-btn" title="导出整个对话" onclick="exportConversation()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
    <div class="sdots">
      <div class="schip"><div class="sdot" id="dot-arch"></div>Arch</div>
      <div class="schip"><div class="sdot" id="dot-cc"></div>二号机</div>
    </div>
  </div>
  <div id="messages"></div>
  <div id="input-bar">
    <div class="tbar">
      <button class="tbtn active" data-t="round"   onclick="setTarget(this)">Round</button>
      <button class="tbtn"        data-t="@claude"  onclick="setTarget(this)">@二号机</button>
      <button class="tbtn"        data-t="@codex"   onclick="setTarget(this)">@Arch</button>
    </div>
    <div id="attach-tray"></div>
    <div class="irow">
      <input id="file-input" type="file" multiple accept="image/*,.pdf,.txt,.md,.doc,.docx,.xls,.xlsx,.csv,.zip">
      <button id="attach-btn" type="button" onclick="pickFiles()" title="添加图片或文件">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
          <path d="m21.4 11.6-9.8 9.8a5 5 0 0 1-7.1-7.1l10.4-10.4a3.5 3.5 0 0 1 5 5L9.5 19.3a2 2 0 1 1-2.8-2.8L16.5 6.7"/>
        </svg>
      </button>
      <textarea id="msg-input" rows="1" placeholder="说点什么…"
        onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMsg()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- Create Room Modal -->
<div class="modal-ov" id="create-modal" onclick="if(event.target===this)closeCreateRoom()">
  <div class="modal-sh">
    <div class="modal-title">新建房间</div>
    <input class="modal-inp" id="room-name-inp" placeholder="房间名称（如：考研、音乐、工作）" maxlength="20">
    <div class="icon-grid" id="icon-grid"></div>
    <div class="modal-btns">
      <button class="mbtn" onclick="closeCreateRoom()">取消</button>
      <button class="mbtn p" onclick="doCreateRoom()">创建</button>
    </div>
  </div>
</div>

<script>
const API  = 'https://tnhmimwkgmdskacwcona.supabase.co/functions/v1/rt-api';
const KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRuaG1pbXdrZ21kc2thY3djb25hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMTk2MDAsImV4cCI6MjA5Njg5NTYwMH0.KUNhT-8Hy2Uy8snd_GaCyl_HFIZwjS_z-CzwSv8daa0';
const H    = { 'Content-Type':'application/json', 'Authorization':'Bearer '+KEY };
const ICONS = ['⌂','∞','📚','🎵','💼','🔬','✏️','🌙','⚔️','🌿','🎯','💡'];

let S = { roomId:'room-main', topicId:'topic-main-1', roomName:'圆桌', topicName:'对话 1', target:'round', busy:false };
let lastSig = '';
let lastMessages = [];
let selIcon = ICONS[0];
let pendingFiles = [];
let livePoll = 0;
let navSeq = 0;
const stateCache = new Map();
const roomCache = new Map();
const ATT_MARK = '[[RT_ATTACHMENT:';
const MAX_FILE_BYTES = 2 * 1024 * 1024;
const MAX_FILES = 4;

async function api(path, body, timeoutMs) {
  const ac = new AbortController();
  const timer = setTimeout(() => ac.abort(), timeoutMs || (body && body.text !== undefined ? 60000 : 30000));
  try {
    const r = await fetch(`${API}/${path}`, {
      ...(body ? { method:'POST', headers:H, body:JSON.stringify(body) } : { headers:H }),
      signal: ac.signal,
    });
    if (!r.ok) throw new Error(await r.text());
    return await r.json();
  } catch (e) {
    if (e.name === 'AbortError') throw new Error('请求超时，再试一次');
    throw e;
  } finally {
    clearTimeout(timer);
  }
}

async function loadState(roomId, topicId) {
  const q = new URLSearchParams({ roomId, ...(topicId ? {topicId} : {}) });
  return apply(await api('state?' + q));
}

function apply(data) {
  cacheState(data);
  S.roomId    = data.roomId;
  S.topicId   = data.topicId;
  S.roomName  = data.roomName;
  S.topicName = data.topicName;
  document.getElementById('h-room').textContent    = data.roomName;
  document.getElementById('h-topic').textContent   = data.topicName;
  document.getElementById('convo-label').textContent = `对话（${data.roomName}）`;
  renderRooms(data.rooms || []);
  renderTopics(data.topics || []);
  lastMessages = data.messages || [];
  renderMsgs(lastMessages, data.parentSummary);
}

function cacheState(data) {
  if (!data || !data.topicId) return;
  stateCache.set(data.topicId, data);
  roomCache.set(data.roomId, data);
}

function renderRooms(rooms) {
  const el = document.getElementById('room-list');
  el.innerHTML = '';
  rooms.forEach(r => {
    const b = document.createElement('button');
    b.className = 'room-item' + (r.id === S.roomId ? ' active' : '');
    b.innerHTML = `<span class="room-icon">${r.icon||'⌂'}</span><span class="room-name-txt">${esc(r.name)}</span>`;
    b.onclick = () => switchRoom(r.id);
    el.appendChild(b);
  });
}

function renderTopics(topics) {
  const el = document.getElementById('topic-list');
  el.innerHTML = '';
  [...topics].reverse().forEach(t => {
    const b = document.createElement('button');
    b.className = 'topic-item' + (t.id === S.topicId ? ' active' : '');
    b.innerHTML = `<div class="t-dot"></div><div class="t-label">${esc(t.display_name||'对话')}</div><div class="t-date">${fmtDate(t.created_at)}</div>`;
    b.onclick = () => switchTopic(t.id);
    el.appendChild(b);
  });
}

function renderMsgs(msgs, summary) {
  const sig = `${S.topicId}|${summary || ''}|${msgs.map(m=>m.id).join(',')}`;
  if (sig === lastSig) return;
  lastSig = sig;
  const el = document.getElementById('messages');
  el.innerHTML = '';
  if (summary) {
    const b = document.createElement('div');
    b.className = 'sum-banner';
    b.innerHTML = `<div class="sum-banner-lbl">上次对话摘要</div>${esc(summary)}`;
    el.appendChild(b);
  }
  if (!msgs.length && !summary) {
    el.innerHTML = '<div class="empty-hint">Round Table<br><span style="font-size:11px;opacity:.6">Round · @二号机 · @Arch</span><br><span style="font-size:10px;opacity:.4;letter-spacing:.05em">说点什么开始吧</span></div>';
    return;
  }
  let prevDay = '';
  msgs.forEach(m => {
    const day = (m.at||'').slice(0,10);
    if (day && day !== prevDay) {
      prevDay = day;
      const d = document.createElement('div');
      d.className = 'day-div';
      d.innerHTML = `<span>${fmtDay(m.at)}</span>`;
      el.appendChild(d);
    }
    el.appendChild(mkBubble(m));
  });
  el.scrollTop = el.scrollHeight;
}

function mkBubble(m) {
  const names    = {user:'yaya', claude:'yaya二号机', codex:'Arch'};
  const initials = {user:'y',    claude:'2', codex:'Ar'};
  const parsed = parseAttachments(m.text || '');
  const row = document.createElement('div');
  row.className = 'msg-row ' + m.speaker;
  row.dataset.id = m.id;
  const av = document.createElement('div');
  av.className = 'av';
  av.textContent = initials[m.speaker] || m.speaker[0];
  const body = document.createElement('div');
  body.className = 'mbody';
  const name = document.createElement('div');
  name.className = 'mname';
  name.textContent = names[m.speaker] || m.speaker;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  const text = document.createElement('div');
  text.className = 'bubble-text';
  text.textContent = parsed.text;
  bubble.appendChild(text);
  if (parsed.attachments.length) bubble.appendChild(renderAttachments(parsed.attachments));
  const timeRow = document.createElement('div');
  timeRow.className = 'mtime-row';
  const time = document.createElement('span');
  time.className = 'mtime';
  time.textContent = fmtTime(m.at);
  const exportBtn = document.createElement('button');
  exportBtn.type = 'button';
  exportBtn.className = 'msg-export-btn';
  exportBtn.title = '导出这条消息';
  exportBtn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
  exportBtn.onclick = () => exportMessage(m);
  timeRow.append(time, exportBtn);
  body.append(name, bubble, timeRow);
  row.append(av, body);
  return row;
}

function downloadText(filename, content) {
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function safeFilename(s) {
  return String(s || '').replace(/[\\/:*?"<>|]/g, '').trim().slice(0, 40) || 'untitled';
}

function exportMessage(m) {
  const names = {user:'yaya', claude:'yaya二号机', codex:'Arch'};
  const name = names[m.speaker] || m.speaker;
  const content = `[${name}] ${fmtTime(m.at)}\n\n${m.text || ''}\n`;
  downloadText(`${safeFilename(name)}-${Date.now()}.txt`, content);
}

function exportConversation() {
  if (!lastMessages.length) { alert('这个对话还没有消息'); return; }
  const names = {user:'yaya', claude:'yaya二号机', codex:'Arch'};
  const lines = [`${S.roomName} · ${S.topicName}`, ''];
  lastMessages.forEach(m => {
    lines.push(`[${names[m.speaker] || m.speaker}] ${fmtTime(m.at)} ${fmtDate(m.at)}`);
    lines.push(m.text || '');
    lines.push('');
  });
  downloadText(`${safeFilename(S.topicName)}-${Date.now()}.txt`, lines.join('\n'));
}

function addTyping(sp) {
  removeTyping(sp);
  const el = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row typing ' + sp;
  row.id = 'typ-' + sp;
  const av = document.createElement('div');
  av.className = 'av';
  av.textContent = sp === 'claude' ? '2' : 'Ar';
  const body = document.createElement('div');
  body.className = 'mbody';
  const nm = document.createElement('div');
  nm.className = 'mname';
  nm.textContent = sp === 'claude' ? 'yaya二号机' : 'Arch';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.style.color = sp === 'claude' ? 'var(--cc-dot)' : 'var(--arch-dot)';
  bub.innerHTML = '<span></span><span></span><span></span>';
  body.append(nm, bub);
  row.append(av, body);
  el.appendChild(row);
  el.scrollTop = el.scrollHeight;
}
function removeTyping(sp) { document.getElementById('typ-'+sp)?.remove(); }
function setDot(sp, st) {
  const d = document.getElementById(sp==='claude'?'dot-cc':'dot-arch');
  if (d) d.className = 'sdot' + (st==='thinking'?' thinking':'');
}

function setTarget(btn) {
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  S.target = btn.dataset.t;
}

function targetFromMention(text) {
  const wantsCC = /@(cc|claude|ethan|yaya二号机|二号机)(?=\s|$|[，。！？,.!?])/i.test(text);
  const wantsArch = /@(arch|gpt)\b/i.test(text);
  if (wantsCC && wantsArch) return 'round';
  if (wantsCC) return '@claude';
  if (wantsArch) return '@codex';
  return null;
}

async function sendMsg() {
  if (S.busy) return;
  const inp  = document.getElementById('msg-input');
  const plainText = (inp.value||'').trim();
  if (!plainText && !pendingFiles.length) return;
  const target = targetFromMention(plainText) || S.target;
  let text = plainText;
  try {
    text = await composeMessageText(plainText, pendingFiles);
  } catch(e) {
    alert(e.message);
    return;
  }
  inp.value = '';
  inp.style.height = 'auto';
  clearPendingFiles();
  document.getElementById('send-btn').disabled = true;
  document.getElementById('attach-btn').disabled = true;
  S.busy = true;

  // Optimistic
  const el = document.getElementById('messages');
  el.querySelector('.empty-hint')?.remove();
  el.appendChild(mkBubble({id:'tmp'+Date.now(), speaker:'user', text, at:new Date().toISOString()}));
  el.scrollTop = el.scrollHeight;

  const wCC   = target==='round'||target==='@claude';
  const wArch = target==='round'||target==='@codex';
  if (wArch) { setDot('codex','thinking'); addTyping('codex'); }
  if (wCC)   { setDot('claude','thinking'); if(!wArch) addTyping('claude'); }
  startLivePoll(S.roomId, S.topicId);

  try {
    const data = await api('user', {text, topicId:S.topicId, roomId:S.roomId, target});
    removeTyping('codex'); removeTyping('claude');
    setDot('codex',''); setDot('claude','');
    lastSig = '';
    apply(data);
  } catch(e) {
    removeTyping('codex'); removeTyping('claude');
    setDot('codex',''); setDot('claude','');
    alert('发送失败：'+e.message);
  } finally {
    stopLivePoll();
    S.busy = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('attach-btn').disabled = false;
    document.getElementById('msg-input').focus();
  }
}

function startLivePoll(roomId, topicId) {
  stopLivePoll();
  livePoll = setInterval(async () => {
    try {
      if (S.roomId !== roomId || S.topicId !== topicId) return;
      const q = new URLSearchParams({ roomId, topicId });
      const data = await api('state?' + q);
      if (S.roomId === roomId && S.topicId === topicId) apply(data);
    } catch (e) {
      console.warn('live poll failed', e);
    }
  }, 1800);
}

function stopLivePoll() {
  if (livePoll) clearInterval(livePoll);
  livePoll = 0;
}

function pickFiles() {
  if (S.busy) return;
  document.getElementById('file-input').click();
}

document.getElementById('file-input').addEventListener('change', (event) => {
  const files = [...(event.target.files || [])];
  for (const file of files) {
    if (pendingFiles.length >= MAX_FILES) {
      alert(`一次最多添加 ${MAX_FILES} 个文件`);
      break;
    }
    if (file.size > MAX_FILE_BYTES) {
      alert(`${file.name} 太大了，单个文件最多 2MB`);
      continue;
    }
    pendingFiles.push(file);
  }
  event.target.value = '';
  renderPendingFiles();
});

function renderPendingFiles() {
  const tray = document.getElementById('attach-tray');
  tray.innerHTML = '';
  tray.classList.toggle('has', pendingFiles.length > 0);
  pendingFiles.forEach((file, index) => {
    const chip = document.createElement('div');
    chip.className = 'chip-file';
    const label = document.createElement('span');
    label.textContent = `${fileIcon(file.type)} ${file.name}`;
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.textContent = '×';
    btn.title = '移除';
    btn.onclick = () => {
      pendingFiles.splice(index, 1);
      renderPendingFiles();
    };
    chip.append(label, btn);
    tray.appendChild(chip);
  });
}

function clearPendingFiles() {
  pendingFiles = [];
  renderPendingFiles();
}

async function composeMessageText(text, files) {
  const chunks = [];
  for (const file of files) {
    const dataUrl = await readFileAsDataURL(file);
    const payload = {
      name: file.name || 'file',
      type: file.type || 'application/octet-stream',
      size: file.size || 0,
      dataUrl,
    };
    chunks.push(`${ATT_MARK}${base64EncodeUtf8(JSON.stringify(payload))}]]`);
  }
  return [text, ...chunks].filter(Boolean).join('\n\n');
}

function parseAttachments(raw) {
  let text = String(raw || '');
  const attachments = [];
  const re = /\[\[RT_ATTACHMENT:([A-Za-z0-9+/=]+)\]\]/g;
  text = text.replace(re, (_, encoded) => {
    try {
      const payload = JSON.parse(base64DecodeUtf8(encoded));
      if (payload && payload.dataUrl) attachments.push(payload);
    } catch {
      // Ignore malformed attachment payloads.
    }
    return '';
  }).trim();
  return { text, attachments };
}

function renderAttachments(attachments) {
  const wrap = document.createElement('div');
  wrap.className = 'atts';
  attachments.forEach((att) => {
    const type = att.type || '';
    if (type.startsWith('image/')) {
      const link = document.createElement('a');
      link.href = att.dataUrl;
      link.download = att.name || 'image';
      link.target = '_blank';
      const img = document.createElement('img');
      img.className = 'att-img';
      img.src = att.dataUrl;
      img.alt = att.name || 'image';
      link.appendChild(img);
      wrap.appendChild(link);
      return;
    }
    const link = document.createElement('a');
    link.className = 'att-file';
    link.href = att.dataUrl;
    link.download = att.name || 'file';
    const ico = document.createElement('div');
    ico.className = 'att-ico';
    ico.textContent = fileIcon(type);
    const box = document.createElement('div');
    const name = document.createElement('div');
    name.className = 'att-name';
    name.textContent = att.name || 'file';
    const meta = document.createElement('div');
    meta.className = 'att-meta';
    meta.textContent = [type || 'file', fmtSize(att.size)].filter(Boolean).join(' · ');
    box.append(name, meta);
    link.append(ico, box);
    wrap.appendChild(link);
  });
  return wrap;
}

function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result || ''));
    reader.onerror = () => reject(new Error(`读取文件失败：${file.name || 'file'}`));
    reader.readAsDataURL(file);
  });
}

function base64EncodeUtf8(value) {
  const bytes = new TextEncoder().encode(value);
  let binary = '';
  bytes.forEach((byte) => { binary += String.fromCharCode(byte); });
  return btoa(binary);
}

function base64DecodeUtf8(value) {
  const binary = atob(value);
  const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}

function fileIcon(type) {
  if ((type || '').startsWith('image/')) return '图';
  if ((type || '').includes('pdf')) return 'PDF';
  if ((type || '').includes('zip')) return 'ZIP';
  return 'FILE';
}

async function switchRoom(id) {
  closeSidebar();
  if (id === S.roomId) return;
  const seq = ++navSeq;
  const cached = roomCache.get(id);
  if (cached) {
    lastSig = '';
    apply(cached);
  }
  refreshRoom(id, !cached, seq);
}
async function switchTopic(id) {
  closeSidebar();
  if (id === S.topicId) return;
  const roomId = S.roomId;
  const seq = ++navSeq;
  const cached = stateCache.get(id);
  if (cached) {
    lastSig = '';
    apply(cached);
  }
  refreshTopic(roomId, id, !cached, seq);
}

async function refreshRoom(id, showErrorAlert=false, seq=navSeq) {
  try {
    const data = await api('open-room', {roomId:id});
    if (seq === navSeq && (S.roomId === id || showErrorAlert)) apply(data);
  } catch(e) {
    console.error(e);
    if (showErrorAlert) alert('打开房间失败：'+e.message);
  }
}

async function refreshTopic(roomId, id, showErrorAlert=false, seq=navSeq) {
  try {
    const data = await api('open-topic', {topicId:id, roomId});
    if (seq === navSeq && S.roomId === roomId && (S.topicId === id || showErrorAlert)) apply(data);
  } catch(e) {
    console.error(e);
    if (showErrorAlert) alert('打开对话失败：'+e.message);
  }
}
async function newConvo() {
  if (S.busy) return;
  S.busy = true; closeSidebar();
  try {
    lastSig = '';
    apply(await api('new-topic', {roomId:S.roomId, currentTopicId:S.topicId}));
  } catch(e){alert('创建失败：'+e.message);}
  finally{S.busy=false;}
}

function showCreateRoom() {
  closeSidebar(); selIcon = ICONS[0];
  const g = document.getElementById('icon-grid');
  g.innerHTML = '';
  ICONS.forEach(ic => {
    const b = document.createElement('button');
    b.className = 'ico-btn' + (ic===selIcon?' sel':'');
    b.textContent = ic;
    b.onclick = () => { selIcon=ic; g.querySelectorAll('.ico-btn').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); };
    g.appendChild(b);
  });
  document.getElementById('room-name-inp').value = '';
  document.getElementById('create-modal').classList.add('open');
}
function closeCreateRoom() { document.getElementById('create-modal').classList.remove('open'); }
async function doCreateRoom() {
  const name = (document.getElementById('room-name-inp').value||'').trim();
  if (!name) { document.getElementById('room-name-inp').focus(); return; }
  closeCreateRoom();
  try { lastSig=''; apply(await api('create-room', {name, icon:selIcon})); }
  catch(e){alert('创建失败：'+e.message);}
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('scrim').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('scrim').classList.remove('open');
}

function onKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} }
function autoResize(ta) { ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,120)+'px'; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtTime(iso) { if(!iso)return''; return new Date(iso).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',hour12:false}); }
function fmtDate(iso) { if(!iso)return''; return new Date(iso).toLocaleDateString('zh-CN',{month:'numeric',day:'numeric'}); }
function fmtSize(value) {
  const n = Number(value || 0);
  if (!n) return '';
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (Math.round(n / 102.4) / 10) + ' KB';
  return (Math.round(n / 1024 / 102.4) / 10) + ' MB';
}
function fmtDay(iso) {
  if(!iso)return'';
  const d=new Date(iso), n=new Date(), diff=Math.floor((n-d)/86400000);
  if(diff===0)return'今天'; if(diff===1)return'昨天';
  return d.toLocaleDateString('zh-CN',{month:'numeric',day:'numeric'});
}

(async()=>{
  try { await loadState('room-main',''); }
  catch(e) { document.getElementById('messages').innerHTML=`<div class="empty-hint" style="color:#c00">连接失败<br><span style="font-size:11px">${esc(e.message)}</span></div>`; }
})();
</script>
