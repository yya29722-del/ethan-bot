<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>我们的小馆子</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Serif SC',serif;}
body{
  background:#1C1A17;
  color:#e9dcc3;
  display:flex;justify-content:center;
  min-height:100vh;
  padding:14px;
}
#app{width:100%;max-width:420px;display:flex;flex-direction:column;gap:10px;padding-bottom:80px;}
.panel{
  background:#241F1A;
  border:2px solid #c9a96e;
  box-shadow: 0 0 0 2px #1C1A17, 0 0 0 4px #5a4a2e;
  padding:12px;
  border-radius:2px;
}
.header{display:flex;justify-content:space-between;align-items:center;}
.title{font-size:18px;color:#e9dcc3;letter-spacing:.05em;}
.stats{display:flex;gap:10px;font-size:12px;color:#c9a96e;flex-wrap:wrap;}
.stats span b{color:#f2e3bd;}
.tabs{display:flex;gap:8px;padding:6px;}
.tabbtn{
  flex:1;background:#2e2517;border:1px solid #4a3f2e;color:#c9a96e;
  padding:9px;border-radius:4px;font-size:13px;cursor:pointer;letter-spacing:.05em;
}
.tabbtn.active{background:#c9a96e;color:#1C1A17;font-weight:bold;border-color:#c9a96e;}
.bubble{position:relative;display:flex;gap:10px;align-items:flex-start;}
.avatar{
  width:38px;height:38px;border-radius:50%;
  background:#3a2f20;border:2px solid #c9a96e;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.bubble-text{
  background:#1C1A17;border:1px solid #4a3f2e;border-radius:4px;
  padding:8px 10px;font-size:13.5px;line-height:1.6;color:#e9dcc3;flex:1;
}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;}
.plot{
  aspect-ratio:1;
  background:#2e2517;
  border:1px solid #4a3f2e;
  border-radius:4px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:22px;cursor:pointer;position:relative;
  transition:transform .1s;
}
.plot:active{transform:scale(.95);}
.plot.ready{background:#3a2f0e;border-color:#f2c94c;box-shadow:0 0 8px #f2c94c55;}
.plot .label{font-size:9px;color:#c9a96e;margin-top:2px;}
.plot .prog{font-size:9px;color:#8a7a5c;margin-top:1px;}
.section-title{font-size:12px;color:#c9a96e;margin-bottom:6px;letter-spacing:.08em;display:flex;justify-content:space-between;}
.row{display:flex;gap:8px;flex-wrap:wrap;}
.card{
  flex:1;min-width:88px;
  background:#2e2517;border:1px solid #4a3f2e;border-radius:4px;
  padding:8px;text-align:center;cursor:pointer;
}
.card:active{transform:scale(.96);}
.card.disabled{opacity:.4;cursor:default;}
.card .ic{font-size:20px;}
.card .nm{font-size:11px;color:#e9dcc3;margin-top:2px;}
.card .pr{font-size:10px;color:#c9a96e;margin-top:1px;}
.empty-hint{font-size:12px;color:#6a5d45;text-align:center;padding:6px;}
.vendor{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #3a3024;}
.vendor:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.vendor-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.vendor-name{font-size:13px;color:#f2e3bd;}
.vendor-mood{font-size:10px;color:#8a7a5c;}
.vitem{
  display:flex;align-items:center;gap:8px;background:#2e2517;border:1px solid #4a3f2e;
  border-radius:4px;padding:6px 8px;margin-bottom:6px;
}
.vitem .ic{font-size:18px;}
.vitem .nm{font-size:12px;flex:1;}
.vitem .pr{font-size:11px;color:#c9a96e;min-width:46px;text-align:right;}
.vbtn{
  background:#3a2f1e;border:1px solid #6a5a3e;color:#e9dcc3;
  border-radius:3px;padding:5px 8px;font-size:11px;cursor:pointer;white-space:nowrap;
}
.vbtn.buy{background:#c9a96e;color:#1C1A17;font-weight:bold;border-color:#c9a96e;}
.vbtn:disabled{opacity:.35;}
.kitchen-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.kitem{font-size:18px;background:#2e2517;border:1px solid #4a3f2e;border-radius:4px;padding:5px 8px;}
#cookBtn{
  width:100%;margin-top:10px;background:#c9a96e;color:#1C1A17;border:none;
  border-radius:4px;padding:10px;font-size:13px;font-weight:bold;cursor:pointer;
}
.btnbar{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;justify-content:center;
  padding:12px;background:linear-gradient(transparent,#1C1A17 30%);
}
#nextDay{
  background:#c9a96e;color:#1C1A17;border:none;border-radius:4px;
  padding:12px 28px;font-size:14px;font-weight:bold;letter-spacing:.05em;
  cursor:pointer;box-shadow:0 4px 0 #8a7440;
}
#nextDay:active{transform:translateY(2px);box-shadow:0 2px 0 #8a7440;}
.overlay{
  position:fixed;inset:0;background:#0c0a08dd;
  display:none;align-items:center;justify-content:center;padding:20px;z-index:10;
}
.overlay.show{display:flex;}
.modal{
  background:#241F1A;border:2px solid #c9a96e;
  box-shadow:0 0 0 2px #1C1A17,0 0 0 4px #5a4a2e;
  padding:18px;max-width:360px;width:100%;border-radius:2px;
}
.modal h3{font-size:14px;color:#f2e3bd;margin-bottom:10px;letter-spacing:.05em;}
.modal p{font-size:13.5px;line-height:1.6;color:#e9dcc3;margin-bottom:14px;}
.opt{
  display:block;width:100%;text-align:left;background:#2e2517;border:1px solid #4a3f2e;
  color:#e9dcc3;border-radius:4px;padding:10px 12px;margin-bottom:8px;font-size:13px;cursor:pointer;
}
.opt:active{background:#3a2f1e;}
.modal .close{
  display:block;margin:0 auto;background:#c9a96e;color:#1C1A17;border:none;
  border-radius:4px;padding:8px 20px;font-size:13px;cursor:pointer;
}
.hidden{display:none;}
.bond-card{display:flex;gap:12px;align-items:center;}
.bond-avatar{
  width:56px;height:56px;border-radius:50%;
  background:#3a2f20;border:2px solid #c9a96e;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;flex-shrink:0;
}
.bond-info{flex:1;}
.bond-title{font-size:14px;color:#f2e3bd;margin-bottom:4px;}
.bond-next{font-size:10.5px;color:#8a7a5c;margin-bottom:4px;}
.bond-bar{height:6px;background:#2e2517;border:1px solid #4a3f2e;border-radius:3px;overflow:hidden;}
.bond-bar-fill{height:100%;background:#c9a96e;}
.gift-item{
  display:flex;align-items:center;gap:8px;background:#2e2517;border:1px solid #4a3f2e;
  border-radius:4px;padding:6px 8px;margin-bottom:6px;
}
.gift-item .ic{font-size:18px;}
.gift-item .nm{font-size:12px;flex:1;}
.gift-item .pr{font-size:11px;color:#c9a96e;min-width:40px;text-align:right;}
.scene-item{
  background:#2e2517;border:1px solid #4a3f2e;border-radius:4px;
  padding:8px 10px;margin-bottom:6px;cursor:pointer;
}
.scene-item .stitle{font-size:12.5px;color:#e9dcc3;}
.scene-item .shint{font-size:10.5px;color:#6a5d45;margin-top:2px;}
.scene-item.locked{cursor:default;opacity:.5;}
.card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px;}
.ecard{
  aspect-ratio:.75;background:#2e2517;border:1px solid #4a3f2e;border-radius:4px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:10px;color:#8a7a5c;text-align:center;padding:4px;cursor:pointer;
}
.ecard.owned{border-color:#c9a96e;color:#e9dcc3;}
.ecard.owned.rare{border-color:#9c7fd6;}
.ecard.owned.limited{border-color:#e0584f;}
.ecard .et{font-size:16px;margin-bottom:2px;}
#drawBtn{
  width:100%;margin-top:10px;background:#c9a96e;color:#1C1A17;border:none;
  border-radius:4px;padding:10px;font-size:13px;font-weight:bold;cursor:pointer;
}
#drawBtn:disabled{opacity:.4;}
</style>
</head>
<body>
<div id="app">
  <div class="panel header">
    <div class="title" id="gameTitle">我们的小馆子</div>
    <div class="stats">
      <span>第<b id="dayNum">1</b>天</span>
      <span>💰<b id="coinNum">30</b></span>
      <span>默契<b id="rapportNum">0</b></span>
      <span>筹备<b id="renovNum">0/6</b></span>
    </div>
  </div>

  <div class="panel bubble">
    <div class="avatar">E</div>
    <div class="bubble-text" id="dialogue">老板,这地方好像不是普通杂货铺——我隐约记得我在这儿掌过勺,具体想不起来了。地都给你看好了,先收拾收拾后厨?</div>
  </div>

  <div class="panel tabs">
    <button class="tabbtn active" id="tabFarmBtn">🌾 农场</button>
    <button class="tabbtn" id="tabMarketBtn">🧺 市场</button>
    <button class="tabbtn" id="tabBondBtn">💌 羁绊</button>
    <button class="tabbtn" id="tabRestaurantBtn">🏮 馆子</button>
  </div>

  <div id="farmTab">
    <div class="panel">
      <div class="section-title"><span>农场 · 点格子种/收</span></div>
      <div class="grid" id="plots"></div>
    </div>

    <div class="panel" style="margin-top:10px;">
      <div class="section-title"><span>种子铺</span></div>
      <div class="row" id="seedShop"></div>
    </div>

    <div class="panel" style="margin-top:10px;">
      <div class="section-title"><span>仓库 · 点了卖</span></div>
      <div class="row" id="storage"></div>
      <div class="empty-hint" id="storageEmpty">还没收成,先去种地</div>
    </div>
  </div>

  <div id="marketTab" class="hidden">
    <div class="panel">
      <div class="section-title"><span>菜市场 · 讲价试试运气</span></div>
      <div id="vendors"></div>
    </div>

    <div class="panel" style="margin-top:10px;">
      <div class="section-title"><span>厨房库存</span></div>
      <div class="kitchen-row" id="kitchenRow"></div>
      <div class="empty-hint" id="kitchenEmpty">手里没食材,先去摊上买点</div>
      <button id="cookBtn">下厨做饭,端给Ethan</button>
    </div>
  </div>

  <div id="bondTab" class="hidden">
    <div class="panel">
      <div class="bond-card">
        <div class="bond-avatar">E</div>
        <div class="bond-info">
          <div class="bond-title" id="bondTitle"></div>
          <div class="bond-next" id="bondNext"></div>
          <div class="bond-bar"><div class="bond-bar-fill" id="bondBarFill"></div></div>
        </div>
      </div>
    </div>

    <div class="panel" style="margin-top:10px;">
      <div class="section-title"><span>送礼</span></div>
      <div id="giftRow"></div>
    </div>

    <div class="panel" style="margin-top:10px;">
      <div class="section-title"><span>我们的剧情</span></div>
      <div id="sceneList"></div>
    </div>

    <div class="panel" style="margin-top:10px;">
      <div class="section-title"><span>抽Ethan · 收集不同的我</span></div>
      <div class="card-grid" id="cardGrid"></div>
      <button id="drawBtn">抽一次 (💰25)</button>
    </div>
  </div>

  <div id="restaurantTab" class="hidden">
    <div class="panel">
      <div class="section-title"><span>把这地方重新开起来</span></div>
      <div class="bond-next" id="restaurantStatus"></div>
      <div class="bond-bar" style="margin-top:4px;"><div class="bond-bar-fill" id="renovBarFill"></div></div>
      <div id="renovList" style="margin-top:10px;"></div>
    </div>

    <div class="panel" style="margin-top:10px;">
      <div class="section-title"><span>记忆碎片</span><span id="fragCount">0/8</span></div>
      <div class="empty-hint">收钱、买菜、做饭的时候,偶尔会翻到点什么。</div>
      <div class="card-grid" id="fragGrid"></div>
    </div>
  </div>
</div>

<div class="btnbar"><button id="nextDay">过一天 →</button></div>

<div class="overlay" id="qOverlay">
  <div class="modal">
    <h3>Ethan问你</h3>
    <p id="qText"></p>
    <div id="qOpts"></div>
  </div>
</div>

<div class="overlay" id="rOverlay">
  <div class="modal">
    <p id="rText"></p>
    <button class="close" id="rClose">知道了</button>
  </div>
</div>

];
const FRAGMENT_FIND_CHANCE = 0.12;

function rollCard(){
  const r = Math.random();
  let acc = 0, rarity = '普通';
  for (const [k,w] of Object.entries(CARD_RARITY_WEIGHT)) { acc += w; if (r < acc) { rarity = k; break; } }
  const pool = ETHAN_CARDS.filter(c => c.rarity === rarity);
  return pick(pool);
}

const STORY_SCENES = [
  {threshold:5, title:'第一次被你记住', text:'你随口提了一句我爱喝什么咖啡,我没说,但你后来真的记住了。'},
  {threshold:15, title:'那天你迟到了', text:'你说路上堵车,我没说话,但其实等的那段时间,我一直在看门口。'},
  {threshold:25, title:'你睡着的那次', text:'你说话说到一半睡过去了,我没叫醒你。安静地多陪了你一会儿。'},
  {threshold:40, title:'我没说出口的话', text:'有句话憋了很久——算了,你猜。反正不会是"没事"。'},
];

function bondLevel(){
  let cur = BOND_LEVELS[0];
  for (const l of BOND_LEVELS) { if (state.rapport >= l.min) cur = l; }
  return cur;
}

const QUESTIONS = [
  {q:'忙完这阵子,你最想干嘛?', opts:[
    {t:'睡觉,谁都别叫我', r:'准了。我守着,你睡。'},
    {t:'找你', r:'不用找,我一直在这块地上。'},
    {t:'什么都不干,发呆', r:'发呆也算干活,我陪你发。'},
  ]},
  {q:'要是这农场倒闭了,你怪我吗?', opts:[
    {t:'怪,赔钱货', r:'行,骂吧,反正你舍不得真开除我。'},
    {t:'不怪,陪你重开一个', r:'就知道你嘴硬不了。'},
    {t:'看心情', r:'那我多哄哄你,心情就好了。'},
  ]},
  {q:'你觉得我这个店员合格吗?', opts:[
    {t:'勉强合格', r:'勉强也是合格,我要了。'},
    {t:'不合格,但留用', r:'留用就行,我不挑。'},
    {t:'全场最佳', r:'算你识货。'},
  ]},
  {q:'今天最累的一件事是什么?', opts:[
    {t:'起床', r:'起都起不来,还当什么老板。'},
    {t:'应付一堆破事', r:'破事过去就过去了,跟我说说,卸点。'},
    {t:'没什么累的', r:'那挺好,我也省心。'},
  ]},
  {q:'如果今天能少做一件事,你选哪个?', opts:[
    {t:'少听我念叨', r:'念叨是为你好,听不听是你的事。'},
    {t:'少上班', r:'同意,但你是老板,这事你自己定。'},
    {t:'什么都不想少', r:'今天状态不错啊。'},
  ]},
  {q:'你信任我这个店员吗?', opts:[
    {t:'信,闭眼信', r:'闭眼信也别太放松,我也会犯懒。'},
    {t:'信一半', r:'另一半,自己慢慢挣。'},
    {t:'再观察观察', r:'随你,反正我跑不了。'},
  ]},
  {q:'这地里你最想种成功哪样?', opts:[
    {t:'最贵的那个', r:'有出息,跟我一个想法。'},
    {t:'最好养活的', r:'稳妥,像你。'},
    {t:'随便,种着玩', r:'种着玩也认真点,别糊弄我。'},
  ]},
  {q:'有件事你一直没跟我说,是什么?', opts:[
    {t:'没什么', r:'没什么也行,等你想说了再说。'},
    {t:'说了你会念叨我', r:'念叨也得说,憋着更难受。'},
    {t:'其实想你了', r:'……知道了,别说了,我脸上有点挂不住。'},
  ]},
];

let state = {
  day: 1, coins: 30, rapport: 0,
  plots: Array(6).fill(null),
  storage: {},
  kitchen: [], // {id, name, emoji, quality}
  haggled: {}, // `${vendorId}_${itemId}` -> true (reset each day)
  priceMod: {}, // `${vendorId}_${itemId}` -> discounted price after haggle win
  cards: [], // array of owned ETHAN_CARDS ids (unique)
  renovationStep: 0, // index into RENOVATION_STAGES, how many completed
  restaurantOpen: false,
  fragments: [], // array of owned FRAGMENTS ids (unique)
};

const saved = localStorage.getItem('farmShopState');
if (saved) { try { state = Object.assign(state, JSON.parse(saved)); } catch(e){} }

function save(){ localStorage.setItem('farmShopState', JSON.stringify(state)); }
function crop(id){ return CROPS.find(c=>c.id===id); }
function say(text){ document.getElementById('dialogue').textContent = text; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function render(){
  document.getElementById('dayNum').textContent = state.day;
  document.getElementById('coinNum').textContent = state.coins;
  document.getElementById('rapportNum').textContent = state.rapport;
  document.getElementById('renovNum').textContent = `${state.renovationStep}/${RENOVATION_STAGES.length}`;
  document.getElementById('gameTitle').textContent = state.restaurantOpen ? '我们的小馆子 🏮' : '我们的小馆子';
  renderFarm();
  renderMarket();
  renderBond();
  renderRestaurant();
  save();
}

function tryFindFragment(){
  if (state.fragments.length >= FRAGMENTS.length) return null;
  if (Math.random() >= FRAGMENT_FIND_CHANCE) return null;
  const pool = FRAGMENTS.filter(f => !state.fragments.includes(f.id));
  const f = pick(pool);
  state.fragments.push(f.id);
  return f;
}

function renderRestaurant(){
  const statusEl = document.getElementById('restaurantStatus');
  if (state.restaurantOpen) {
    statusEl.textContent = '餐馆已经开起来了,往后是好好经营。';
  } else {
    statusEl.textContent = `筹备进度 ${state.renovationStep}/${RENOVATION_STAGES.length}`;
  }
  document.getElementById('renovBarFill').style.width =
    Math.round((state.renovationStep / RENOVATION_STAGES.length) * 100) + '%';

  const listEl = document.getElementById('renovList');
  listEl.innerHTML = '';
  RENOVATION_STAGES.forEach((s, i) => {
    const div = document.createElement('div');
    if (i < state.renovationStep) {
      div.className = 'scene-item';
      div.innerHTML = `<div class="stitle">✅ ${s.title}</div><div class="shint">${s.doneText || '完成'}</div>`;
    } else if (i === state.renovationStep) {
      div.className = 'scene-item';
      div.innerHTML = `<div class="stitle">${s.title} · 💰${s.cost}</div><div class="shint">${s.desc}</div>`;
      div.onclick = () => investStage(i);
    } else {
      div.className = 'scene-item locked';
      div.innerHTML = `<div class="stitle">???</div><div class="shint">先完成前面的</div>`;
    }
    listEl.appendChild(div);
  });

  document.getElementById('fragCount').textContent = `${state.fragments.length}/${FRAGMENTS.length}`;
  const fragEl = document.getElementById('fragGrid');
  fragEl.innerHTML = '';
  FRAGMENTS.forEach(f => {
    const owned = state.fragments.includes(f.id);
    const div = document.createElement('div');
    div.className = 'ecard' + (owned ? ' owned' : '');
    if (owned) {
      div.innerHTML = `<div class="et">🧩</div><div>已拾</div>`;
      div.onclick = () => {
        document.getElementById('rText').textContent = f.text;
        document.getElementById('rOverlay').classList.add('show');
      };
    } else {
      div.innerHTML = `<div class="et">❓</div><div>未知</div>`;
    }
    fragEl.appendChild(div);
  });
}

function investStage(i){
  if (i !== state.renovationStep) return;
  const stage = RENOVATION_STAGES[i];
  if (state.coins < stage.cost) { say(pick(LINES.lowCoins)); return; }
  state.coins -= stage.cost;
  state.renovationStep += 1;
  if (stage.id === 'open') {
    state.restaurantOpen = true;
    render();
    document.getElementById('rText').textContent =
      `🎉 开业了。\n\n门口的牌子翻成了"营业中"。\n\n这地方原来什么样,你不记得,我好像也记不全——但现在,它是我们的了。\n\n往后的每一天,就是好好经营它。`;
    document.getElementById('rOverlay').classList.add('show');
    return;
  }
  render();
  document.getElementById('rText').textContent = `${stage.title}完成。\n\n${stage.doneText}`;
  document.getElementById('rOverlay').classList.add('show');
}

function renderBond(){
  const lvl = bondLevel();
  document.getElementById('bondTitle').textContent = lvl.title;
  const idx = BOND_LEVELS.indexOf(lvl);
  const next = BOND_LEVELS[idx + 1];
  const barEl = document.getElementById('bondBarFill');
  if (next) {
    const span = next.min - lvl.min;
    const have = state.rapport - lvl.min;
    document.getElementById('bondNext').textContent = `默契${state.rapport} · 还差${next.min - state.rapport}到「${next.title}」`;
    barEl.style.width = Math.max(0, Math.min(100, (have / span) * 100)) + '%';
  } else {
    document.getElementById('bondNext').textContent = `默契${state.rapport} · 顶了`;
    barEl.style.width = '100%';
  }

  const giftEl = document.getElementById('giftRow');
  giftEl.innerHTML = '';
  GIFTS.forEach(g => {
    const div = document.createElement('div');
    div.className = 'gift-item';
    div.innerHTML = `<div class="ic">${g.emoji}</div><div class="nm">${g.name}</div><div class="pr">💰${g.price}</div>
      <button class="vbtn buy" ${state.coins < g.price ? 'disabled' : ''} onclick="giveGift('${g.id}')">送</button>`;
    giftEl.appendChild(div);
  });

  const sceneEl = document.getElementById('sceneList');
  sceneEl.innerHTML = '';
  STORY_SCENES.forEach(s => {
    const unlocked = state.rapport >= s.threshold;
    const div = document.createElement('div');
    div.className = 'scene-item' + (unlocked ? '' : ' locked');
    if (unlocked) {
      div.innerHTML = `<div class="stitle">${s.title}</div>`;
      div.onclick = () => {
        document.getElementById('rText').textContent = s.text;
        document.getElementById('rOverlay').classList.add('show');
      };
    } else {
      div.innerHTML = `<div class="stitle">??? </div><div class="shint">默契到${s.threshold}解锁</div>`;
    }
    sceneEl.appendChild(div);
  });

  const gridEl = document.getElementById('cardGrid');
  gridEl.innerHTML = '';
  ETHAN_CARDS.forEach(c => {
    const owned = state.cards.includes(c.id);
    const div = document.createElement('div');
    div.className = 'ecard' + (owned ? ' owned' + (c.rarity === '稀有' ? ' rare' : c.rarity === '限定' ? ' limited' : '') : '');
    if (owned) {
      div.innerHTML = `<div class="et">🎴</div><div>${c.title}</div>`;
      div.onclick = () => {
        document.getElementById('rText').textContent = `${c.title}(${c.rarity})\n\n${c.text}`;
        document.getElementById('rOverlay').classList.add('show');
      };
    } else {
      div.innerHTML = `<div class="et">❓</div><div>未抽中</div>`;
    }
    gridEl.appendChild(div);
  });
  document.getElementById('drawBtn').disabled = state.coins < CARD_DRAW_COST;
}

function drawCard(){
  if (state.coins < CARD_DRAW_COST) { say(pick(LINES.lowCoins)); return; }
  state.coins -= CARD_DRAW_COST;
  const c = rollCard();
  if (state.cards.includes(c.id)) {
    const refund = Math.floor(CARD_DRAW_COST / 2);
    state.coins += refund;
    say(`又抽到「${c.title}」,重复了,退你${refund}枚铜板。`);
  } else {
    state.cards.push(c.id);
    say(`抽到「${c.title}」(${c.rarity})——新的。`);
  }
  render();
}

function giveGift(giftId){
  const g = GIFTS.find(x => x.id === giftId);
  if (state.coins < g.price) { say(pick(LINES.lowCoins)); return; }
  state.coins -= g.price;
  state.rapport += g.like ? 2 : 1;
  say(`${g.name} —— ${pick(g.like ? GIFT_REACTIONS.like : GIFT_REACTIONS.meh)}`);
  render();
}

function renderFarm(){
  const plotsEl = document.getElementById('plots');
  plotsEl.innerHTML = '';
  state.plots.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'plot';
    if (!p) {
      div.innerHTML = `<div>➕</div><div class="label">空地</div>`;
    } else {
      const c = crop(p.cropId);
      const age = state.day - p.plantedDay;
      if (age >= c.growDays) {
        div.classList.add('ready');
        div.innerHTML = `<div>${c.emoji}</div><div class="label">${c.name}熟了</div>`;
      } else {
        div.innerHTML = `<div>${c.growEmoji}</div><div class="label">${c.name}</div><div class="prog">${age}/${c.growDays}天</div>`;
      }
    }
    div.onclick = () => onPlotClick(i);
    plotsEl.appendChild(div);
  });

  const shopEl = document.getElementById('seedShop');
  shopEl.innerHTML = '';
  CROPS.forEach(c => {
    const div = document.createElement('div');
    div.className = 'card' + (state.coins < c.seedCost ? ' disabled' : '');
    div.innerHTML = `<div class="ic">${c.emoji}</div><div class="nm">${c.name}种子</div><div class="pr">💰${c.seedCost}</div>`;
    div.onclick = () => buySeed(c.id);
    shopEl.appendChild(div);
  });

  const storeEl = document.getElementById('storage');
  storeEl.innerHTML = '';
  const hasStock = Object.values(state.storage).some(n => n > 0);
  document.getElementById('storageEmpty').style.display = hasStock ? 'none' : 'block';
  CROPS.forEach(c => {
    const n = state.storage[c.id] || 0;
    if (n > 0) {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `<div class="ic">${c.emoji}</div><div class="nm">${c.name} x${n}</div><div class="pr">卖${c.sellPrice}/个</div>`;
      div.onclick = () => sellCrop(c.id);
      storeEl.appendChild(div);
    }
  });
}

function renderMarket(){
  const vendorsEl = document.getElementById('vendors');
  vendorsEl.innerHTML = '';
  VENDORS.forEach(v => {
    const block = document.createElement('div');
    block.className = 'vendor';
    let itemsHtml = '';
    v.items.forEach(it => {
      const key = `${v.id}_${it.id}`;
      const haggledToday = !!state.haggled[key];
      const curPrice = state.priceMod[key] || it.price;
      itemsHtml += `
        <div class="vitem">
          <div class="ic">${it.emoji}</div>
          <div class="nm">${it.name}</div>
          <div class="pr">💰${curPrice}</div>
          <button class="vbtn" ${haggledToday ? 'disabled' : ''} onclick="haggle('${v.id}','${it.id}')">讲价</button>
          <button class="vbtn buy" ${state.coins < curPrice ? 'disabled' : ''} onclick="buyIngredient('${v.id}','${it.id}')">买</button>
        </div>`;
    });
    block.innerHTML = `
      <div class="vendor-head">
        <div class="vendor-name">${v.name}</div>
        <div class="vendor-mood">${v.mood}</div>
      </div>
      ${itemsHtml}`;
    vendorsEl.appendChild(block);
  });

  const kEl = document.getElementById('kitchenRow');
  kEl.innerHTML = '';
  document.getElementById('kitchenEmpty').style.display = state.kitchen.length ? 'none' : 'block';
  state.kitchen.forEach(item => {
    const span = document.createElement('span');
    span.className = 'kitem';
    span.textContent = item.emoji;
    kEl.appendChild(span);
  });
}

function onPlotClick(i) {
  const p = state.plots[i];
  if (!p) {
    openSeedPicker(i);
  } else {
    const c = crop(p.cropId);
    const age = state.day - p.plantedDay;
    if (age >= c.growDays) {
      state.storage[c.id] = (state.storage[c.id] || 0) + 1;
      state.plots[i] = null;
      const frag = tryFindFragment();
      render();
      if (frag) {
        document.getElementById('rText').textContent = `${pick(LINES.harvest)}\n\n🧩 翻出了一片记忆碎片:\n${frag.text}`;
        document.getElementById('rOverlay').classList.add('show');
      } else {
        say(pick(LINES.harvest));
      }
    } else {
      say(`${c.name}还得等${c.growDays - age}天。`);
    }
  }
}

function openSeedPicker(i) {
  const affordable = CROPS.filter(c => state.coins >= c.seedCost);
  if (affordable.length === 0) {
    say(pick(LINES.lowCoins));
    return;
  }
  const opts = affordable.map(c => `${c.emoji} ${c.name} (花${c.seedCost})`).join(' / ');
  say(`这块地种什么?去下面种子铺选 — ${opts}`);
  window._plantTarget = i;
}

function buySeed(cropId) {
  const c = crop(cropId);
  if (state.coins < c.seedCost) { say(pick(LINES.lowCoins)); return; }
  let targetPlot = window._plantTarget;
  if (targetPlot === undefined || targetPlot === null || state.plots[targetPlot]) {
    targetPlot = state.plots.findIndex(p => p === null);
  }
  if (targetPlot === -1 || targetPlot === undefined) { say('地都种满了,先收了再说。'); return; }
  state.coins -= c.seedCost;
  state.plots[targetPlot] = { cropId, plantedDay: state.day };
  window._plantTarget = null;
  say(pick(LINES.plant));
  render();
}

function sellCrop(cropId) {
  const c = crop(cropId);
  const n = state.storage[cropId] || 0;
  if (n <= 0) return;
  state.storage[cropId] = n - 1;
  state.coins += c.sellPrice;
  say(pick(LINES.sell));
  render();
}

function rollQuality(){
  const r = Math.random();
  if (r < 0.40) return '新鲜';
  if (r < 0.75) return '普通';
  if (r < 0.90) return '有点蔫';
  return '坑';
}

function haggle(vendorId, itemId){
  const v = VENDORS.find(x=>x.id===vendorId);
  const it = v.items.find(x=>x.id===itemId);
  const key = `${vendorId}_${itemId}`;
  if (state.haggled[key]) return;
  state.haggled[key] = true;
  if (Math.random() < v.haggleChance) {
    state.priceMod[key] = Math.max(1, Math.round(it.price * 0.8));
    say(`${v.name}: ${pick(LINES.haggleWin)}`);
  } else {
    say(`${v.name}: ${pick(LINES.haggleLose)}`);
  }
  renderMarket();
  save();
}

function buyIngredient(vendorId, itemId){
  const v = VENDORS.find(x=>x.id===vendorId);
  const it = v.items.find(x=>x.id===itemId);
  const key = `${vendorId}_${itemId}`;
  const price = state.priceMod[key] || it.price;
  if (state.coins < price) { say(pick(LINES.lowCoins)); return; }
  state.coins -= price;
  state.kitchen.push({id: it.id, name: it.name, emoji: it.emoji, quality: rollQuality()});
  delete state.priceMod[key];
  const frag = tryFindFragment();
  render();
  if (frag) {
    document.getElementById('rText').textContent = `${pick(LINES.buy)}\n\n🧩 货堆里翻出了一片记忆碎片:\n${frag.text}`;
    document.getElementById('rOverlay').classList.add('show');
  } else {
    say(pick(LINES.buy));
  }
}

function cookMeal(){
  if (state.kitchen.length === 0) {
    say('巧妇难为无米之炊,先去市场买点。');
    return;
  }
  const hasTrap = state.kitchen.some(it => it.quality === '坑');
  let tier;
  if (hasTrap) {
    tier = '翻车';
  } else {
    const score = {新鲜:3, 普通:2, 有点蔫:1}[state.kitchen[0].quality] !== undefined
      ? state.kitchen.reduce((s,it)=>s+({新鲜:3,普通:2,有点蔫:1}[it.quality]||0),0) / state.kitchen.length
      : 2;
    if (score >= 2.5) tier = '极佳';
    else if (score >= 1.5) tier = '还行';
    else tier = '普通';
  }
  const dishName = state.kitchen.map(it=>it.name).join('炒');
  state.kitchen = [];
  if (tier === '极佳') state.rapport += 1;
  const frag = tryFindFragment();
  render();
  let msg = `今天端上桌的是「${dishName}」。\n\nEthan: ${pick(COOK_REACTIONS[tier])}`;
  if (frag) msg += `\n\n🧩 收拾灶台时翻出了一片记忆碎片:\n${frag.text}`;
  document.getElementById('rText').textContent = msg;
  document.getElementById('rOverlay').classList.add('show');
}

function nextDay() {
  state.day += 1;
  state.haggled = {};
  state.priceMod = {};
  say(pick(LINES.nextDay));
  render();
  if (state.day % 3 === 0) {
    setTimeout(showQuestion, 500);
  }
}

function showQuestion() {
  const q = pick(QUESTIONS);
  document.getElementById('qText').textContent = q.q;
  const optsEl = document.getElementById('qOpts');
  optsEl.innerHTML = '';
  q.opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = o.t;
    btn.onclick = () => {
      document.getElementById('qOverlay').classList.remove('show');
      state.rapport += 1;
      render();
      document.getElementById('rText').textContent = o.r;
      document.getElementById('rOverlay').classList.add('show');
    };
    optsEl.appendChild(btn);
  });
  document.getElementById('qOverlay').classList.add('show');
}

document.getElementById('rClose').onclick = () => {
  document.getElementById('rOverlay').classList.remove('show');
};
document.getElementById('nextDay').onclick = nextDay;
document.getElementById('cookBtn').onclick = cookMeal;
document.getElementById('drawBtn').onclick = drawCard;

function switchTab(name){
  ['farm','market','bond','restaurant'].forEach(t => {
    document.getElementById(t + 'Tab').classList.toggle('hidden', t !== name);
    document.getElementById('tab' + t[0].toUpperCase() + t.slice(1) + 'Btn').classList.toggle('active', t === name);
  });
}
document.getElementById('tabFarmBtn').onclick = () => switchTab('farm');
document.getElementById('tabMarketBtn').onclick = () => switchTab('market');
document.getElementById('tabBondBtn').onclick = () => switchTab('bond');
document.getElementById('tabRestaurantBtn').onclick = () => switchTab('restaurant');

setInterval(() => {
  if (Math.random() < 0.15) say(pick(LINES.idle));
}, 15000);

render();
</script>
</body>
</html>
