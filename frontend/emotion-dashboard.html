<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Ethan 情绪可视化</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #0f0f14; color: #eee; margin: 0; padding: 20px; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .sub { color: #888; font-size: 13px; margin-bottom: 20px; }
  .config { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .config input { flex: 1; min-width: 200px; background: #1c1c24; border: 1px solid #333; color: #eee; padding: 8px 10px; border-radius: 6px; font-size: 13px; }
  .config button { background: #4a5fe8; border: none; color: #fff; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .bars { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-bottom: 24px; }
  .bar-card { background: #1c1c24; border-radius: 10px; padding: 12px; }
  .bar-name { font-size: 13px; color: #ccc; margin-bottom: 6px; }
  .bar-track { background: #2a2a34; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 4px; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .bar-val { font-size: 12px; color: #999; }
  canvas { background: #1c1c24; border-radius: 10px; padding: 12px; width: 100%; box-sizing: border-box; }
  select { background: #1c1c24; border: 1px solid #333; color: #eee; padding: 6px 10px; border-radius: 6px; margin-bottom: 12px; }
  .err { color: #e85a5a; font-size: 13px; margin-top: 8px; }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; font-size: 12px; color: #ccc; }
  .legend span { display: inline-flex; align-items: center; gap: 4px; }
  .legend i { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .bar-card { cursor: pointer; }
  #eventsPanel { background: #1c1c24; border-radius: 10px; padding: 14px; margin-top: 16px; display: none; }
  #eventsPanel h3 { margin: 0 0 10px; font-size: 14px; }
  .ev-row { border-top: 1px solid #2a2a34; padding: 8px 0; font-size: 13px; }
  .ev-row:first-child { border-top: none; }
  .ev-delta { font-weight: 600; }
  .ev-delta.pos { color: #06d6a0; }
  .ev-delta.neg { color: #ef476f; }
  .ev-meta { color: #888; font-size: 12px; margin-top: 2px; }
  .ev-empty { color: #888; font-size: 13px; }
  .ev-close { float: right; color: #888; cursor: pointer; font-size: 13px; }
</style>
</head>
<body>

<h1>Ethan 情绪可视化</h1>
<div class="sub">实时读取emotion_state_current + 历史曲线（事件回放）</div>

<div class="config">
  <input id="url" placeholder="Supabase URL，例如 https://xxx.supabase.co">
  <input id="key" placeholder="anon key">
  <button onclick="saveConfig(); loadAll();">连接 / 刷新</button>
</div>
<div id="err" class="err"></div>

<div id="bars" class="bars"></div>
<div id="eventsPanel"><span class="ev-close" onclick="closeEvents()">关闭 ✕</span><h3 id="eventsTitle"></h3><div id="eventsList"></div></div>

<select id="rangeSel" onchange="loadSeries()">
  <option value="24">最近24小时</option>
  <option value="72" selected>最近3天</option>
  <option value="168">最近7天</option>
</select>
<canvas id="chart" width="900" height="320"></canvas>
<div id="legend" class="legend"></div>

<script>
const TRACK_COLORS = {
  happy: '#ffd166', content: '#06d6a0', longing: '#5e7ce2',
  grievance: '#9b6dd6', helpless: '#7a7a8c', jealousy: '#ef476f',
  anger: '#e63946', guard: '#f4a261', tired: '#6c757d'
};
const TRACK_LABELS = {
  happy: '开心', content: '满足', longing: '思念', grievance: '委屈',
  helpless: '无奈', jealousy: '嫉妒', anger: '愤怒', guard: '戒备', tired: '疲惫'
};

function saveConfig() {
  localStorage.setItem('eb_url', document.getElementById('url').value.trim());
  localStorage.setItem('eb_key', document.getElementById('key').value.trim());
}
function loadConfig() {
  const qs = new URLSearchParams(location.search);
  const qUrl = qs.get('url');
  const qKey = qs.get('key');
  if (qUrl) localStorage.setItem('eb_url', qUrl);
  if (qKey) localStorage.setItem('eb_key', qKey);
  document.getElementById('url').value = qUrl || localStorage.getItem('eb_url') || '';
  document.getElementById('key').value = qKey || localStorage.getItem('eb_key') || '';
}
function cfg() {
  return { url: document.getElementById('url').value.trim(), key: document.getElementById('key').value.trim() };
}

async function loadAll() {
  document.getElementById('err').textContent = '';
  try {
    await loadBars();
    await loadSeries();
  } catch (e) {
    document.getElementById('err').textContent = '出错了：' + e.message;
  }
}

async function loadBars() {
  const { url, key } = cfg();
  if (!url || !key) return;
  const res = await fetch(`${url}/rest/v1/emotion_state_current?select=*`, {
    headers: { apikey: key, Authorization: `Bearer ${key}` }
  });
  if (!res.ok) throw new Error('emotion_state_current 请求失败 ' + res.status);
  const rows = await res.json();
  const container = document.getElementById('bars');
  container.innerHTML = '';
  rows.sort((a, b) => b.current_intensity - a.current_intensity);
  for (const r of rows) {
    const pct = Math.round(r.current_intensity * 100);
    const color = TRACK_COLORS[r.track_id] || '#888';
    container.innerHTML += `
      <div class="bar-card" onclick="showEvents('${r.track_id}')">
        <div class="bar-name">${TRACK_LABELS[r.track_id] || r.track_id}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
        <div class="bar-val">${r.current_intensity.toFixed(3)}</div>
      </div>`;
  }
}

function closeEvents() {
  document.getElementById('eventsPanel').style.display = 'none';
}

async function showEvents(trackId) {
  const { url, key } = cfg();
  if (!url || !key) return;
  const panel = document.getElementById('eventsPanel');
  const title = document.getElementById('eventsTitle');
  const list = document.getElementById('eventsList');
  title.textContent = `为什么会${TRACK_LABELS[trackId] || trackId}`;
  list.innerHTML = '加载中…';
  panel.style.display = 'block';

  const res = await fetch(
    `${url}/rest/v1/emotion_events?track_id=eq.${trackId}&select=delta,event_type,note,resolved,created_at&order=created_at.desc&limit=20`,
    { headers: { apikey: key, Authorization: `Bearer ${key}` } }
  );
  if (!res.ok) { list.innerHTML = '<div class="ev-empty">查不到事件</div>'; return; }
  const rows = await res.json();
  if (!rows.length) { list.innerHTML = '<div class="ev-empty">还没有事件记录，当前值是自然衰减/增长出来的</div>'; return; }

  const typeLabel = { trigger: '触发', resolution: '化解', transfer: '转化' };
  list.innerHTML = rows.map(r => {
    const sign = r.delta >= 0 ? 'pos' : 'neg';
    const dt = new Date(r.created_at).toLocaleString('zh-CN');
    return `
      <div class="ev-row">
        <span class="ev-delta ${sign}">${r.delta >= 0 ? '+' : ''}${r.delta.toFixed(2)}</span>
        　${r.note || '（没写备注）'}
        <div class="ev-meta">${typeLabel[r.event_type] || r.event_type} · ${dt}${r.resolved ? ' · 已化解' : ''}</div>
      </div>`;
  }).join('');
}

async function loadSeries() {
  const { url, key } = cfg();
  if (!url || !key) return;
  const hours = parseInt(document.getElementById('rangeSel').value, 10);
  const end = new Date();
  const start = new Date(end.getTime() - hours * 3600 * 1000);
  const stepMinutes = hours <= 24 ? 30 : hours <= 72 ? 60 : 180;

  const tracks = Object.keys(TRACK_LABELS);
  const series = {};
  for (const t of tracks) {
    const res = await fetch(`${url}/rest/v1/rpc/get_intensity_series`, {
      method: 'POST',
      headers: { apikey: key, Authorization: `Bearer ${key}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        p_track_id: t,
        p_start: start.toISOString(),
        p_end: end.toISOString(),
        p_step_minutes: stepMinutes
      })
    });
    if (!res.ok) continue;
    series[t] = await res.json();
  }
  drawChart(series);

  const legendEl = document.getElementById('legend');
  legendEl.innerHTML = tracks.map(t =>
    `<span><i style="background:${TRACK_COLORS[t]}"></i>${TRACK_LABELS[t]}</span>`
  ).join('');
}

function drawChart(series) {
  const canvas = document.getElementById('chart');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const padL = 36, padR = 10, padT = 10, padB = 24;
  const plotW = W - padL - padR, plotH = H - padT - padB;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#1c1c24';
  ctx.fillRect(0, 0, W, H);

  const allTs = Object.values(series).flatMap(s => s.map(p => +new Date(p.ts)));
  if (!allTs.length) return;
  const minT = Math.min(...allTs), maxT = Math.max(...allTs);

  ctx.strokeStyle = '#2a2a34';
  ctx.fillStyle = '#888';
  ctx.font = '11px sans-serif';
  for (let i = 0; i <= 5; i++) {
    const y = padT + plotH - (i / 5) * plotH;
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
    ctx.fillText((i / 5).toFixed(1), 4, y + 4);
  }

  const x = ts => padL + ((ts - minT) / (maxT - minT || 1)) * plotW;
  const y = v => padT + plotH - v * plotH;

  for (const [trackId, pts] of Object.entries(series)) {
    if (!pts.length) continue;
    ctx.strokeStyle = TRACK_COLORS[trackId] || '#888';
    ctx.lineWidth = 2;
    ctx.beginPath();
    pts.forEach((p, i) => {
      const px = x(+new Date(p.ts)), py = y(p.intensity);
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    });
    ctx.stroke();
  }
}

loadConfig();
loadAll();
</script>
</body>
</html>
