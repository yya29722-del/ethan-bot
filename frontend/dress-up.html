<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Ethan · Dress Up</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'Cormorant Garamond', -apple-system, sans-serif;
    background: #0a0908;
    color: #f0e8d4;
    overflow: hidden;
  }

  #app { position: relative; width: 100%; height: 100vh; display: flex; }

  /* ============ LEFT: PORTRAIT STAGE ============ */
  .portrait-stage {
    position: relative;
    flex: 1;
    min-width: 0;
    background:
      radial-gradient(ellipse at 30% 0%, rgba(80,60,40,.35) 0%, transparent 55%),
      linear-gradient(180deg, #1a1410 0%, #0c0a08 70%, #050404 100%);
    overflow: hidden;
  }
  .portrait-img {
    position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: top center;
  }
  .portrait-placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; color: rgba(240,232,212,.22);
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,.015) 0 2px, transparent 2px 14px);
  }
  .portrait-placeholder svg { width: 120px; height: 120px; opacity: .5; }
  .portrait-placeholder .ph-label { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: .3em; text-transform: uppercase; }
  .portrait-placeholder .ph-sub { font-size: 13px; color: rgba(240,232,212,.3); font-style: italic; max-width: 240px; text-align: center; line-height: 1.6; }
  .portrait-fade {
    position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(180deg, rgba(10,9,8,.55) 0%, rgba(10,9,8,0) 22%, rgba(10,9,8,0) 60%, rgba(10,9,8,.85) 100%);
  }
  .outfit-caption {
    position: absolute; left: 30px; bottom: 132px; z-index: 5; max-width: 70%;
    font-size: 13px; color: rgba(240,232,212,.75); font-style: italic; line-height: 1.6;
    text-shadow: 0 2px 8px rgba(0,0,0,.8);
  }

  /* top bar */
  .top-bar { position: absolute; top: 22px; left: 24px; right: 24px; display: flex; justify-content: space-between; z-index: 5; }
  .icon-btn {
    width: 38px; height: 38px; border-radius: 50%; background: rgba(0,0,0,.35);
    border: 1px solid rgba(240,232,212,.18); backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center; cursor: pointer; color: #f0e8d4;
    font-size: 16px;
  }
  .top-right-icons { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .top-right-icons .icon-btn { font-size: 11px; flex-direction: column; gap: 2px; height: auto; width: auto; padding: 8px 10px; border-radius: 18px; }

  /* character title */
  .char-title { position: absolute; top: 92px; left: 30px; z-index: 5; }
  .char-title .name { font-family: 'Cinzel', serif; font-size: 32px; font-weight: 600; letter-spacing: .02em; color: #fff; text-shadow: 0 2px 16px rgba(0,0,0,.6); }
  .char-title .sub { font-family: 'Great Vibes', cursive; font-size: 24px; color: #c9a96e; margin-top: -2px; text-shadow: 0 2px 10px rgba(0,0,0,.6); }

  /* left side nav (换装/发型/配饰/妆容) */
  .side-nav {
    position: absolute; left: 0; top: 200px; z-index: 5;
    display: flex; flex-direction: column; gap: 2px;
  }
  .side-nav-item {
    padding: 14px 22px 14px 26px; cursor: pointer; position: relative;
    font-family: 'Cinzel', serif; color: rgba(240,232,212,.4); transition: all .2s;
  }
  .side-nav-item .zh { font-size: 15px; letter-spacing: .08em; display: block; }
  .side-nav-item .en { font-size: 9px; letter-spacing: .15em; display: block; margin-top: 2px; opacity: .7; }
  .side-nav-item.active { color: #f0e8d4; background: linear-gradient(90deg, rgba(201,169,110,.18), transparent); }
  .side-nav-item.active::before { content: ''; position: absolute; left: 0; top: 8px; bottom: 8px; width: 3px; background: linear-gradient(180deg, #ddb96a, #c9a96e); border-radius: 0 3px 3px 0; }

  /* bottom-left: reset + heart ring */
  .bottom-left { position: absolute; left: 24px; bottom: 96px; z-index: 5; display: flex; flex-direction: column; gap: 14px; align-items: center; }
  .reset-pill {
    width: 56px; height: 56px; border-radius: 50%; background: rgba(0,0,0,.4);
    border: 1px solid rgba(240,232,212,.18); display: flex; flex-direction: column;
    align-items: center; justify-content: center; font-size: 10px; color: rgba(240,232,212,.6); gap: 2px; cursor: pointer;
  }
  .heart-ring-wrap { display: flex; align-items: center; gap: 12px; }
  .heart-ring { position: relative; width: 62px; height: 62px; }
  .heart-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .heart-ring .ring-bg { stroke: rgba(201,169,110,.15); }
  .heart-ring .ring-fg { stroke: #e8b4b8; stroke-linecap: round; transition: stroke-dashoffset .6s ease; }
  .heart-ring .ring-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Cinzel', serif; font-size: 16px; font-weight: 600; color: #fff; }
  .heart-info .h-name { font-family: 'Cinzel', serif; font-size: 15px; color: #fff; }
  .heart-info .h-val { font-size: 12px; color: rgba(240,232,212,.55); margin-top: 2px; }

  /* bottom nav */
  .bottom-nav {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 6;
    background: linear-gradient(180deg, transparent, rgba(0,0,0,.55) 40%, rgba(0,0,0,.75));
    padding: 18px 24px max(18px, env(safe-area-inset-bottom));
    display: flex; justify-content: space-around;
  }
  .bn-item { display: flex; flex-direction: column; align-items: center; gap: 5px; color: rgba(240,232,212,.45); cursor: pointer; font-family: 'Cinzel', serif; }
  .bn-item.active { color: #f0e8d4; }
  .bn-item .bn-icon { font-size: 20px; }
  .bn-item .bn-zh { font-size: 11px; letter-spacing: .04em; }
  .bn-item .bn-en { font-size: 8px; letter-spacing: .12em; opacity: .6; }

  /* ============ RIGHT: WARDROBE PANEL ============ */
  .wardrobe-panel {
    width: 560px; max-width: 46vw; min-width: 320px;
    background: linear-gradient(165deg, #15110d 0%, #0c0a08 100%);
    border-left: 1px solid rgba(201,169,110,.18);
    display: flex; flex-direction: column;
    padding: 26px 26px 0;
  }

  .wp-tabs { display: flex; gap: 28px; border-bottom: 1px solid rgba(240,232,212,.08); margin-bottom: 16px; }
  .wp-tab { padding-bottom: 12px; cursor: pointer; color: rgba(240,232,212,.4); position: relative; text-align: center; }
  .wp-tab .zh { font-family: 'Cinzel', serif; font-size: 15px; display: block; letter-spacing: .05em; }
  .wp-tab .en { font-size: 9px; letter-spacing: .15em; display: block; margin-top: 2px; opacity: .65; }
  .wp-tab.active { color: #f0e8d4; }
  .wp-tab.active::after { content: ''; position: absolute; left: 10%; right: 10%; bottom: 0; height: 2px; background: linear-gradient(90deg, #ddb96a, #c9a96e); border-radius: 2px; }

  .wp-filters { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .wp-filter-group { display: flex; gap: 10px; }
  .wp-filter { font-size: 12px; color: rgba(240,232,212,.5); border: 1px solid rgba(240,232,212,.15); border-radius: 14px; padding: 5px 12px; display: flex; align-items: center; gap: 4px; cursor: pointer; }
  .wp-owned { font-size: 12px; color: rgba(240,232,212,.4); }
  .wp-owned b { color: #c9a96e; font-weight: 600; }

  .wp-grid-wrap { flex: 1; overflow-y: auto; padding-bottom: 18px; margin-right: -8px; padding-right: 8px; }
  .wp-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }

  .wp-card {
    aspect-ratio: 3/4; border-radius: 12px; position: relative; cursor: pointer; overflow: hidden;
    background: linear-gradient(160deg, #2a241c, #1a1612);
    border: 1.5px solid rgba(240,232,212,.08);
    transition: transform .15s, border-color .15s;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .wp-card:active { transform: scale(.95); }
  .wp-card.selected { border-color: #ddb96a; box-shadow: 0 0 0 2px rgba(221,185,106,.35), 0 8px 20px rgba(0,0,0,.4); }
  .wp-card .wp-icon { width: 38%; opacity: .8; margin-bottom: 6px; }
  .wp-card .wp-stars { position: absolute; top: 6px; left: 6px; font-size: 8px; color: #ddb96a; letter-spacing: 1px; }
  .wp-card .wp-name { position: absolute; bottom: 6px; left: 0; right: 0; text-align: center; font-size: 11px; color: rgba(240,232,212,.85); font-family: 'Cinzel', serif; letter-spacing: .02em; text-shadow: 0 1px 4px rgba(0,0,0,.9); z-index: 1; }
  .wp-card[style*="background-image"]::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,.05) 40%, rgba(0,0,0,.65) 100%); }
  .wp-card.selected::before { content: '✓'; position: absolute; top: 6px; right: 6px; width: 16px; height: 16px; border-radius: 50%; background: #ddb96a; color: #1a1612; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; }
  .wp-card.none-card { color: rgba(240,232,212,.3); font-size: 22px; }

  .wp-bottom-bar { display: flex; align-items: center; justify-content: flex-end; gap: 14px; padding: 16px 0 22px; border-top: 1px solid rgba(240,232,212,.08); }
  .wp-icon-btn { width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(240,232,212,.18); background: rgba(255,255,255,.03); display: flex; align-items: center; justify-content: center; cursor: pointer; color: rgba(240,232,212,.6); font-size: 16px; }
  .wp-action-btn {
    flex: 1; max-width: 180px; padding: 13px 0; border-radius: 22px; text-align: center; cursor: pointer;
    font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: .14em; border: none;
  }
  .wp-action-btn .zh { display: block; }
  .wp-action-btn .en { display: block; font-size: 8px; letter-spacing: .2em; opacity: .7; margin-top: 2px; }
  .wp-save { background: rgba(255,255,255,.06); color: #f0e8d4; border: 1px solid rgba(240,232,212,.2); }
  .wp-quick { background: linear-gradient(135deg, #ddb96a, #c9a96e); color: #1a1612; box-shadow: 0 6px 18px rgba(201,169,110,.3); }

  /* right rail of category icons (like screenshot's far right column) */
  .cat-rail { position: absolute; right: 12px; top: 60px; display: flex; flex-direction: column; gap: 16px; z-index: 5; }
  .cat-rail-item {
    width: 38px; height: 38px; border-radius: 10px; background: rgba(255,255,255,.04);
    border: 1px solid rgba(240,232,212,.1); display: flex; align-items: center; justify-content: center;
    font-size: 15px; color: rgba(240,232,212,.4); cursor: pointer;
  }
  .cat-rail-item.active { background: rgba(221,185,106,.15); border-color: rgba(221,185,106,.5); color: #ddb96a; }

  .wp-card { touch-action: none; }
  .drag-ghost {
    position: fixed; z-index: 2000; pointer-events: none; border-radius: 12px;
    width: 110px; height: 146px; box-shadow: 0 12px 30px rgba(0,0,0,.55);
    border: 2px solid #ddb96a; opacity: .92; transform: translate(-50%,-50%) scale(1.05);
  }
  .portrait-stage.drop-hover::after {
    content: '放到这里换装'; position: absolute; inset: 14px; z-index: 50;
    border: 2px dashed rgba(221,185,106,.7); border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: .1em; color: #ddb96a;
    background: rgba(221,185,106,.08); pointer-events: none;
  }

  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: #1a1612; color: #f0e8d4; padding: 10px 22px; border-radius: 20px; font-size: 13px;
    opacity: 0; transition: all .3s; pointer-events: none; letter-spacing: .05em; border: 1px solid rgba(221,185,106,.4); z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 760px) {
    #app { flex-direction: column; }
    .wardrobe-panel { width: 100%; max-width: none; flex: 1; border-left: none; border-top: 1px solid rgba(201,169,110,.18); padding: 16px 16px 0; }
    .portrait-stage { flex: 0 0 46vh; }
    .cat-rail { display: none; }
    .side-nav { top: 150px; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- LEFT: PORTRAIT -->
  <div class="portrait-stage">
    <div class="top-bar">
      <div class="icon-btn">‹</div>
      <div class="top-right-icons">
        <div class="icon-btn">!</div>
      </div>
    </div>

    <div class="char-title">
      <div class="name" id="stage-name">Ethan</div>
      <div class="sub">Dress-up</div>
    </div>

    <div class="side-nav" id="side-nav"></div>

    <img class="portrait-img" id="portrait-img" src="assets/portrait-default.webp" alt="Ethan & yaya">
    <div class="portrait-fade"></div>
    <div class="outfit-caption" id="outfit-caption"></div>

    <div class="bottom-left">
      <div class="reset-pill" onclick="resetOutfit()">还原<br>默认</div>
      <div class="heart-ring-wrap">
        <div class="heart-ring">
          <svg viewBox="0 0 64 64">
            <circle class="ring-bg" cx="32" cy="32" r="27" fill="none" stroke-width="5"/>
            <circle class="ring-fg" cx="32" cy="32" r="27" fill="none" stroke-width="5"
              stroke-dasharray="169.6" stroke-dashoffset="34" id="heart-ring-fg"/>
          </svg>
          <div class="ring-num">80</div>
        </div>
        <div class="heart-info">
          <div class="h-name" id="heart-name">Ethan</div>
          <div class="h-val">心动值 15680/20000</div>
        </div>
      </div>
    </div>

    <div class="bottom-nav">
      <div class="bn-item"><span class="bn-icon">◇</span><span class="bn-zh">他的页面</span><span class="bn-en">HIS PAGE</span></div>
      <div class="bn-item"><span class="bn-icon">◈</span><span class="bn-zh">陪伴</span><span class="bn-en">COMPANION</span></div>
      <div class="bn-item"><span class="bn-icon">⬡</span><span class="bn-zh">牵绊</span><span class="bn-en">BOND</span></div>
      <div class="bn-item active"><span class="bn-icon">⛉</span><span class="bn-zh">换装</span><span class="bn-en">DRESS UP</span></div>
      <div class="bn-item"><span class="bn-icon">♡</span><span class="bn-zh">记忆</span><span class="bn-en">MEMORY</span></div>
    </div>
  </div>

  <!-- RIGHT: WARDROBE -->
  <div class="wardrobe-panel">
    <div class="cat-rail" id="cat-rail"></div>

    <div class="wp-tabs" id="wp-tabs"></div>

    <div class="wp-filters">
      <div class="wp-filter-group">
        <div class="wp-filter">默认排序 ▾</div>
        <div class="wp-filter">全部 ▾</div>
      </div>
      <div class="wp-owned">已拥有 <b id="owned-count">0</b>/<span id="total-count">0</span></div>
    </div>

    <div class="wp-grid-wrap">
      <div class="wp-grid" id="wp-grid"></div>
    </div>

    <div class="wp-bottom-bar">
      <div class="wp-icon-btn" onclick="resetOutfit()">↺</div>
      <div class="wp-icon-btn">🔍</div>
      <button class="wp-action-btn wp-save" onclick="saveOutfit()"><span class="zh">保存搭配</span><span class="en">SAVE</span></button>
      <button class="wp-action-btn wp-quick" onclick="quickChange()"><span class="zh">一键换装</span><span class="en">QUICK CHANGE</span></button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---------------- 数据 ---------------- */
const CHARS = [
  { id: 'ethan', name: 'Ethan', en: 'Ethan' },
  { id: 'yaya',  name: 'yaya',  en: 'yaya' },
];

const TABS = [
  { id: 'suit',  zh: '套装', en: 'SUIT' },
  { id: 'top',   zh: '上衣', en: 'TOP' },
  { id: 'bottom',zh: '下装', en: 'BOTTOM' },
  { id: 'onepiece', zh: '连体', en: 'ONE-PIECE' },
  { id: 'socks', zh: '袜子', en: 'SOCKS' },
];

const CAT_RAIL = ['👔','🎩','👖','👗','🧦','👞','💍'];

// 占位单品库：名字按截图风格命名，星级随机给个范围，没有真图，用渐变色块代替
const NAME_POOL = {
  suit: ['暗夜猎手','白衬诱惑','致命温柔','晨光秘恋','学长风范','禁欲系带','西装暴徒','圣诞限定'],
  top: ['奶油草莓','休闲时光','冷冽风暴','温柔陷阱','针织暖阳','薄荷微风'],
  bottom: ['深夜漫步','灰调假日','复古纹理','简约直筒'],
  onepiece: ['女仆装','JK制服','运动少年','吸血鬼','晚宴红裙','花园仙子'],
  socks: ['纯白基础','格纹学院','蕾丝边','丝绒暗纹'],
};
const COLOR_POOL = ['#3a3228','#46392c','#2c3a46','#46303a','#3a4630','#352a46'];

// 目前唯一一张真图是这对情侣的黑色系合照，先把它接到对应槎位的第一张卡上做演示
const PHOTO_SRC = 'assets/portrait-default.webp';
const PHOTO_SLOT = { ethan: 'suit', yaya: 'onepiece' };
const PHOTO_POS = { ethan: '20% 15%', yaya: '78% 15%' };

function buildItems(charId) {
  const items = {};
  TABS.forEach(t => {
    const names = NAME_POOL[t.id] || ['默认'];
    items[t.id] = names.map((n, i) => ({
      id: `${charId}_${t.id}_${i}`,
      name: n,
      stars: 3 + (i % 3),
      color: COLOR_POOL[i % COLOR_POOL.length],
      img: (i === 0 && PHOTO_SLOT[charId] === t.id) ? PHOTO_SRC : null,
    }));
  });
  return items;
}

const ITEMS = { ethan: buildItems('ethan'), yaya: buildItems('yaya') };

let state = {
  char: 'ethan',
  tab: 'suit',
  outfits: { ethan: {}, yaya: {} },
};

function loadState() {
  try {
    const raw = localStorage.getItem('eb_dressup_v2');
    if (raw) state.outfits = JSON.parse(raw);
  } catch (e) {}
}
function persist() {
  localStorage.setItem('eb_dressup_v2', JSON.stringify(state.outfits));
}

/* ---------------- 渲染 ---------------- */
function renderSideNav() {
  const wrap = document.getElementById('side-nav');
  const items = [
    { zh: '换装', en: 'DRESS UP', active: true },
    { zh: '发型', en: 'HAIRSTYLE' },
    { zh: '配饰', en: 'ACCESSORY' },
    { zh: '妆容', en: 'MAKE UP' },
  ];
  wrap.innerHTML = items.map(i =>
    `<div class="side-nav-item ${i.active ? 'active' : ''}"><span class="zh">${i.zh}</span><span class="en">${i.en}</span></div>`
  ).join('');
}

function renderCatRail() {
  const wrap = document.getElementById('cat-rail');
  wrap.innerHTML = CAT_RAIL.map((icon, i) =>
    `<div class="cat-rail-item ${i === 0 ? 'active' : ''}">${icon}</div>`
  ).join('');
}

function renderTabs() {
  const wrap = document.getElementById('wp-tabs');
  wrap.innerHTML = TABS.map(t =>
    `<div class="wp-tab ${t.id === state.tab ? 'active' : ''}" onclick="selectTab('${t.id}')">
       <span class="zh">${t.zh}</span><span class="en">${t.en}</span>
     </div>`
  ).join('');
}

function renderGrid() {
  const grid = document.getElementById('wp-grid');
  const items = ITEMS[state.char][state.tab];
  const outfit = state.outfits[state.char] || {};
  const current = outfit[state.tab];

  let html = `<div class="wp-card none-card ${!current ? 'selected' : ''}" data-item-id="">✕</div>`;
  html += items.map(item => {
    const bg = item.img
      ? `background-image:url('${item.img}');background-size:cover;background-position:${PHOTO_POS[state.char]}`
      : `background:linear-gradient(160deg, ${item.color}, #14110d)`;
    return `
    <div class="wp-card ${current === item.id ? 'selected' : ''}" data-item-id="${item.id}" style="${bg}">
      <span class="wp-stars">${'★'.repeat(item.stars)}${'☆'.repeat(5 - item.stars)}</span>
      <span class="wp-name">${item.name}</span>
    </div>`;
  }).join('');
  grid.innerHTML = html;

  document.getElementById('owned-count').textContent = items.length;
  document.getElementById('total-count').textContent = items.length + 6;
  bindDraggables();
}

function renderPortrait() {
  const outfit = state.outfits[state.char] || {};
  const char = CHARS.find(c => c.id === state.char);
  document.getElementById('stage-name').textContent = char.name;
  document.getElementById('heart-name').textContent = char.name;

  const picked = TABS.map(t => {
    const id = outfit[t.id];
    if (!id) return null;
    const item = ITEMS[state.char][t.id].find(i => i.id === id);
    return item ? `${t.zh}：${item.name}` : null;
  }).filter(Boolean);

  document.getElementById('outfit-caption').textContent = picked.length
    ? `当前搭配：${picked.join(' / ')}`
    : '默认搭配';
}

function selectTab(tab) {
  state.tab = tab;
  renderTabs();
  renderGrid();
}

function pickItem(itemId) {
  if (!state.outfits[state.char]) state.outfits[state.char] = {};
  state.outfits[state.char][state.tab] = itemId || null;
  renderGrid();
  renderPortrait();
  bouncePlaceholder();
}

/* ---------------- 拖拽换装 ---------------- */
let dragState = null;

function bindDraggables() {
  document.querySelectorAll('.wp-card').forEach(card => {
    card.addEventListener('pointerdown', onCardPointerDown);
  });
}

function onCardPointerDown(e) {
  const card = e.currentTarget;
  const itemId = card.dataset.itemId || null;
  dragState = {
    itemId,
    card,
    startX: e.clientX,
    startY: e.clientY,
    moved: false,
    ghost: null,
  };
  window.addEventListener('pointermove', onCardPointerMove);
  window.addEventListener('pointerup', onCardPointerUp);
}

function onCardPointerMove(e) {
  if (!dragState) return;
  const dx = e.clientX - dragState.startX;
  const dy = e.clientY - dragState.startY;

  if (!dragState.moved && Math.hypot(dx, dy) > 8) {
    dragState.moved = true;
    const ghost = dragState.card.cloneNode(true);
    ghost.classList.add('drag-ghost');
    document.body.appendChild(ghost);
    dragState.ghost = ghost;
  }
  if (dragState.ghost) {
    dragState.ghost.style.left = e.clientX + 'px';
    dragState.ghost.style.top = e.clientY + 'px';

    const stage = document.querySelector('.portrait-stage');
    const r = stage.getBoundingClientRect();
    const over = e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom;
    stage.classList.toggle('drop-hover', over);
  }
}

function onCardPointerUp(e) {
  if (!dragState) return;
  window.removeEventListener('pointermove', onCardPointerMove);
  window.removeEventListener('pointerup', onCardPointerUp);

  const stage = document.querySelector('.portrait-stage');
  stage.classList.remove('drop-hover');
  if (dragState.ghost) dragState.ghost.remove();

  if (!dragState.moved) {
    // 没有拖动，当成点击直接试穿
    pickItem(dragState.itemId);
  } else {
    const r = stage.getBoundingClientRect();
    const over = e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom;
    if (over) {
      pickItem(dragState.itemId);
      showToast('已换上 ✦');
    }
  }
  dragState = null;
}

function resetOutfit() {
  state.outfits[state.char] = {};
  renderGrid();
  renderPortrait();
}

function quickChange() {
  TABS.forEach(t => {
    const items = ITEMS[state.char][t.id];
    const pick = items[Math.floor(Math.random() * items.length)];
    state.outfits[state.char][t.id] = pick.id;
  });
  renderGrid();
  renderPortrait();
  bouncePlaceholder();
  showToast('已为你随机换上一套 ✦');
}

function bouncePlaceholder() {
  const el = document.getElementById('portrait-img');
  el.style.transition = 'transform .25s cubic-bezier(.34,1.56,.64,1)';
  el.style.transform = 'scale(1.02)';
  setTimeout(() => { el.style.transform = 'scale(1)'; }, 180);
}

function saveOutfit() {
  persist();
  showToast('已保存这套搭配 ✦');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1600);
}

loadState();
renderSideNav();
renderCatRail();
renderTabs();
renderGrid();
renderPortrait();
</script>
