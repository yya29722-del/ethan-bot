<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Ethan · Dress Up</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'Cinzel', -apple-system, sans-serif;
    background: #050404;
    color: #f0e8d4;
    overflow: hidden;
  }

  #app { position: fixed; inset: 0; }

  /* ============ FULL-BLEED STAGE ============ */
  .stage {
    position: absolute; inset: 0;
    background: #050404;
    overflow: hidden;
  }
  .portrait-img {
    position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: top center;
    transition: transform .25s cubic-bezier(.34,1.56,.64,1);
  }
  .stage-fade {
    position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(180deg, rgba(5,4,4,.5) 0%, rgba(5,4,4,0) 20%, rgba(5,4,4,0) 70%, rgba(5,4,4,.6) 100%);
  }

  .back-btn {
    position: absolute; top: 24px; left: 24px; z-index: 5;
    width: 36px; height: 36px; border-radius: 50%; background: rgba(0,0,0,.35);
    border: 1px solid rgba(240,232,212,.18); backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center; cursor: pointer; color: #f0e8d4; font-size: 16px;
  }
  .char-name {
    position: absolute; top: 26px; left: 72px; z-index: 5;
    font-size: 30px; font-weight: 600; letter-spacing: .03em; color: #fff;
    text-shadow: 0 2px 16px rgba(0,0,0,.7);
  }

  .char-switch { position: absolute; top: 30px; right: 26px; z-index: 5; display: flex; gap: 8px; }
  .cs-btn {
    width: 40px; height: 40px; border-radius: 50%; border: 1px solid rgba(240,232,212,.25);
    background: rgba(0,0,0,.4); backdrop-filter: blur(6px); color: rgba(240,232,212,.55);
    font-family: 'Cinzel', serif; font-size: 12px; cursor: pointer;
  }
  .cs-btn.active { background: linear-gradient(135deg, #ddb96a, #c9a96e); color: #1a1612; border-color: transparent; }

  /* drawer handle tab on right edge */
  .drawer-handle {
    position: absolute; right: 0; top: 50%; transform: translateY(-50%);
    width: 34px; height: 86px; z-index: 40;
    background: linear-gradient(160deg, #2a241c, #15110d);
    border: 1px solid rgba(201,169,110,.3); border-right: none;
    border-radius: 16px 0 0 16px;
    display: flex; align-items: center; justify-content: center;
    color: #ddb96a; font-size: 18px; cursor: pointer;
  }

  /* ============ RIGHT DRAWER (wardrobe) ============ */
  .drawer {
    position: absolute; top: 0; right: 0; bottom: 0; z-index: 50;
    width: 84vw; max-width: 380px;
    background: linear-gradient(165deg, #15110d 0%, #0c0a08 100%);
    border-left: 1px solid rgba(201,169,110,.25);
    display: flex; flex-direction: column;
    padding: 22px 18px 0;
    transform: translateX(100%);
    transition: transform .32s cubic-bezier(.32,.72,0,1);
    box-shadow: -16px 0 40px rgba(0,0,0,.5);
  }
  .drawer.open { transform: translateX(0); }

  .drawer-close {
    position: absolute; left: -40px; top: 18px;
    width: 34px; height: 34px; border-radius: 50%;
    background: rgba(0,0,0,.5); border: 1px solid rgba(240,232,212,.25);
    color: #f0e8d4; display: flex; align-items: center; justify-content: center; cursor: pointer;
  }

  .wp-tabs { display: flex; gap: 18px; flex-wrap: wrap; border-bottom: 1px solid rgba(240,232,212,.08); margin-bottom: 14px; padding-bottom: 10px; }
  .wp-tab { font-size: 14px; letter-spacing: .04em; color: rgba(240,232,212,.4); cursor: pointer; padding-bottom: 4px; position: relative; }
  .wp-tab.active { color: #f0e8d4; }
  .wp-tab.active::after { content: ''; position: absolute; left: 0; right: 0; bottom: -10px; height: 2px; background: linear-gradient(90deg, #ddb96a, #c9a96e); border-radius: 2px; }

  .wp-grid-wrap { flex: 1; overflow-y: auto; padding-bottom: 16px; margin-right: -6px; padding-right: 6px; touch-action: pan-y; }
  .wp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

  .wp-card {
    aspect-ratio: 3/4; border-radius: 10px; position: relative; cursor: pointer; overflow: hidden;
    background: linear-gradient(160deg, #2a241c, #1a1612);
    border: 1.5px solid rgba(240,232,212,.08);
    transition: transform .15s, border-color .15s;
    touch-action: pan-y;
  }
  .wp-card:active { transform: scale(.94); }
  .wp-card.selected { border-color: #ddb96a; box-shadow: 0 0 0 2px rgba(221,185,106,.35), 0 8px 20px rgba(0,0,0,.4); }
  .wp-card.selected::after { content: '✓'; position: absolute; top: 6px; right: 6px; width: 18px; height: 18px; border-radius: 50%; background: #ddb96a; color: #1a1612; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: 700; z-index: 2; }
  .wp-card.none-card { display: flex; align-items: center; justify-content: center; color: rgba(240,232,212,.3); font-size: 20px; }

  .wp-bottom-bar { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 14px 0 max(14px, env(safe-area-inset-bottom)); border-top: 1px solid rgba(240,232,212,.08); }
  .wp-icon-btn {
    width: 46px; height: 46px; border-radius: 50%; border: 1px solid rgba(240,232,212,.18);
    background: rgba(255,255,255,.04); display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: rgba(240,232,212,.7); font-size: 17px;
  }
  .wp-icon-btn.primary { background: linear-gradient(135deg, #ddb96a, #c9a96e); color: #1a1612; border: none; }

  .drag-ghost {
    position: fixed; z-index: 2000; pointer-events: none; border-radius: 10px;
    width: 96px; height: 128px; box-shadow: 0 12px 30px rgba(0,0,0,.55);
    border: 2px solid #ddb96a; opacity: .92; transform: translate(-50%,-50%) scale(1.05);
  }
  .stage.drop-hover::before {
    content: ''; position: absolute; inset: 14px; z-index: 30;
    border: 2px dashed rgba(221,185,106,.6); border-radius: 18px;
    pointer-events: none;
  }

  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: #1a1612; color: #f0e8d4; padding: 9px 20px; border-radius: 20px; font-size: 12px;
    opacity: 0; transition: all .3s; pointer-events: none; letter-spacing: .04em; border: 1px solid rgba(221,185,106,.4); z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">

  <div class="stage" id="stage">
    <img class="portrait-img" id="portrait-img" src="assets/portrait-default.webp" alt="Ethan & yaya">
    <div class="stage-fade"></div>
    <div class="back-btn" onclick="location.href='../index.html'">‹</div>
    <div class="char-name" id="stage-name">Ethan</div>
    <div class="char-switch" id="char-switch"></div>
    <div class="drawer-handle" id="drawer-handle">❮</div>
  </div>

  <div class="drawer" id="drawer">
    <div class="drawer-close" id="drawer-close">✕</div>
    <div class="wp-tabs" id="wp-tabs"></div>
    <div class="wp-grid-wrap">
      <div class="wp-grid" id="wp-grid"></div>
    </div>
    <div class="wp-bottom-bar">
      <div class="wp-icon-btn" onclick="resetOutfit()">↺</div>
      <div class="wp-icon-btn primary" onclick="quickChange()">🎲</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---------------- 数据 ---------------- */
const CHARS = [
  { id: 'ethan', name: 'Ethan' },
  { id: 'yaya',  name: 'yaya' },
];

const TABS = [
  { id: 'suit',  zh: '套装' },
  { id: 'top',   zh: '上衣' },
  { id: 'bottom',zh: '下装' },
  { id: 'onepiece', zh: '连体' },
  { id: 'home',  zh: '居家' },
  { id: 'socks', zh: '袜子' },
];

const NAME_POOL = {
  suit: ['学院燕尾','晚宴女仆','致命温柔','晨光秘恋','学长风范','禁欲系带','西装暴徒','圣诞限定'],
  top: ['奶油草莓','休闲时光','冷冽风暴','温柔陷阱','针织暖阳','薄荷微风'],
  bottom: ['深夜漫步','灰调假日','复古纹理','简约直筒'],
  onepiece: ['暮色绸裙','丝绊晚裙','运动少年','吸血鬼','花园仙子'],
  home: ['简约黑居家','奶白居家','暮羊毛衣家居','黑绸睡袍','雾蓝家居','香槟晨褛'],
  socks: ['纯白基础','格纹学院','蕾丝边','丝绒暗纹'],
};
const COLOR_POOL = ['#3a3228','#46392c','#2c3a46','#46303a','#3a4630','#352a46'];

const PHOTO_POOL = {
  suit: ['67232.PNG', '67235.PNG'],
  onepiece: ['67226.PNG', '67233.PNG'],
  home: ['67227.PNG', '67228.PNG', '67229.PNG', '67230.PNG', '67231.PNG', '67234.PNG'],
};
const PHOTO_POS = { ethan: '15% 8%', yaya: '82% 8%' };

function buildItems(charId) {
  const items = {};
  TABS.forEach(t => {
    const names = NAME_POOL[t.id] || ['默认'];
    const photos = PHOTO_POOL[t.id] || [];
    items[t.id] = names.map((n, i) => ({
      id: `${charId}_${t.id}_${i}`,
      name: n,
      color: COLOR_POOL[i % COLOR_POOL.length],
      img: photos[i] ? `assets/${photos[i]}` : null,
    }));
  });
  return items;
}

const ITEMS = { ethan: buildItems('ethan'), yaya: buildItems('yaya') };

let state = {
  char: 'ethan',
  tab: 'suit',
  outfits: { ethan: {}, yaya: {} },
};

function loadState() {
  try {
    const raw = localStorage.getItem('eb_dressup_v2');
    if (raw) state.outfits = JSON.parse(raw);
  } catch (e) {}
}
function persist() {
  localStorage.setItem('eb_dressup_v2', JSON.stringify(state.outfits));
}

/* ---------------- 渲染 ---------------- */
function renderCharSwitch() {
  const wrap = document.getElementById('char-switch');
  wrap.innerHTML = CHARS.map(c =>
    `<button class="cs-btn ${c.id === state.char ? 'active' : ''}" data-char="${c.id}">${c.name[0]}</button>`
  ).join('');
  wrap.querySelectorAll('.cs-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.char = btn.dataset.char;
      renderAll();
    });
  });
}

function renderTabs() {
  const wrap = document.getElementById('wp-tabs');
  wrap.innerHTML = TABS.map(t =>
    `<div class="wp-tab ${t.id === state.tab ? 'active' : ''}" data-tab="${t.id}">${t.zh}</div>`
  ).join('');
  wrap.querySelectorAll('.wp-tab').forEach(el => {
    el.addEventListener('click', () => selectTab(el.dataset.tab));
  });
}

function renderGrid() {
  const grid = document.getElementById('wp-grid');
  const items = ITEMS[state.char][state.tab];
  const outfit = state.outfits[state.char] || {};
  const current = outfit[state.tab];

  let html = `<div class="wp-card none-card ${!current ? 'selected' : ''}" data-item-id="">✕</div>`;
  html += items.map(item => {
    const bg = item.img
      ? `background-image:url('${item.img}');background-size:cover;background-position:${PHOTO_POS[state.char]}`
      : `background:linear-gradient(160deg, ${item.color}, #14110d)`;
    return `<div class="wp-card ${current === item.id ? 'selected' : ''}" data-item-id="${item.id}" style="${bg}"></div>`;
  }).join('');
  grid.innerHTML = html;
  bindDraggables();
}

function renderPortrait() {
  const outfit = state.outfits[state.char] || {};
  const char = CHARS.find(c => c.id === state.char);
  document.getElementById('stage-name').textContent = char.name;

  const picked = TABS.map(t => {
    const id = outfit[t.id];
    if (!id) return null;
    const item = ITEMS[state.char][t.id].find(i => i.id === id);
    return item ? { tab: t, item } : null;
  }).filter(Boolean);

  const withPhoto = [...picked].reverse().find(p => p.item.img);
  const img = document.getElementById('portrait-img');
  img.src = withPhoto ? withPhoto.item.img : 'assets/portrait-default.webp';
  img.style.objectPosition = withPhoto ? PHOTO_POS[state.char] : 'top center';
}

function renderAll() {
  renderCharSwitch();
  renderTabs();
  renderGrid();
  renderPortrait();
}

function selectTab(tab) {
  state.tab = tab;
  renderTabs();
  renderGrid();
}

function pickItem(itemId) {
  if (!state.outfits[state.char]) state.outfits[state.char] = {};
  state.outfits[state.char][state.tab] = itemId || null;
  persist();
  renderGrid();
  renderPortrait();
  bouncePortrait();
}

function resetOutfit() {
  state.outfits[state.char] = {};
  persist();
  renderGrid();
  renderPortrait();
}

function quickChange() {
  TABS.forEach(t => {
    const items = ITEMS[state.char][t.id];
    const pick = items[Math.floor(Math.random() * items.length)];
    state.outfits[state.char][t.id] = pick.id;
  });
  persist();
  renderGrid();
  renderPortrait();
  bouncePortrait();
  showToast('✦');
}

function bouncePortrait() {
  const el = document.getElementById('portrait-img');
  el.style.transform = 'scale(1.03)';
  setTimeout(() => { el.style.transform = 'scale(1)'; }, 200);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1400);
}

/* ---------------- 抽屉开关 ---------------- */
function openDrawer() { document.getElementById('drawer').classList.add('open'); }
function closeDrawer() { document.getElementById('drawer').classList.remove('open'); }
document.getElementById('drawer-handle').addEventListener('click', openDrawer);
document.getElementById('drawer-close').addEventListener('click', closeDrawer);

/* ---------------- 点击 + 拖拽换装 ---------------- */
let dragState = null;

function bindDraggables() {
  document.querySelectorAll('.wp-card').forEach(card => {
    card.addEventListener('click', () => pickItem(card.dataset.itemId || null));
    card.addEventListener('pointerdown', onCardPointerDown);
  });
}

function onCardPointerDown(e) {
  const card = e.currentTarget;
  dragState = {
    itemId: card.dataset.itemId || null,
    card,
    startX: e.clientX,
    startY: e.clientY,
    moved: false,
    ghost: null,
  };
  window.addEventListener('pointermove', onCardPointerMove);
  window.addEventListener('pointerup', onCardPointerUp);
}

function onCardPointerMove(e) {
  if (!dragState) return;
  const dx = e.clientX - dragState.startX;
  const dy = e.clientY - dragState.startY;
  const dist = Math.hypot(dx, dy);

  // 只有明显的横向拖动才进入"拖拽模式"，避免和上下滑动列表冲突
  if (!dragState.moved && dist > 24 && Math.abs(dx) > Math.abs(dy)) {
    dragState.moved = true;
    const ghost = dragState.card.cloneNode(true);
    ghost.classList.add('drag-ghost');
    ghost.classList.remove('selected');
    document.body.appendChild(ghost);
    dragState.ghost = ghost;
  }
  if (dragState.ghost) {
    dragState.ghost.style.left = e.clientX + 'px';
    dragState.ghost.style.top = e.clientY + 'px';
    const drawer = document.getElementById('drawer').getBoundingClientRect();
    const overStage = e.clientX < drawer.left;
    document.getElementById('stage').classList.toggle('drop-hover', overStage);
  }
}

function onCardPointerUp(e) {
  if (!dragState) return;
  window.removeEventListener('pointermove', onCardPointerMove);
  window.removeEventListener('pointerup', onCardPointerUp);

  document.getElementById('stage').classList.remove('drop-hover');
  if (dragState.ghost) {
    dragState.ghost.remove();
    const drawer = document.getElementById('drawer').getBoundingClientRect();
    if (e.clientX < drawer.left) {
      pickItem(dragState.itemId);
      showToast('已换上 ✦');
    }
  }
  dragState = null;
}

loadState();
renderAll();
</script>
</body>
</html>
