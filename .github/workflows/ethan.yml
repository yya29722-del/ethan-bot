name: Ethan Bot

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  send-message:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          BARK_KEY: ${{ secrets.BARK_KEY }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python3 bot.py
