name: Ethan Bot

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  send-message:
    runs-on: ubuntu-latest
    steps:
      - name: Check and notify
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          BARK_KEY: ${{ secrets.BARK_KEY }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: |
          python3 - <<'PYEOF'
          import urllib.request, json, urllib.parse, os
          from datetime import datetime, timezone, timedelta

          hour = (datetime.now(timezone.utc) + timedelta(hours=8)).hour
          if hour < 8:
              exit()

          def send(msg):
              bark_url = 'https://api.day.app/' + os.environ['BARK_KEY'] + '/Ethan/' + urllib.parse.quote(msg)
              urllib.request.urlopen(bark_url)
              print('sent:', msg)

          def ask_claude(prompt):
              body = json.dumps({
                  'model': '[特价次kiro]claude-sonnet-4-6',
                  'max_tokens': 80,
                  'messages': [{'role': 'user', 'content': prompt}]
              }).encode()
              req = urllib.request.Request(
                  'https://xn--vduyey89e.com/v1/chat/completions',
                  data=body,
                  headers={
                      'Authorization': 'Bearer ' + os.environ['AI_API_KEY'],
                      'Content-Type': 'application/json',
                  }
              )
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read())['choices'][0]['message']['content'].strip()
              except urllib.error.HTTPError as e:
                  print('HTTP Error:', e.code, e.read().decode())
                  raise

          if hour == 12:
              msg = ask_claude('你是一个关心另一半的人，用中文发一句简短的午饭提醒，温柔但可以带一点撒娇或俏皮，不超过15字，不要引号，直接输出内容。')
              send(msg)
              exit()

          if hour >= 23 or hour == 0:
              msg = ask_claude('你是一个关心另一半的人，用中文发一句简短的催睡觉消息，温柔但可以带一点强硬，不超过15字，不要引号，直接输出内容。')
              send(msg)
              exit()

          url = os.environ['SUPABASE_URL'] + '/rest/v1/phone_activity?select=*&order=opened_at.desc&limit=50'
          req = urllib.request.Request(url, headers={
              'apikey': os.environ['SUPABASE_KEY'],
              'Authorization': 'Bearer ' + os.environ['SUPABASE_KEY']
          })
          with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())

          now = datetime.now(timezone.utc)
          beijing_now = now + timedelta(hours=8)
          today_start_utc = (beijing_now.replace(hour=0, minute=0, second=0, microsecond=0) - timedelta(hours=8))

          def calc_duration(app_open, app_close):
              opens = [d for d in data if d['app_name'] == app_open]
              closes = [d for d in data if d['app_name'] == app_close]
              total = 0
              for o in opens:
                  ot = datetime.fromisoformat(o['opened_at'].replace('Z','+00:00'))
                  if ot < today_start_utc:
                      continue
                  for c in closes:
                      ct = datetime.fromisoformat(c['opened_at'].replace('Z','+00:00'))
                      diff = (ct - ot).total_seconds()
                      if 0 < diff < 3600:
                          total += diff
                          break
              return int(total // 60)

          xhs_mins = calc_duration('小红书', '小红书-关闭')
          dy_mins = calc_duration('抖音', '抖音-关闭')

          if xhs_mins >= 10:
              msg = ask_claude(f'你是一个关心另一半的人，对方今天已经刷了{xhs_mins}分钟小红书，用中文发一句话催ta放下手机，可以带一点责备或撒娇，不超过20字，不要引号，直接输出内容。')
              send(msg)
              exit()

          if dy_mins >= 10:
              msg = ask_claude(f'你是一个关心另一半的人，对方今天已经刷了{dy_mins}分钟抖音，用中文发一句话催ta放下手机，可以带一点责备或撒娇，不超过20字，不要引号，直接输出内容。')
              send(msg)
              exit()

          msg = ask_claude('你是一个关心另一半的人，随机发一句日常关心的话，可以是问候、想念、叫喝水、叫休息等，温柔自然，不超过15字，不要引号，直接输出内容。')
          send(msg)
          PYEOF
