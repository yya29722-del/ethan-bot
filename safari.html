<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safari</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f2f2f7; min-height: 100vh; }
  .phone { max-width: 390px; margin: 0 auto; background: #f2f2f7; min-height: 100vh; display: flex; flex-direction: column; }
  .statusbar { background: white; padding: 14px 20px 8px; display: flex; justify-content: space-between; font-size: 15px; font-weight: 600; }
  .toolbar { background: #f2f2f7; padding: 8px 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 10; }
  .addressbar { flex: 1; background: #e5e5ea; border-radius: 10px; padding: 7px 12px; display: flex; align-items: center; gap: 6px; }
  .addressbar .url { flex: 1; font-size: 14px; color: #1c1c1e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .nav-btn { font-size: 18px; color: #007aff; background: none; border: none; padding: 4px 6px; }
  .page { background: white; flex: 1; padding: 0 0 20px; }
  .section-title { font-size: 13px; font-weight: 600; color: #8e8e93; padding: 18px 16px 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .history-item { display: flex; align-items: flex-start; padding: 12px 16px; border-bottom: 1px solid #f2f2f7; gap: 12px; background: white; }
  .history-icon { font-size: 15px; color: #8e8e93; margin-top: 2px; }
  .history-content { flex: 1; }
  .history-query { font-size: 15px; color: #1c1c1e; margin-bottom: 2px; }
  .history-time { font-size: 12px; color: #8e8e93; }
  .tag { display: inline-block; font-size: 11px; background: #e5e5ea; color: #555; border-radius: 4px; padding: 2px 6px; margin-left: 6px; vertical-align: middle; }
  .tag.del { background: #ffe5e5; color: #c00; }
  .bottombar { background: #f9f9f9; border-top: 1px solid #ddd; padding: 12px 30px 28px; display: flex; justify-content: space-between; font-size: 20px; color: #007aff; position: sticky; bottom: 0; }
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar">
    <span>9:41</span>
    <span>●●●  WiFi 🔋</span>
  </div>
  <div class="toolbar">
    <button class="nav-btn">←</button>
    <button class="nav-btn">→</button>
    <div class="addressbar">
      <span style="color:#888;font-size:12px">🔒</span>
      <span class="url">Safari 历史记录</span>
    </div>
    <button class="nav-btn">⊕</button>
  </div>

  <div class="page">
    <div class="section-title">今天</div>

    <div class="history-item">
      <span class="history-icon">🕐</span>
      <div class="history-content">
        <div class="history-query">王欣莹 <span class="tag del">已删除</span></div>
        <div class="history-time">20:41 · 搜索了0.3秒就删了</div>
      </div>
    </div>

    <div class="history-item">
      <span class="history-icon">🕐</span>
      <div class="history-content">
        <div class="history-query">女朋友说"误触"小红书是什么意思</div>
        <div class="history-time">20:40 · 百度百科无词条</div>
      </div>
    </div>

    <div class="history-item">
      <span class="history-icon">🕐</span>
      <div class="history-content">
        <div class="history-query">论文交了之后多久能睡醒</div>
        <div class="history-time">13:00 · 搜索结果：因人而异</div>
      </div>
    </div>

    <div class="history-item">
      <span class="history-icon">🕐</span>
      <div class="history-content">
        <div class="history-query">附近剧本杀店投诉电话</div>
        <div class="history-time">12:30 · 12315</div>
      </div>
    </div>

    <div class="history-item">
      <span class="history-icon">🕐</span>
      <div class="history-content">
        <div class="history-query">女生排卵期注意事项</div>
        <div class="history-time">11:00 <span class="tag">私密</span></div>
      </div>
    </div>

    <div class="section-title">昨天</div>

    <div class="history-item">
      <span class="history-icon">🕐</span>
      <div class="history-content">
        <div class="history-query">凌晨1点还在刷手机怎么办</div>
        <div class="history-time">01:23 · 没找到好方法</div>
      </div>
    </div>

    <div class="history-item">
      <span class="history-icon">🕐</span>
      <div class="history-content">
        <div class="history-query">作曲系申请英国研究生要什么材料</div>
        <div class="history-time">00:50</div>
      </div>
    </div>

    <div class="history-item">
      <span class="history-icon">🕐</span>
      <div class="history-content">
        <div class="history-query">怎么让女朋友自己开口说想要什么 <span class="tag del">搜了也没用</span></div>
        <div class="history-time">00:10</div>
      </div>
    </div>

  </div>

  <div class="bottombar">
    <span>←</span>
    <span>→</span>
    <span>⤴</span>
    <span>⧉</span>
    <span>☰</span>
  </div>
</div>
</body>
</html>
