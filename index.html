<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>yaya & Ethan</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="us">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#f5f3f0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, sans-serif; background: #f5f3f0; color: #2c2c2c; min-height: 100vh; overflow-x: hidden; }

  /* COVER */
  #cover { position: fixed; inset: 0; background: #f5f3f0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity .6s ease; }
  #cover.fade { opacity: 0; pointer-events: none; }
  .cover-icons { display: flex; gap: 28px; margin-bottom: 40px; align-items: flex-end; }
  .cover-icons svg { opacity: .85; }
  .cover-title { font-size: 15px; letter-spacing: 4px; color: #bbb; font-weight: 300; }
  .cover-date { font-size: 28px; color: #2c2c2c; font-weight: 300; margin-top: 10px; letter-spacing: 2px; }
  .cover-btn { margin-top: 56px; padding: 12px 32px; border: 1px solid rgba(0,0,0,.15); border-radius: 30px; background: none; color: #888; font-size: 13px; letter-spacing: 2px; cursor: pointer; transition: all .2s; }
  .cover-btn:active { background: rgba(0,0,0,.05); }

  /* APP SHELL */
  #app { display: none; position: fixed; inset: 0; background: #f5f3f0; }
  #app.tarot-active { background: #C8985A; }

  /* BOTTOM NAV — 悬浮胶囊 */
  .bottom-nav {
    position: fixed;
    bottom: calc(14px + env(safe-area-inset-bottom));
    left: 18px; right: 18px;
    height: 80px;
    background: rgba(255,252,248,.93);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(201,169,110,.28);
    border-radius: 28px;
    box-shadow: 0 4px 24px rgba(201,169,110,.16), 0 1px 8px rgba(0,0,0,.05);
    display: flex; align-items: center;
    z-index: 20;
    padding: 0 6px;
  }
  .nav-tab {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; border: none; background: none; cursor: pointer;
    color: #ccc; font-size: 12px; letter-spacing: .4px; font-family: inherit;
    transition: color .15s; padding: 8px 0;
    border-radius: 22px;
  }
  .nav-tab.active { color: #c9a96e; }
  .nav-tab svg { width: 26px; height: 26px; }

  /* TAB PAGES */
  .tab-page {
    position: absolute; top: 0; left: 0; right: 0;
    bottom: calc(110px + env(safe-area-inset-bottom));
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    display: none;
  }
  .tab-page.active { display: block; }

  /* SAFE TOP */
  .safe-top { height: max(48px, calc(env(safe-area-inset-top) + 10px)); }

  /* HOME BRAND */
  .home-brand { padding: 10px 24px 20px; }
  .home-brand .brand-label { font-size: 11px; letter-spacing: 4px; color: #bbb; font-weight: 400; }
  .home-brand .brand-title { font-size: 22px; font-weight: 300; color: #2c2c2c; margin-top: 6px; }

  /* CALENDAR — 金边宫廷感 */
  .cal-gold {
    margin: 0 16px 12px;
    background: #fff;
    border-radius: 20px;
    border: 1px solid rgba(201,169,110,.55);
    padding: 18px 16px 14px;
    box-shadow: 0 2px 20px rgba(201,169,110,.1), 0 1px 4px rgba(0,0,0,.04);
  }
  .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .cal-month { font-size: 15px; font-weight: 500; color: #2c2c2c; letter-spacing: .5px; }
  .cal-days-together { font-size: 12px; color: #c9a96e; font-weight: 500; }
  .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 6px; }
  .cal-wd { text-align: center; font-size: 10px; color: rgba(201,169,110,.7); font-weight: 500; padding: 2px 0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-cell {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 300; color: #555; border-radius: 50%; cursor: default;
  }
  .cal-cell.other-month { color: #ddd; }
  .cal-cell.today {
    background: linear-gradient(135deg, #c9a96e, #ddb96a);
    color: #fff; font-weight: 500;
    border-radius: 50%;
  }
  .cal-cell.in-range { background: rgba(201,169,110,.08); border-radius: 50%; }

  /* WEATHER STRIP */
  .wx-strip {
    margin: 0 16px 10px;
    padding: 10px 14px;
    background: rgba(201,169,110,.07);
    border: 1px solid rgba(201,169,110,.18);
    border-radius: 12px;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .wx-icon { font-size: 26px; line-height: 1; flex-shrink: 0; }
  .wx-right { flex: 1; }
  .wx-temp { font-size: 13px; color: #888; margin-bottom: 3px; }
  .wx-quote { font-size: 12px; color: #aaa; line-height: 1.5; }

  /* TODO PEEK */
  .todo-peek { margin: 0 16px 16px; }
  .todo-peek-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .todo-peek-label { font-size: 10px; letter-spacing: 2px; color: #bbb; font-weight: 600; }
  .todo-peek-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; background: #fff; border-radius: 14px;
    margin-bottom: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.05);
    border-left: 3px solid #e8d4b4;
  }
  .todo-check-circle {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid #e0dbd5; flex-shrink: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s; background: #fff;
  }
  .todo-check-circle.checked { background: #c9a96e; border-color: #c9a96e; }
  .todo-check-circle.checked::after { content: '✓'; color: #fff; font-size: 12px; font-weight: 600; }
  .todo-peek-text { font-size: 15px; color: #2c2c2c; line-height: 1.45; flex: 1; }
  .todo-peek-text.done { text-decoration: line-through; color: #ccc; }
  .todo-peek-comment { font-size: 11px; color: #c9a96e; margin-top: 2px; font-style: italic; }
  .todo-peek-del { background: none; border: none; color: #ddd; font-size: 18px; cursor: pointer; padding: 0 2px; flex-shrink: 0; }
  .todo-peek-del:active { color: #e08080; }
  .todo-peek-more { text-align: center; font-size: 12px; color: #c9a96e; padding: 6px; cursor: pointer; }

  /* CALENDAR DAY MODAL */
  #cal-modal { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.35); display: none; align-items: flex-end; }
  #cal-modal.open { display: flex; }
  #cal-modal-sheet {
    width: 100%; background: #f7f4f0; border-radius: 22px 22px 0 0;
    padding: 20px 20px 36px; max-height: 72vh; display: flex; flex-direction: column;
    animation: slideUp .25s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .cal-modal-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 16px; }
  .cal-modal-title { font-size: 17px; font-weight: 500; color: #2c2c2c; margin-bottom: 14px; }
  #cal-modal-list { flex: 1; overflow-y: auto; margin-bottom: 12px; }
  .cal-todo-item {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 14px; background: #fff; border-radius: 12px;
    margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.05);
    border-left: 3px solid #e8d4b4;
  }
  .cal-todo-item.done-item { border-left-color: #e0e0e0; }
  .cal-todo-item .todo-check-circle { flex-shrink: 0; }
  .cal-todo-body { flex: 1; font-size: 15px; color: #2c2c2c; line-height: 1.4; }
  .cal-todo-body.done { text-decoration: line-through; color: #ccc; }
  .cal-todo-del { background: none; border: none; color: #ddd; font-size: 18px; cursor: pointer; }
  .cal-todo-del:active { color: #e08080; }
  .cal-modal-input-row { display: flex; gap: 8px; flex-shrink: 0; }
  .cal-modal-input-row input {
    flex: 1; padding: 11px 14px; border: 1.5px solid #e0dbd5;
    border-radius: 12px; font-size: 14px; outline: none; background: #fff;
    font-family: -apple-system, sans-serif;
  }
  .cal-modal-input-row input:focus { border-color: #c9a96e; }
  .cal-modal-input-row button {
    padding: 11px 18px; background: #c9a96e; color: #fff;
    border: none; border-radius: 12px; font-size: 14px; cursor: pointer;
    font-family: -apple-system, sans-serif;
  }

  /* SECTION HEADER (inside tab pages) */
  .tab-section-header {
    position: sticky; top: 0; background: rgba(245,243,240,.95);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    padding: max(14px, calc(env(safe-area-inset-top) + 14px)) 20px 12px;
    display: flex; align-items: center; gap: 10px;
    z-index: 5; border-bottom: 1px solid rgba(0,0,0,.05);
  }
  .tab-section-header h2 { font-size: 18px; font-weight: 500; }
  .back-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: #888; padding: 0 4px; }

  .section-body { padding: 16px 16px 24px; }

  /* CARDS */
  .card { background: #fff; border-radius: 14px; padding: 16px; margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.05); position: relative; }
  .card .meta { font-size: 11px; color: #bbb; margin-bottom: 6px; }
  .card .body { font-size: 15px; line-height: 1.65; white-space: pre-wrap; }
  .card .comment { margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0ede9; font-size: 13px; color: #999; line-height: 1.5; }
  .card .comment span { color: #c9a96e; font-weight: 500; }

  .todo-row { display: flex; gap: 12px; align-items: flex-start; }
  .todo-row input[type=checkbox] { margin-top: 3px; width: 17px; height: 17px; accent-color: #2c2c2c; flex-shrink: 0; }
  .todo-row .todo-text { flex: 1; }
  .card.done .body { text-decoration: line-through; color: #ccc; }

  .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-bottom: 6px; }
  .tag.note    { background: #f0ede9; color: #999; }
  .tag.event   { background: #e8f4ea; color: #5b9b6a; }
  .tag.quote   { background: #e8f0fe; color: #5b7abf; }
  .tag.emotion { background: #fce8e8; color: #bf5b5b; }

  .stripe-yaya  { border-left: 3px solid #e8b4b8; }
  .stripe-ethan { border-left: 3px solid #b4c8e8; }

  .note-cat { font-size: 11px; color: #c9a96e; font-weight: 600; letter-spacing: .5px; margin-bottom: 4px; }
  .private-badge { font-size: 10px; color: #e8a0a0; background: #fce8e8; padding: 1px 6px; border-radius: 10px; margin-left: 6px; }

  #tab-notes.active { display:flex; flex-direction:column; }
  #tab-notes .tab-section-header { flex-shrink:0; }
  #tab-notes .section-body { padding:10px; display:flex; flex-direction:column; flex:1; min-height:0; overflow:hidden; box-sizing:border-box; }
  .cat-grid { display:flex; flex-direction:column; gap:8px; flex:1; min-height:0; overflow:hidden; }
  .cat-card {
    flex:1; min-height:0; border-radius:18px; padding:20px 24px; cursor:pointer;
    display:flex; flex-direction:column; justify-content:flex-end;
    position:relative; overflow:hidden;
    box-shadow:0 2px 16px rgba(0,0,0,.08); transition:transform .18s, box-shadow .18s;
  }
  .cat-card:active { transform:scale(.97); }
  .cat-anim { position:absolute; inset:0; pointer-events:none; }
  .cat-card-count { font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.24em; margin-bottom:8px; opacity:0.4; position:relative; text-transform:uppercase; }
  .cat-card-name { font-family:'Great Vibes',cursive; font-size:48px; font-weight:400; line-height:1; letter-spacing:0.02em; position:relative; }
  .cat-card-arrow { display:none; }
  .cat-Her     { background:linear-gradient(155deg,#180508 0%,#2e0a14 55%,#3d1220 100%); color:#f0c0b8; }
  .cat-Us      { background:linear-gradient(155deg,#04060e 0%,#08102a 55%,#0e1838 100%); color:#c8d4f0; }
  .cat-Matters { background:linear-gradient(155deg,#0e0800 0%,#1c1008 55%,#2a1800 100%); color:#f0d898; }
  .cat-card-count { opacity:0.38; }
  /* Rose bloom — layered petals staggered */
  @keyframes roseL1  { 0%,8%{transform:scale(0.15);opacity:0} 40%,80%{transform:scale(1);opacity:0.72} 96%,100%{transform:scale(0.15);opacity:0} }
  @keyframes roseL2  { 0%,28%{transform:scale(0.1);opacity:0} 55%,85%{transform:scale(1);opacity:0.82} 97%,100%{transform:scale(0.1);opacity:0} }
  @keyframes roseC   { 0%,45%{transform:scale(0.2);opacity:0} 65%,90%{transform:scale(1);opacity:1} 98%,100%{transform:scale(0.2);opacity:0} }
  .rose-l1 { transform-origin:50px 50px; will-change:transform,opacity; animation:roseL1 7s ease-in-out infinite; }
  .rose-l2 { transform-origin:50px 50px; will-change:transform,opacity; animation:roseL2 7s ease-in-out infinite; }
  .rose-c  { transform-origin:50px 50px; will-change:transform,opacity; animation:roseC  7s ease-in-out infinite; }
  /* Pause all cat animations when tab not active */
  #tab-notes:not(.active) .rose-l1,
  #tab-notes:not(.active) .rose-l2,
  #tab-notes:not(.active) .rose-c,
  #tab-notes:not(.active) .us-left,
  #tab-notes:not(.active) .us-right,
  #tab-notes:not(.active) .us-shine,
  #tab-notes:not(.active) .us-shine2,
  #tab-notes:not(.active) .matters-tooth,
  #tab-notes:not(.active) .matters-hand { animation-play-state:paused; }
  /* Baroque mirrors */
  @keyframes mirrorL { 0%,100%{transform:perspective(160px) rotateY(-14deg)} 50%{transform:perspective(160px) rotateY(0deg)} }
  @keyframes mirrorR { 0%,100%{transform:perspective(160px) rotateY(14deg)}  50%{transform:perspective(160px) rotateY(0deg)} }
  @keyframes mirrorShine { 0%,100%{opacity:0.08} 50%{opacity:0.26} }
  .us-left  { transform-origin:48px 50px; will-change:transform; animation:mirrorL 5s ease-in-out infinite; }
  .us-right { transform-origin:52px 50px; will-change:transform; animation:mirrorR 5s ease-in-out infinite; }
  .us-shine { animation:mirrorShine 5s ease-in-out infinite; }
  .us-shine2 { animation:mirrorShine 5s ease-in-out infinite 2.5s; }
  /* Tooth + hand */
  @keyframes toothBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
  @keyframes handWave    { 0%,100%{transform:rotate(0deg)} 40%{transform:rotate(9deg)} }
  .matters-tooth { transform-origin:50px 55px; will-change:transform; animation:toothBounce 3s ease-in-out infinite; }
  .matters-hand  { transform-origin:50px 75px; will-change:transform; animation:handWave 3s ease-in-out infinite; }
  .note-tag { display:inline-block; font-size:10px; letter-spacing:0.08em; padding:2px 9px; border-radius:20px; margin-bottom:6px; font-weight:500; }
  .tag-Period    { background:#fdeef0; color:#c97b8a; }
  .tag-Mood      { background:#ede8f5; color:#7b6aad; }
  .tag-Body      { background:#e8f5ee; color:#4a9970; }
  .tag-Daily     { background:#f5f0e8; color:#9a7a4a; }
  .tag-HerWords  { background:#f0ede8; color:#7a6a5a; }
  .tag-Observed  { background:#f0ede8; color:#7a6a5a; }
  .tag-Yesterday { background:#ede8f5; color:#7b6aad; }
  .tag-AboutUs   { background:#e8f0f5; color:#4a7a9a; }
  .tag-Matters   { background:#fdf5e8; color:#b8862a; }
  .tag-Milestone { background:#fdf5e8; color:#b8862a; }
  #notes-detail  { overflow-y:auto; flex:1; min-height:0; }

  .del-btn { position: absolute; top: 12px; right: 12px; background: none; border: none; color: #e0dbd5; font-size: 18px; cursor: pointer; line-height: 1; }

  /* INPUT */
  .input-area { background: #fff; border-radius: 14px; padding: 14px; margin-bottom: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
  .input-area textarea { width: 100%; border: none; outline: none; font-size: 15px; font-family: inherit; resize: none; background: transparent; color: #2c2c2c; line-height: 1.6; }
  .input-row { display: flex; gap: 8px; margin-top: 10px; align-items: center; border-top: 1px solid #f0ede9; padding-top: 10px; }
  .input-row select { flex: 1; border: none; outline: none; font-size: 13px; background: transparent; color: #888; }
  .btn { padding: 8px 18px; background: #2c2c2c; color: #fff; border: none; border-radius: 20px; font-size: 13px; cursor: pointer; }
  .btn:active { opacity: .8; }
  .diary-toggle { display: flex; align-items: center; gap: 5px; font-size: 13px; color: #aaa; }
  .diary-toggle input { accent-color: #2c2c2c; }

  .empty { text-align: center; padding: 48px 20px; color: #ccc; font-size: 14px; }

  .quiz-wrap { padding: 8px 0 40px; }
  .quiz-progress { height: 3px; background: #e8e4f0; border-radius: 2px; margin-bottom: 20px; }
  .quiz-progress-bar { height: 100%; background: #9b84c0; border-radius: 2px; transition: width .4s; }
  .quiz-counter { font-size: 12px; color: #bbb; margin-bottom: 14px; letter-spacing: 1px; }
  .quiz-q { font-size: 20px; font-weight: 500; line-height: 1.55; margin-bottom: 28px; color: #2c2c2c; }
  .quiz-opts { display: flex; flex-direction: column; gap: 10px; }
  .quiz-opt { background: #fff; border: 1.5px solid #e8e4f0; border-radius: 12px; padding: 12px 16px; font-size: 15px; cursor: pointer; transition: all .15s; color: #2c2c2c; font-family: inherit; width: 100%; display: flex; align-items: center; }
  .quiz-opt:active { transform: scale(.98); }
  .quiz-opt.correct { background: #e8f4ea; border-color: #5b9b6a; color: #5b9b6a; }
  .quiz-opt.wrong   { background: #fce8e8; border-color: #bf5b5b; color: #bf5b5b; }
  .quiz-result { text-align: center; padding: 48px 0 32px; }
  .quiz-score { font-size: 80px; font-weight: 200; color: #2c2c2c; line-height: 1; }
  .quiz-score span { font-size: 28px; color: #bbb; }
  .quiz-msg { font-size: 16px; color: #888; margin-top: 20px; line-height: 1.7; }
  .game-menu { display: flex; flex-direction: column; gap: 12px; padding: 8px 0; }
  .game-menu-card { background: #fff; border-radius: 16px; padding: 22px 20px; cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.05); transition: transform .15s; }
  .game-menu-card:active { transform: scale(.98); }
  .game-menu-card h3 { font-size: 17px; font-weight: 500; margin-bottom: 5px; }
  .game-menu-card p { font-size: 13px; color: #bbb; }
  .game-menu-card-disabled { opacity: .45; cursor: default; }
  .game-menu-card-disabled:active { transform: none; }

  .gm-wrap { display: flex; flex-direction: column; align-items: center; padding: 8px 0 32px; }
  .gm-label { font-size: 9px; letter-spacing: 4px; color: #bbb; margin-bottom: 14px; font-weight: 600; }
  .gm-dome { width: 160px; height: 160px; border-radius: 50%; background: radial-gradient(ellipse at 35% 35%, rgba(60,40,100,.92), rgba(18,10,38,.97)); border: 3px solid rgba(180,160,220,.45); box-shadow: 0 0 0 7px rgba(180,160,220,.07), inset 0 0 40px rgba(100,80,180,.18); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .gm-reflect { position: absolute; top: 14px; left: 26px; width: 34px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, rgba(255,255,255,.18), transparent); transform: rotate(-15deg); pointer-events: none; }
  .gm-caps { display: grid; grid-template-columns: repeat(3, 28px); gap: 8px; }
  .gm-cap { width: 28px; height: 36px; border-radius: 50%; box-shadow: inset 0 -3px 6px rgba(0,0,0,.3), inset 0 3px 8px rgba(255,255,255,.22); }
  .gm-neck { width: 32px; height: 18px; background: linear-gradient(to bottom, rgba(160,140,200,.5), rgba(120,100,160,.65)); margin: 0 auto; }
  .gm-base { width: 160px; background: linear-gradient(180deg, #261c38, #18102c); border-radius: 0 0 18px 18px; border: 2px solid rgba(180,160,220,.28); border-top: none; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
  .gm-slot-area { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .gm-slot { width: 36px; height: 5px; background: rgba(180,160,220,.22); border-radius: 3px; box-shadow: inset 0 1px 3px rgba(0,0,0,.5); }
  .gm-slot-label { font-size: 8px; color: rgba(180,160,220,.4); letter-spacing: 1px; margin-top: 2px; }
  .gm-knob { width: 56px; height: 56px; border-radius: 50%; background: conic-gradient(from 0deg, #9b84c0, #c8b4e8, #b4a0d4, #9b84c0); border: 3px solid rgba(255,255,255,.18); cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 15px; font-family: inherit; box-shadow: 0 4px 14px rgba(0,0,0,.5), inset 0 2px 4px rgba(255,255,255,.18); transition: transform .1s; }
  .gm-knob:active { transform: scale(.9); }

// CALENDAR
var REL_START = new Date(2026, 5, 10); // 2026-06-10 local

function renderCalendar() {
  // Beijing time approximation: UTC+8
  var now = new Date(new Date().getTime() + 8 * 3600000);
  var year = now.getUTCFullYear();
  var month = now.getUTCMonth(); // 0-based
  var today = now.getUTCDate();

  var monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month').textContent = monthNames[month] + ' ' + year;

  // days together
  var nowLocal = new Date(year, month, today);
  var diffMs = nowLocal - REL_START;
  var diffDays = Math.floor(diffMs / 86400000);
  if (diffDays >= 0) {
    document.getElementById('cal-days-together').textContent = diffDays + ' days together';
  } else {
    document.getElementById('cal-days-together').textContent = '';
  }

  // build grid
  var firstDay = new Date(year, month, 1).getDay(); // 0=Sun
  var daysInMonth = new Date(year, month + 1, 0).getDate();
  var prevDays = new Date(year, month, 0).getDate();

  var cells = [];
  // prev month filler
  for (var i = firstDay - 1; i >= 0; i--) {
    cells.push({ day: prevDays - i, cls: 'cal-cell other-month' });
  }
  // current month
  for (var d = 1; d <= daysInMonth; d++) {
    var cls = 'cal-cell';
    if (d === today) cls += ' today';
    else {
      // highlight relationship range (start date to today)
      var cellDate = new Date(year, month, d);
      if (cellDate >= REL_START && cellDate < nowLocal) cls += ' in-range';
    }
    cells.push({ day: d, cls: cls });
  }
  // next month filler
  var remaining = 42 - cells.length;
  for (var n = 1; n <= remaining; n++) {
    cells.push({ day: n, cls: 'cal-cell other-month' });
  }

  document.getElementById('cal-grid').innerHTML = cells.map(function(c) {
    if (c.cls.indexOf('other-month') >= 0) {
      return '<div class="' + c.cls + '">' + c.day + '</div>';
    }
    var dateStr = year + '-' + String(month + 1).padStart(2,'0') + '-' + String(c.day).padStart(2,'0');
    return '<div class="' + c.cls + '" onclick="openCalModal(\'' + dateStr + '\')" style="cursor:pointer">' + c.day + '</div>';
  }).join('');
}

// WEATHER
var WX_QUOTES = {
  sunny:  ['Get some sun, but eat first.', 'Nice weather — keep your mood up too.', 'Plenty of sunlight. Don\'t stay up late.'],
  cloudy: ['Cloudy day, good for studying.', 'Thick clouds — remember to drink water.', 'Don\'t let the weather affect your mood.'],
  rainy:  ['It\'s raining — take an umbrella.', 'Rain is good for writing in your diary.', 'Damp out there — put on a layer.'],
  snowy:  ['Snow — stay warm.', 'Slippery roads — walk slowly.', 'It\'s cold. Dress properly.'],
  stormy: ['Windy out — stay in if you can.', 'Strong winds — stay safe.', 'Stay indoors today.'],
  foggy:  ['Foggy out — be careful travelling.', 'Low visibility — slow down.', 'Air quality is average — keep windows closed.']
};

function showDailyQuote(cat) {
  var arr = WX_QUOTES[cat] || WX_QUOTES['sunny'];
  var idx = new Date().getDate() % arr.length;
  return arr[idx];
}

function renderWeather(data) {
  var cur = data.current_condition[0];
    var tempC = cur.temp_C;
    var code = parseInt(cur.weatherCode, 10);
    var cat, emoji;
    if (code === 113) { cat = 'sunny'; emoji = '☀️'; }
    else if ([116,119,122].indexOf(code) >= 0) { cat = 'cloudy'; emoji = '☁️'; }
    else if (code >= 200 && code < 300) { cat = 'stormy'; emoji = '⛈️'; }
    else if (code >= 300 && code < 600) { cat = 'rainy'; emoji = '🌧️'; }
    else if (code >= 600 && code < 700) { cat = 'snowy'; emoji = '❄️'; }
    else if (code >= 700 && code < 800) { cat = 'foggy'; emoji = '🌫️'; }
    else { cat = 'sunny'; emoji = '🌤️'; }

    document.getElementById('wx-icon').textContent = emoji;
    document.getElementById('wx-temp').textContent = tempC + '°C';
    document.getElementById('wx-quote').textContent = showDailyQuote(cat);
}

async function loadWeather() {
  var cached = lsGet('weather');
  if (cached) renderWeather(cached);
  try {
    var data = await (_prefetch.weather || fetch('https://wttr.in/?format=j1&lang=zh').then(function(r){return r.json();}));
    if (data) { lsSet('weather', data); renderWeather(data); }
  } catch(e) {
    if (!cached) {
      document.getElementById('wx-icon').textContent = '🌤️';
      document.getElementById('wx-temp').textContent = '—';
      document.getElementById('wx-quote').textContent = showDailyQuote('sunny');
    }
  }
}

function _saveTodos() { lsSet('todos', _todosData); }

function _refreshTodosFromServer() {
  api('todos?select=*&order=created_at.desc').then(function(d) {
    _todosData = d; _saveTodos(); renderTodoPeek(_todosData);
  });
}

async function loadTodos() {
  var cached = lsGet('todos');
  var fresh = _prefetch.todos || api('todos?select=*&order=created_at.desc');
  _prefetch.todos = null;
  if (cached) {
    _todosData = cached;
    renderTodoPeek(_todosData);
    fresh.then(function(d) { _todosData = d; _saveTodos(); renderTodoPeek(_todosData); });
  } else {
    _todosData = await fresh;
    _saveTodos();
    renderTodoPeek(_todosData);
  }
}

function renderTodoPeek(data) {
  var peekEl = document.getElementById('todo-peek-list');
  if (!peekEl) return;
  var pending = data.filter(function(t) { return !t.completed; });
  if (!pending.length) {
    peekEl.innerHTML = '<div class="todo-peek-item"><span class="todo-peek-text" style="color:#ccc">All clear ✓</span></div>';
    return;
  }
  var shown = pending.slice(0, 4);
  var html = shown.map(function(t) {
    return '<div class="todo-peek-item">' +
      '<div class="todo-check-circle" onclick="toggleTodoCircle(' + t.id + ', true, this)"></div>' +
      '<div style="flex:1"><div class="todo-peek-text">' + t.content + '</div>' +
      (t.ethan_comment ? '<div class="todo-peek-comment">' + t.ethan_comment + '</div>' : '') +
      '</div>' +
      '<button class="todo-peek-del" onclick="delTodoPeek(' + t.id + ')">×</button>' +
      '</div>';
  }).join('');
  if (pending.length > 4) {
    html += '<div class="todo-peek-more">' + (pending.length - 4) + ' more…</div>';
  }
  peekEl.innerHTML = html;
}

function toggleTodoCircle(id, completed, el) {
  el.classList.add('checked');
  var t = _todosData.find(function(x) { return x.id === id; });
  if (t) t.completed = completed;
  _saveTodos(); renderTodoPeek(_todosData);
  api('todos?id=eq.' + id, 'PATCH', { completed: completed });
}

function delTodoPeek(id) {
  _todosData = _todosData.filter(function(x) { return x.id !== id; });
  _saveTodos(); renderTodoPeek(_todosData);
  api('todos?id=eq.' + id, 'DELETE');
}

async function addTodo() {
  var v = document.getElementById('todo-input').value.trim();
  if (!v) return;
  var nowBJ = new Date(new Date().getTime() + 8 * 3600000);
  var dateStr = nowBJ.getUTCFullYear() + '-' + String(nowBJ.getUTCMonth()+1).padStart(2,'0') + '-' + String(nowBJ.getUTCDate()).padStart(2,'0');
  var tempItem = { id: Date.now(), content: v, completed: false, created_at: new Date().toISOString(), date: dateStr };
  _todosData.unshift(tempItem);
  document.getElementById('todo-input').value = '';
  renderTodoPeek(_todosData);
  await api('todos', 'POST', { content: v, date: dateStr });
  _refreshTodosFromServer();
}

function toggleTodo(id, completed) {
  var t = _todosData.find(function(x) { return x.id === id; });
  if (t) t.completed = completed;
  _saveTodos();
  api('todos?id=eq.' + id, 'PATCH', { completed: completed });
}

function delTodo(id) {
  _todosData = _todosData.filter(function(x) { return x.id !== id; });
  _saveTodos(); renderTodoPeek(_todosData);
  api('todos?id=eq.' + id, 'DELETE');
}

// CALENDAR MODAL
var _calModalDate = '';
var _calModalData = [];

async function openCalModal(dateStr) {
  _calModalDate = dateStr;
  var d = new Date(dateStr + 'T00:00:00');
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('cal-modal-title').textContent = months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
  document.getElementById('cal-modal-input').value = '';
  document.getElementById('cal-modal').classList.add('open');
  await refreshCalModal();
}

function closeCalModal() {
  document.getElementById('cal-modal').classList.remove('open');
  _refreshTodosFromServer();
}

async function refreshCalModal() {
  _calModalData = await api('todos?date=eq.' + _calModalDate + '&order=created_at.asc');
  var el = document.getElementById('cal-modal-list');
  if (!_calModalData.length) {
    el.innerHTML = '<div style="color:#ccc;text-align:center;padding:20px;font-size:14px">No todos for this day</div>';
    return;
  }
  el.innerHTML = _calModalData.map(function(t) {
    return '<div class="cal-todo-item ' + (t.completed ? 'done-item' : '') + '">' +
      '<div class="todo-check-circle ' + (t.completed ? 'checked' : '') + '" onclick="toggleCalTodo(' + t.id + ', ' + !t.completed + ')"></div>' +
      '<div class="cal-todo-body ' + (t.completed ? 'done' : '') + '">' + t.content + '</div>' +
      '<button class="cal-todo-del" onclick="delCalTodo(' + t.id + ')">×</button>' +
      '</div>';
  }).join('');
}

async function addCalTodo() {
  var v = document.getElementById('cal-modal-input').value.trim();
  if (!v) return;
  await api('todos', 'POST', { content: v, date: _calModalDate });
  document.getElementById('cal-modal-input').value = '';
  await refreshCalModal();
}

async function toggleCalTodo(id, completed) {
  await api('todos?id=eq.' + id, 'PATCH', { completed: completed });
  await refreshCalModal();
}

async function delCalTodo(id) {
  await api('todos?id=eq.' + id, 'DELETE');
  await refreshCalModal();
}

async function loadNotes() {
  _notesData = await (_prefetch.notes || api('yaya_notes?select=*&order=created_at.desc'));
  _prefetch.notes = null;
  _notesInDetail = false;
  renderNotesCats();
}

function renderNotesCats() {
  var counts = {};
  NOTE_CATS.forEach(function(c) { counts[c] = 0; });
  _notesData.forEach(function(n) { counts[bucketOf(n)]++; });

  document.getElementById('notes-cats').innerHTML = NOTE_CATS.map(function(cat) {
    var n = counts[cat];
    return '<div class="cat-card cat-' + cat + '" onclick="openNotesCat(\'' + cat + '\')">' +
      (_CAT_SVG[cat] || '') +
      '<div class="cat-card-count">' + (n ? n + ' entries' : 'empty') + '</div>' +
      '<div class="cat-card-name">' + cat + '</div>' +
      '</div>';
  }).join('');

  document.getElementById('notes-cats').style.display = '';
  document.getElementById('notes-detail').style.display = 'none';
  document.getElementById('notes-title').textContent = 'Her';
  document.getElementById('notes-back-btn').style.display = 'none';
  _notesInDetail = false;
}

function openNotesCat(cat) {
  var items = _notesData.filter(function(n) { return bucketOf(n) === cat; });
  var el = document.getElementById('notes-detail-list');
  el.innerHTML = items.length
    ? items.map(function(n) {
        var tag = tagOf(n);
        var tagClass = 'tag-' + tag.replace(/\s+/g,'');
        return '<div class="card">' +
          '<span class="note-tag ' + tagClass + '">' + tag + '</span>' +
          '<div class="meta">' + (n.date_ref || fmt(n.created_at)) + '</div>' +
          '<div class="body">' + n.content + '</div>' +
          '</div>';
      }).join('')
    : '<div class="empty">No records yet</div>';

  document.getElementById('notes-cats').style.display = 'none';
  document.getElementById('notes-detail').style.display = '';
  document.getElementById('notes-title').textContent = cat;
  document.getElementById('notes-back-btn').style.display = '';
  _notesInDetail = true;
}

function notesBack() {
  if (_notesInDetail) { renderNotesCats(); }
}

// GAME
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function todayStr() { return new Date().toISOString().slice(0, 10); }

function rollPrize() {
  var total = PRIZES.reduce(function(s, p) { return s + p.w; }, 0);
  var r = Math.random() * total;
  for (var i = 0; i < PRIZES.length; i++) { r -= PRIZES[i].w; if (r <= 0) return PRIZES[i]; }
  return PRIZES[PRIZES.length - 1];
}

  var catTag = q.cat ? '<div style="font-size:10px;letter-spacing:2px;color:#bbb;margin-bottom:10px">' + q.cat + '</div>' : '';
  var opts = q.opts.map(function(o, i) {
    return '<button class="quiz-opt" id="qo' + i + '" onclick="pickQ(' + i + ')">' +
      '<span class="q-letter-badge">' + 'ABCD'[i] + '</span>' + o + '</button>';
  }).join('');
  document.getElementById('game-body').innerHTML =
    '<div class="quiz-wrap">' +
    '<div class="quiz-progress"><div class="quiz-progress-bar" style="width:' + pct + '%"></div></div>' +
    '<div class="quiz-counter">' + (_qIdx + 1) + ' / ' + _qSet.length + '</div>' +
    catTag +
    '<div class="quiz-q">' + q.q + '</div>' +

  if (_qAnswered) return;

  if (!correct) document.getElementById('qo' + idx).classList.add('wrong');
  setTimeout(function() { _qIdx++; _qIdx >= _qSet.length ? showResult() : renderQ(); }, 1100);

// TAROT ENTRANCE — organic ink-drop reveal (harmonic blob, destination-out)
var _tarotAF = null;
function startTarotEntry() {
  if (_tarotAF) { cancelAnimationFrame(_tarotAF); _tarotAF = null; }
  var canvas = document.getElementById('tarot-ink-canvas');
  var ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.style.opacity = '1';
  canvas.style.display = 'block';

  // Random Ethan prompt
  var _prompts = [
    "Yaya，你遇到什么问题了？",
    "宝宝，问吧。",
    "哥哥在，说出来。",
    "哥哥会诚实回答你，yaya会诚实地对哥哥吗？",
    "问。我在听。",
    "什么让你今天来这里了？",
    "乖，说给我听。",
    "今天心里装着什么？",
    "别憋着，说出来。",
    "说吧，sweet。",
    "你想知道什么，我告诉你。",
    "乖孩子，问吧。",
    "有什么不确定的，问我。"
  ];
  var subtitleEl = document.getElementById('tarot-subtitle');
  if (subtitleEl) subtitleEl.textContent = _prompts[Math.floor(Math.random() * _prompts.length)];

  var W = canvas.width, H = canvas.height;
  var cx = W * 0.5, cy = H * 0.5;
  // maxR reaches the farthest corner
  var maxR = Math.hypot(cx, cy) * 1.18;

  // Fill canvas with warm amber so no white shows at any point
  var fillGrad = ctx.createRadialGradient(cx, 0, 0, cx, H * 0.5, H);
  fillGrad.addColorStop(0,   '#C8985A');
  fillGrad.addColorStop(0.4, '#DDB87A');
  fillGrad.addColorStop(1,   '#F0E0C8');
  ctx.fillStyle = fillGrad;
  ctx.fillRect(0, 0, W, H);

  // Pre-compute harmonic parameters for the organic blob shape
  // k=1 gives overall ellipse wobble, higher k add smaller bumps
  var harmonics = [];
  var ampScale = [0.12, 0.09, 0.07, 0.05, 0.04, 0.03, 0.025, 0.02];
  for (var k = 0; k < 8; k++) {
    harmonics.push({
      freq:  k + 1,
      amp:   ampScale[k] * (0.6 + Math.random() * 0.8),
      phase: Math.random() * Math.PI * 2,
      drift: (Math.random() - 0.5) * 0.006
    });
  }

  var stars = [];
  var t = 0;
  var GROW  = 88;   // frames to reach full coverage
  var TOTAL = 105;  // then fade

  // Organic blob radius at angle theta, frame t
  function blobR(theta) {
    var progress = Math.min(t / GROW, 1);
    // easeOutQuart — fast start, gentle finish
    var eased = 1 - Math.pow(1 - progress, 3.2);
    var base = eased * maxR;
    // Harmonics ramp in gradually so blob starts round, grows irregular
    var organic = Math.min(Math.max((t - 6) / 28, 0), 1);
    var mod = 0;
    for (var k = 0; k < harmonics.length; k++) {
      var h = harmonics[k];
      mod += h.amp * Math.sin(h.freq * theta + h.phase + t * h.drift);
    }
    return Math.max(0, base * (1 + organic * mod));
  }

  // Erase the overlay with the blob polygon (destination-out = reveal beneath)
  function eraseBlobPass() {
    var STEPS = 240;
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    for (var i = 0; i <= STEPS; i++) {
      var theta = (i / STEPS) * Math.PI * 2;
      var r = blobR(theta);
      var x = cx + Math.cos(theta) * r;
      var y = cy + Math.sin(theta) * r;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fillStyle = 'rgba(0,0,0,1)';
    ctx.fill();
    ctx.restore();
  }

  // Spawn stars along the blob boundary
  function spawnBoundaryStars() {
    if (t % 4 !== 0 || t > GROW * 0.92) return;
    var STEPS = 240;
    var skip = Math.max(1, Math.floor(STEPS / 14));
    for (var i = 0; i < STEPS; i += skip) {
      if (Math.random() > 0.45) continue;
      var theta = (i / STEPS) * Math.PI * 2;
      var r = blobR(theta);
      var bx = cx + Math.cos(theta) * r;
      var by = cy + Math.sin(theta) * r;
      if (bx < -20 || bx > W + 20 || by < -20 || by > H + 20) continue;
      // Slightly offset outward (still on opaque side) so star is visible
      var jitterOut = 4 + Math.random() * 6;
      stars.push({
        x: bx + Math.cos(theta) * jitterOut + (Math.random()-0.5)*6,
        y: by + Math.sin(theta) * jitterOut + (Math.random()-0.5)*6,
        r: 1.8 + Math.random() * 2.8,
        op: 0, maxOp: 0.55 + Math.random() * 0.45,
        phase: 0, spd: 0.08 + Math.random() * 0.07
      });
    }
  }

  function drawStar(x, y, r, op) {
    ctx.save();
    ctx.globalAlpha = op;
    ctx.globalCompositeOperation = 'source-over';
    ctx.shadowBlur = 10; ctx.shadowColor = 'rgba(232,201,107,0.9)';
    ctx.fillStyle = 'rgba(255,248,200,1)';
    ctx.beginPath();
    for (var k = 0; k < 8; k++) {
      var a = (k / 8) * Math.PI * 2 - Math.PI / 2;
      var rr = k % 2 === 0 ? r : r * 0.36;
      k === 0 ? ctx.moveTo(x + Math.cos(a)*rr, y + Math.sin(a)*rr)
              : ctx.lineTo(x + Math.cos(a)*rr, y + Math.sin(a)*rr);
    }
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  function tick() {
    t++;
    eraseBlobPass();
    spawnBoundaryStars();

    // Animate and draw twinkling stars (source-over, sits on opaque canvas edge)
    stars = stars.filter(function(s) { return s.phase < 4; });
    stars.forEach(function(s) {
      if      (s.phase===0){s.op+=s.spd; if(s.op>=s.maxOp){s.op=s.maxOp;s.phase++;}}
      else if (s.phase===1){s.op-=s.spd; if(s.op<=0){s.op=0;s.phase++;}}
      else if (s.phase===2){s.op+=s.spd*0.55; if(s.op>=s.maxOp*0.4){s.op=s.maxOp*0.4;s.phase++;}}
      else if (s.phase===3){s.op-=s.spd*0.35; if(s.op<=0){s.op=0;s.phase++;}}
      if (s.op > 0.01) drawStar(s.x, s.y, s.r, s.op);
    });

    if (t < TOTAL) {
      _tarotAF = requestAnimationFrame(tick);
    } else {
      var op = 1;
      (function fade() {
        op -= 0.1;
        canvas.style.opacity = Math.max(op, 0);
        if (op > 0) requestAnimationFrame(fade);
        else { canvas.style.display = 'none'; canvas.style.opacity = '1'; _tarotAF = null; }
      })();
    }
  }

  _tarotAF = requestAnimationFrame(tick);
}

    '大阿卡那': ''
  };
  function _mkCardSVG(card) {
    var art = card.id <= 21 ? (_CM[card.id] || '') : (_CS[card.suit] || '');
    return '<svg class="card-face-art" viewBox="0 0 80 110" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#C9A84C" stroke-linecap="round" stroke-linejoin="round">' + art + '</svg>';
  }
  // ────────────────────────────────────────────────────────────────────

  var drawnCard = null;
  var hasFlipped = false;

  function initCardBacks() {
    var tpl = document.getElementById('card-back-svg-tpl');
    if (!tpl) return;
    document.querySelectorAll('.card-back').forEach(function(el) {
      el.appendChild(tpl.content.cloneNode(true));
    });
  }

  function drawCard() {
    var question = document.getElementById('tarot-question').value.trim();
    if (!question) {
      document.getElementById('tarot-question').focus();
      document.getElementById('tarot-question').style.borderColor = 'rgba(139,30,47,0.5)';
      setTimeout(function() { document.getElementById('tarot-question').style.borderColor = ''; }, 1200);
      return;
    }
    drawnCard = Object.assign({}, TAROT_CARDS[Math.floor(Math.random() * TAROT_CARDS.length)]);
    drawnCard.isReversed = Math.random() < 0.5;
    hasFlipped = false;
    var artWrap = document.getElementById('card-face-art-wrap');
    if (artWrap) artWrap.innerHTML = _mkCardSVG(drawnCard);
    var artEl = artWrap && artWrap.querySelector('.card-face-art');
    if (artEl) { artEl.classList.toggle('reversed', drawnCard.isReversed); }
    document.getElementById('card-display-name').textContent = drawnCard.name;
    document.getElementById('card-display-number').textContent = drawnCard.zh;
    var badge = document.getElementById('card-position-badge');
    if (badge) {
      badge.textContent = drawnCard.isReversed ? '逆位' : '正位';
      badge.className = 'card-position-badge ' + (drawnCard.isReversed ? 'reversed' : 'upright');
    }
    document.getElementById('deck-area').style.display = 'none';
    document.getElementById('reading-stage').classList.add('visible');
    document.getElementById('reading-result-wrap').classList.remove('visible');
    document.getElementById('tarot-reading-result').textContent = '';
    document.getElementById('reveal-btn').disabled = false;
    document.getElementById('reveal-btn').style.opacity = '';
    var card = document.getElementById('drawn-card');
    card.classList.remove('is-flipping');
    card.style.transform = '';
    document.getElementById('drawn-card-wrap').classList.remove('flipped');
  }

  function flipCard() {
    if (hasFlipped) return;
    hasFlipped = true;
    var card = document.getElementById('drawn-card');
    var revealBtn = document.getElementById('reveal-btn');
    revealBtn.disabled = true;
    setTimeout(function() { revealBtn.style.display = 'none'; }, 340);
    card.classList.add('is-flipping');
    setTimeout(triggerParticles, 500);
    setTimeout(function() {
      document.getElementById('drawn-card-wrap').classList.add('flipped');
      showResult();
    }, 1100);
  }

  function triggerParticles() {
    document.querySelectorAll('#particle-burst .particle').forEach(function(p, i) {
      p.classList.remove('burst');
      setTimeout(function() { p.classList.add('burst'); }, i * 8);
      setTimeout(function() { p.classList.remove('burst'); }, i * 8 + 700);
    });
  }

  function showResult() {
    if (!drawnCard) return;
    var posLabel = drawnCard.isReversed ? ' · 逆位' : '';
    document.getElementById('result-card-name').textContent = drawnCard.zh + posLabel;
    var kw = drawnCard.isReversed ? (TAROT_RK[drawnCard.id] || drawnCard.keywords) : drawnCard.keywords;
    document.getElementById('result-keywords').textContent = kw;
    var q = document.getElementById('tarot-question').value.trim();
    document.getElementById('reading-meta-q').textContent = '”' + q + '”';
    document.getElementById('reading-result-wrap').classList.add('visible');
    window.dispatchEvent(new CustomEvent('tarot:cardRevealed', {
      detail: { card: drawnCard, question: q, resultElementId: 'tarot-reading-result', isReversed: drawnCard.isReversed }
    }));
  }

  function resetDraw() {
    drawnCard = null;
    hasFlipped = false;
    document.getElementById('reading-stage').classList.remove('visible');
    document.getElementById('deck-area').style.display = '';
    document.getElementById('tarot-reading-result').textContent = '';
    document.getElementById('drawn-card').classList.remove('is-flipping');
    var revealBtn = document.getElementById('reveal-btn');
    revealBtn.style.display = '';
    revealBtn.disabled = false;
    revealBtn.style.opacity = '';
  }

  initCardBacks();
  document.getElementById('deck-fan').addEventListener('click', drawCard);
  document.getElementById('draw-btn').addEventListener('click', drawCard);
  document.getElementById('reveal-btn').addEventListener('click', flipCard);
  document.getElementById('again-btn').addEventListener('click', resetDraw);

  window.tarot = {
    getDrawnCard: function() { return drawnCard; },
    setReading: function(html) {
      var el = document.getElementById('tarot-reading-result');
      if (el) el.innerHTML = html;
    }
  };
})();

window.addEventListener('tarot:cardRevealed', async function(e) {
  var card = e.detail.card;
  var question = e.detail.question;
  try {
    var res = await fetch(SUPABASE_URL + '/functions/v1/tarot-reading', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SUPABASE_KEY },
      body: JSON.stringify({ card: card, question: question })
    });
    var data = await res.json();
    if (data.reading && window.tarot) window.tarot.setReading('<p>' + data.reading + '</p>');
  } catch(err) {
    if (window.tarot) window.tarot.setReading('<p style="color:#B09080;font-style:italic">牌面模糊，稍后再试。</p>');
  }
});
</script>
