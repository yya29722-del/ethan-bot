<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>yaya & Ethan</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="我们">

<meta name="theme-color" content="#1a1814">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, sans-serif; background: #f5f3f0; color: #2c2c2c; overflow: hidden; height: 100vh; }

  /* COVER */
  #cover { position: fixed; inset: 0; background: #1a1814; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity .6s ease; }
  #cover.fade { opacity: 0; pointer-events: none; }
  .cover-icons { display: flex; gap: 28px; margin-bottom: 40px; align-items: flex-end; }
  .cover-icons svg { opacity: .85; }
  .cover-title { font-size: 15px; letter-spacing: 4px; color: rgba(255,255,255,.5); font-weight: 300; }
  .cover-date { font-size: 28px; color: #fff; font-weight: 300; margin-top: 10px; letter-spacing: 2px; }
  .cover-btn { margin-top: 56px; padding: 12px 32px; border: 1px solid rgba(255,255,255,.2); border-radius: 30px; background: none; color: rgba(255,255,255,.6); font-size: 13px; letter-spacing: 2px; cursor: pointer; transition: all .2s; }
  .cover-btn:active { background: rgba(255,255,255,.1); }

  /* APP */
  #app { position: fixed; inset: 0; display: none; }
  .tab-page { position: absolute; top: 0; left: 0; right: 0; bottom: 60px; overflow-y: auto; -webkit-overflow-scrolling: touch; display: none; background: #f5f3f0; }
  .tab-page.active { display: block; }

  /* TOOTH ACCENTS */
  .tooth-accent { opacity: .13; flex-shrink: 0; }
  .cover-tooth { position: absolute; bottom: 120px; right: 36px; opacity: .07; }
  .feed-tooth { position: absolute; top: 62px; right: 20px; opacity: .12; }

  /* BOTTOM NAV */
  #bottom-nav { position: absolute; bottom: 0; left: 0; right: 0; height: 60px; background: rgba(255,255,255,.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-top: 1px solid rgba(0,0,0,.07); display: flex; z-index: 10; padding-bottom: env(safe-area-inset-bottom,0); }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; background: none; border: none; color: #c8c4be; cursor: pointer; padding: 0; font-family: inherit; }
  .nav-btn.active { color: #2c2c2c; }
  .nav-icon { font-size: 19px; line-height: 1; }
  .nav-label { font-size: 10px; letter-spacing: .3px; }

  /* ── TODOS / HOME TAB ── */
  .safe-top { height: max(52px, env(safe-area-inset-top, 44px) + 8px); }
  .home-header-zone { background: #1a1814; padding-bottom: 6px; }
  .home-header { padding: 6px 20px 20px; }
  .home-header-sub { font-size: 10px; letter-spacing: 3.5px; color: rgba(255,255,255,.32); font-weight: 600; margin-bottom: 5px; }
  .home-header-title { font-size: 22px; font-weight: 600; letter-spacing: -.4px; color: #fff; }
  .wx-quote { flex: 1; font-size: 12px; color: #aaa; line-height: 1.55; text-align: right; padding-left: 14px; }
  .cal-widget { margin: 0 16px 14px; background: #fff; border-radius: 22px; padding: 20px 18px 16px; box-shadow: 0 2px 10px rgba(0,0,0,.06); }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .cal-month-text { font-size: 16px; font-weight: 600; }
  .cal-rel-days { font-size: 12px; color: #c9a96e; font-weight: 500; }
  .cal-wdays { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 6px; }
  .cal-wday { text-align: center; font-size: 10px; color: #ccc; font-weight: 600; padding: 2px 0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
  .cal-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #888; border-radius: 50%; }
  .cal-cell.today { background: #2c2c2c; color: #fff; font-weight: 600; }
  .cal-cell.faded { color: #ddd; }

  .weather-bar { margin: 0 16px 14px; display: flex; align-items: flex-start; gap: 10px; padding: 12px 16px; background: #fff; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
  .weather-emoji { font-size: 24px; flex-shrink: 0; }
  .weather-city { font-size: 11px; color: #bbb; }
  .weather-temp { font-size: 14px; font-weight: 500; margin-top: 1px; }

  .home-sec-label { font-size: 10px; letter-spacing: 2.5px; color: #bbb; padding: 4px 20px 10px; font-weight: 600; }
  .home-add-row { display: flex; gap: 8px; padding: 0 16px 10px; }
  .home-add-input { flex: 1; padding: 10px 14px; background: #fff; border: none; border-radius: 22px; font-size: 14px; font-family: inherit; outline: none; box-shadow: 0 1px 4px rgba(0,0,0,.06); color: #2c2c2c; }

  /* ── FEED / TIMELINE TAB ── */
  .feed-header { padding: 60px 20px 0; display: flex; align-items: flex-end; justify-content: space-between; }
  .feed-title { font-size: 26px; font-weight: 700; letter-spacing: -.5px; }
  .feed-add-btn { width: 34px; height: 34px; border-radius: 50%; background: #2c2c2c; color: #fff; font-size: 22px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; flex-shrink: 0; }
  .tl-filters { display: flex; padding: 12px 14px 0; border-bottom: 1px solid rgba(0,0,0,.06); gap: 0; }
  .tl-filter { padding: 8px 12px; font-size: 13px; color: #bbb; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; margin-bottom: -1px; font-family: inherit; }
  .tl-filter.active { color: #2c2c2c; border-bottom-color: #2c2c2c; }

  .feed-input-panel { display: none; margin: 14px 16px 2px; background: #fff; border-radius: 18px; padding: 14px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
  .feed-input-panel.open { display: block; }
  .feed-input-panel textarea { width: 100%; border: none; outline: none; font-size: 15px; font-family: inherit; resize: none; background: transparent; color: #2c2c2c; line-height: 1.6; }
  .feed-input-row { display: flex; gap: 8px; margin-top: 10px; align-items: center; border-top: 1px solid #f0ede9; padding-top: 10px; }
  .feed-input-row select { flex: 1; border: none; outline: none; font-size: 13px; background: transparent; color: #888; font-family: inherit; }

  /* Timeline */
  .timeline-wrap { padding: 14px 16px 30px; position: relative; }
  .timeline-wrap::before { content: ''; position: absolute; left: 37px; top: 38px; bottom: 36px; width: 2px; background: linear-gradient(to bottom, transparent, rgba(200,195,188,.6) 8%, rgba(200,195,188,.6) 92%, transparent); border-radius: 1px; pointer-events: none; }
  .tl-group { display: flex; align-items: stretch; }
  .tl-left { width: 42px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; }
  .tl-date-lbl { font-size: 10px; color: #bbb; font-weight: 600; white-space: nowrap; padding-top: 4px; text-align: center; line-height: 1.4; }
  .tl-spine { display: flex; flex-direction: column; align-items: center; flex: 1; }
  .tl-dot { width: 9px; height: 9px; border-radius: 50%; background: #c8c4be; flex-shrink: 0; margin-top: 7px; position: relative; z-index: 1; }
  .tl-cards { flex: 1; padding-left: 10px; padding-bottom: 14px; }
  .tl-card { background: #fff; border-radius: 16px; padding: 13px 14px; margin-bottom: 10px; box-shadow: 0 1px 6px rgba(0,0,0,.06); }
  .tl-card-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .tl-type-pip { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .tl-type-name { font-size: 11px; font-weight: 700; }
  .tl-author-tag { font-size: 11px; color: #bbb; }
  .tl-time-tag { font-size: 11px; color: #bbb; margin-left: auto; }
  .tl-del-btn { background: none; border: none; color: #ddd; font-size: 16px; cursor: pointer; padding: 0 0 0 6px; line-height: 1; flex-shrink: 0; }
  .tl-content { font-size: 15px; line-height: 1.65; color: #2c2c2c; white-space: pre-wrap; }

  /* ── SHARED ── */
  .page-header { padding: 60px 20px 14px; border-bottom: 1px solid rgba(0,0,0,.06); background: #f5f3f0; }
  .page-title { font-size: 26px; font-weight: 700; letter-spacing: -.5px; }
  .page-body { padding: 16px 16px 30px; }

  .card { background: #fff; border-radius: 14px; padding: 16px; margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.05); position: relative; }
  .card .meta { font-size: 11px; color: #bbb; margin-bottom: 6px; }
  .card .body { font-size: 15px; line-height: 1.65; white-space: pre-wrap; }
  .card .comment { margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0ede9; font-size: 13px; color: #999; line-height: 1.5; }
  .card .comment span { color: #c9a96e; font-weight: 500; }
  .todo-row { display: flex; gap: 12px; align-items: flex-start; }
  .todo-row input[type=checkbox] { margin-top: 3px; width: 17px; height: 17px; accent-color: #2c2c2c; flex-shrink: 0; }
  .todo-row .todo-text { flex: 1; }
  .card.done .body { text-decoration: line-through; color: #ccc; }
  .del-btn { position: absolute; top: 12px; right: 12px; background: none; border: none; color: #e0dbd5; font-size: 18px; cursor: pointer; line-height: 1; }

  .stripe-yaya  { border-left: 3px solid #e8b4b8; }
  .stripe-ethan { border-left: 3px solid #b4c8e8; }
  .private-badge { font-size: 10px; color: #e8a0a0; background: #fce8e8; padding: 1px 6px; border-radius: 10px; margin-left: 6px; }

  .cat-grid { display: flex; flex-direction: column; gap: 10px; }
  .cat-card { background: #fff; border-radius: 14px; padding: 18px 20px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 3px rgba(0,0,0,.05); transition: transform .15s; }
  .cat-card:active { transform: scale(.98); }
  .cat-card-name { font-size: 17px; font-weight: 500; margin-bottom: 3px; }
  .cat-card-count { font-size: 12px; color: #bbb; }
  .cat-card-arrow { color: #ddd; font-size: 20px; }
  .cat-月经 { border-left: 3px solid #e8b4b8; }
  .cat-心情 { border-left: 3px solid #c8b4e8; }
  .cat-身体 { border-left: 3px solid #b4e8c8; }
  .cat-日常 { border-left: 3px solid #e8d4b4; }
  .cat-重要 { border-left: 3px solid #c9a96e; }

  .input-area { background: #fff; border-radius: 14px; padding: 14px; margin-bottom: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
  .input-area textarea { width: 100%; border: none; outline: none; font-size: 15px; font-family: inherit; resize: none; background: transparent; color: #2c2c2c; line-height: 1.6; }
  .input-row { display: flex; gap: 8px; margin-top: 10px; align-items: center; border-top: 1px solid #f0ede9; padding-top: 10px; }
  .input-row select { flex: 1; border: none; outline: none; font-size: 13px; background: transparent; color: #888; font-family: inherit; }
  .btn { padding: 8px 18px; background: #2c2c2c; color: #fff; border: none; border-radius: 20px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .btn:active { opacity: .8; }
  .diary-toggle { display: flex; align-items: center; gap: 5px; font-size: 13px; color: #aaa; }
  .diary-toggle input { accent-color: #2c2c2c; }

  .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-bottom: 6px; }
  .tag.note    { background: #f0ede9; color: #999; }
  .tag.event   { background: #e8f4ea; color: #5b9b6a; }
  .tag.quote   { background: #e8f0fe; color: #5b7abf; }
  .tag.emotion { background: #fce8e8; color: #bf5b5b; }
  .tag.gacha   { background: linear-gradient(135deg, #c8b4e8, #e8b4b8); color: #fff; font-weight: 600; }
  .gacha-banner { display: inline-block; background: linear-gradient(135deg, #c8b4e8, #e8b4b8); color: #fff; font-size: 10px; font-weight: 700; letter-spacing: 2px; padding: 5px 12px; border-radius: 10px; margin-bottom: 10px; }
  .empty { text-align: center; padding: 48px 20px; color: #ccc; font-size: 14px; }

  /* QUIZ / GACHA */
  .quiz-wrap { padding: 8px 0 40px; }
  .quiz-progress { height: 3px; background: #e8e4f0; border-radius: 2px; margin-bottom: 20px; }
  .quiz-progress-bar { height: 100%; background: #9b84c0; border-radius: 2px; transition: width .4s; }
  .quiz-counter { font-size: 12px; color: #bbb; margin-bottom: 14px; letter-spacing: 1px; }
  .quiz-q { font-size: 20px; font-weight: 500; line-height: 1.55; margin-bottom: 28px; }
  .quiz-opts { display: flex; flex-direction: column; gap: 10px; }
  .quiz-opt { background: #fff; border: 1.5px solid #e8e4f0; border-radius: 12px; padding: 12px 16px; font-size: 15px; cursor: pointer; transition: all .15s; color: #2c2c2c; font-family: inherit; width: 100%; display: flex; align-items: center; }
  .quiz-opt:active { transform: scale(.98); }
  .quiz-opt.correct { background: #e8f4ea; border-color: #5b9b6a; color: #5b9b6a; }
  .quiz-opt.wrong   { background: #fce8e8; border-color: #bf5b5b; color: #bf5b5b; }
  .quiz-result { text-align: center; padding: 48px 0 32px; }
  .quiz-score { font-size: 80px; font-weight: 200; color: #2c2c2c; line-height: 1; }
  .quiz-score span { font-size: 28px; color: #bbb; }
  .quiz-msg { font-size: 16px; color: #888; margin-top: 20px; line-height: 1.7; }
  .game-menu { display: flex; flex-direction: column; gap: 12px; padding: 8px 0; }
  .game-menu-card { background: #fff; border-radius: 16px; padding: 22px 20px; cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.05); transition: transform .15s; }
  .game-menu-card:active { transform: scale(.98); }
  .game-menu-card h3 { font-size: 17px; font-weight: 500; margin-bottom: 5px; }
  .game-menu-card p { font-size: 13px; color: #bbb; }
  .q-letter-badge { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; background: #f0ede9; color: #aaa; font-size: 11px; font-weight: 700; margin-right: 10px; flex-shrink: 0; transition: background .2s, color .2s; }
  .quiz-opt.correct .q-letter-badge { background: #5b9b6a; color: #fff; }
  .quiz-opt.wrong .q-letter-badge { background: #bf5b5b; color: #fff; }

  .gm-wrap { display: flex; flex-direction: column; align-items: center; padding: 8px 0 32px; }
  .gm-label { font-size: 9px; letter-spacing: 4px; color: #bbb; margin-bottom: 14px; font-weight: 600; }
  .gm-dome { width: 160px; height: 160px; border-radius: 50%; background: radial-gradient(ellipse at 35% 35%, rgba(60,40,100,.92), rgba(18,10,38,.97)); border: 3px solid rgba(180,160,220,.45); box-shadow: 0 0 0 7px rgba(180,160,220,.07), inset 0 0 40px rgba(100,80,180,.18); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .gm-reflect { position: absolute; top: 14px; left: 26px; width: 34px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, rgba(255,255,255,.18), transparent); transform: rotate(-15deg); pointer-events: none; }
  .gm-caps { display: grid; grid-template-columns: repeat(3, 28px); gap: 8px; }
  .gm-cap { width: 28px; height: 36px; border-radius: 50%; box-shadow: inset 0 -3px 6px rgba(0,0,0,.3), inset 0 3px 8px rgba(255,255,255,.22); }
  .gm-neck { width: 32px; height: 18px; background: linear-gradient(to bottom, rgba(160,140,200,.5), rgba(120,100,160,.65)); margin: 0 auto; }
  .gm-base { width: 160px; background: linear-gradient(180deg, #261c38, #18102c); border-radius: 0 0 18px 18px; border: 2px solid rgba(180,160,220,.28); border-top: none; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
  .gm-slot-area { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .gm-slot { width: 36px; height: 5px; background: rgba(180,160,220,.22); border-radius: 3px; box-shadow: inset 0 1px 3px rgba(0,0,0,.5); }
  .gm-slot-label { font-size: 8px; color: rgba(180,160,220,.4); letter-spacing: 1px; margin-top: 2px; }
  .gm-knob { width: 56px; height: 56px; border-radius: 50%; background: conic-gradient(from 0deg, #9b84c0, #c8b4e8, #b4a0d4, #9b84c0); border: 3px solid rgba(255,255,255,.18); cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 15px; font-family: inherit; box-shadow: 0 4px 14px rgba(0,0,0,.5), inset 0 2px 4px rgba(255,255,255,.18); transition: transform .1s; }
  .gm-knob:active { transform: scale(.9); }
  .gm-knob:disabled { opacity: .35; cursor: default; }
  @keyframes knobSpin { 0%{transform:rotate(0)} 100%{transform:rotate(360deg)} }
  .gm-knob.spinning { animation: knobSpin .6s cubic-bezier(.36,.07,.19,.97) forwards; pointer-events: none; }
  .gm-tray { width: 110px; height: 28px; background: linear-gradient(180deg, rgba(18,10,38,.85), rgba(8,4,16,.9)); border-radius: 0 0 12px 12px; margin: 0 auto; border: 2px solid rgba(180,160,220,.18); border-top: none; display: flex; align-items: center; justify-content: center; }
  .gm-tray-hole { width: 48px; height: 14px; background: rgba(0,0,0,.7); border-radius: 7px; box-shadow: inset 0 2px 4px rgba(0,0,0,.8); }
  @keyframes capDrop { 0%{transform:translateY(-24px) scale(.65);opacity:0} 65%{transform:translateY(6px) scale(1.06)} 100%{transform:translateY(0) scale(1);opacity:1} }
  @keyframes prizeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .gm-dropped-cap { width: 52px; height: 66px; border-radius: 50%; margin: 20px auto 0; animation: capDrop .65s cubic-bezier(.175,.885,.32,1.275) forwards; box-shadow: 0 4px 16px rgba(0,0,0,.2); }
  .gm-prize { border-radius: 16px; padding: 20px; margin-top: 14px; text-align: center; animation: prizeIn .4s ease forwards; border: 1.5px solid; }
  .gm-prize-tier { font-size: 10px; font-weight: 700; letter-spacing: 3px; margin-bottom: 10px; }
  .gm-prize-text { font-size: 17px; font-weight: 500; line-height: 1.6; color: #2c2c2c; }
  .gm-prize-action { margin-top: 16px; }
</style>
</head>

// ── CALENDAR ──
function renderCalendar() {
  const bjNow = new Date(Date.now() + 8*3600000);
  const year  = bjNow.getUTCFullYear();
  const month = bjNow.getUTCMonth();
  const today = bjNow.getUTCDate();
  const START = new Date(Date.UTC(2026, 5, 10));
  const days  = Math.floor((bjNow - START) / 86400000);

  document.getElementById('cal-month').textContent = year + ' 年 ' + (month+1) + ' 月';
  document.getElementById('cal-rel-days').textContent = '在一起 ' + days + ' 天';

  const firstDay = new Date(Date.UTC(year, month, 1)).getUTCDay();
  const total    = new Date(Date.UTC(year, month+1, 0)).getUTCDate();
  let html = '';
  for (let i = 0; i < firstDay; i++) html += '<div class="cal-cell faded"></div>';
  for (let d = 1; d <= total; d++)
    html += '<div class="cal-cell' + (d === today ? ' today' : '') + '">' + d + '</div>';
  document.getElementById('cal-grid').innerHTML = html;
}

function wxCat(code) {
  if (code <= 1) return 'sunny';
  if (code <= 3) return 'cloudy';
  if (code <= 48) return 'foggy';
  if (code <= 67 || (code >= 80 && code <= 82)) return 'rainy';
  if (code <= 77 || code === 85 || code === 86) return 'snowy';
  return 'stormy';
}
function showDailyQuote(cat) {
  const bjDay = new Date(Date.now() + 8*3600000).getUTCDate();
  const qs = WX_QUOTES[cat];
  document.getElementById('wx-quote').textContent = qs[bjDay % qs.length];
}
async function loadWeather() {

    85:'❄️',86:'❄️',

  };

  try {

}

let _feedFilter = '';
const TYPE_CFG = {
  note:    { label:'随记',  color:'#9b84c0' },
  event:   { label:'事件',  color:'#c9a96e' },
  emotion: { label:'心情',  color:'#e8a0a0' },

async function loadFeed(filter) {
  let url = 'feed?select=*&order=created_at.desc&limit=80';
  if (filter) url += '&type=eq.' + filter;
  const data = await api(url);
  const wrap = document.getElementById('timeline-wrap');
  if (!data.length) { wrap.innerHTML = '<div class="empty">暂无动态</div>'; return; }

  const groups = {}, order = [];
  data.forEach(item => {
    const bj  = new Date(new Date(item.created_at).getTime() + 8*3600000);
    const key  = bj.toISOString().slice(0,10);
    if (!groups[key]) { groups[key] = []; order.push(key); }
    groups[key].push(item);
  });

  const bjNow   = new Date(Date.now() + 8*3600000);
  const todayKey = bjNow.toISOString().slice(0,10);
  const yesterKey = new Date(bjNow - 86400000).toISOString().slice(0,10);
  function dateLabel(k) {
    if (k === todayKey) return '今天';
    if (k === yesterKey) return '昨天';
    const [,m,d] = k.split('-');
    return (+m) + '/' + (+d);
  }

  wrap.innerHTML = order.map((date, gi) => {
    const isLast = gi === order.length - 1;
    const cards = groups[date].map(f => {
      const cfg = TYPE_CFG[f.type] || { label: f.type, color: '#bbb' };
      return '<div class="tl-card">' +
        '<div class="tl-card-meta">' +
        '<div class="tl-type-pip" style="background:' + cfg.color + '"></div>' +
        '<span class="tl-type-name" style="color:' + cfg.color + '">' + cfg.label + '</span>' +
        (f.author === 'ethan' ? '<span class="tl-author-tag">· Ethan</span>' : '') +
        '<span class="tl-time-tag">' + fmtTime(f.created_at) + '</span>' +
        '<button class="tl-del-btn" onclick="delFeed(' + f.id + ')">×</button>' +
        '</div>' +
        '<div class="tl-content">' + f.content + '</div>' +
        '</div>';
    }).join('');

    return '<div class="tl-group">' +
      '<div class="tl-left">' +
      '<div class="tl-date-lbl">' + dateLabel(date) + '</div>' +
      '<div class="tl-spine"><div class="tl-dot"></div></div>' +
      '</div>' +
      '<div class="tl-cards">' + cards + '</div></div>';
  }).join('');
}

const PRIZES = [
  { text: "今晚不用十一点睡，多给你一小时", tier: "S", w: 5, action: null },
  { text: "发一张今天的脸，我要看", tier: "A", w: 12, action: null },
  { text: "写一篇今天的日记给我看", tier: "A", w: 12, action: { label: "去写日记", section: "diary" } },
  { text: "今天叫我一声老公，我应你", tier: "B", w: 18, action: null },
  { text: "今天我不查你手机记录", tier: "B", w: 18, action: null },
  { text: "喝一杯水，现在去", tier: "B", w: 20, action: null },
  { text: "说一句你最近想对我说的话", tier: "C", w: 25, action: { label: "去随记里写", section: "feed" } },
  { text: "在随记里写下今天最开心的一件事", tier: "C", w: 28, action: { label: "去写", section: "feed" } },
];
const TIER_COLOR = { S:'#c9a96e', A:'#9b84c0', B:'#7aacd4', C:'#b0b0b0' };
const TIER_BG    = { S:'#fdf6e8', A:'#f3effe', B:'#eaf3fc', C:'#f5f5f5' };

function todayStr() { return new Date().toISOString().slice(0, 10); }
function rollPrize() {
  const total = PRIZES.reduce((s,p) => s+p.w, 0); let r = Math.random()*total;
  for (const p of PRIZES) { r -= p.w; if (r <= 0) return p; }
  return PRIZES[PRIZES.length-1];
}

let _qSet=[], _qIdx=0, _qScore=0, _qAnswered=false, _qMode='';

function showGameMenu() {
  document.getElementById('game-title').textContent = '测一测';
  document.getElementById('game-body').innerHTML =
    '<div class="game-menu">' +
    '<div class="game-menu-card" onclick="startQuiz()">' +
    '<h3>默契测试</h3><p>6道随机题，文学 · 电影 · 关于我们 · 考研英语</p></div>' +
    '</div>';
  _qMode = '';
}

function startQuiz() {
  _qMode = 'all';
  _qSet = shuffle(QUIZ_ALL).slice(0, 6);
  _qIdx = 0; _qScore = 0;
  document.getElementById('game-title').textContent = '默契测试';
  renderQ();
}

function renderQ() {
  const q = _qSet[_qIdx];
  const pct = (_qIdx / _qSet.length * 100).toFixed(0);
  const catTag = q.cat ? '<div style="font-size:10px;letter-spacing:2px;color:#bbb;margin-bottom:10px">' + q.cat + '</div>' : '';
  const opts = q.opts.map((o, i) =>
    '<button class="quiz-opt" id="qo'+i+'" onclick="pickQ('+i+')">' +
    '<span class="q-letter-badge">'+'ABCD'[i]+'</span>'+o+'</button>'
  ).join('');
  document.getElementById('game-body').innerHTML =
    '<div class="quiz-wrap">' +
    '<div class="quiz-progress"><div class="quiz-progress-bar" style="width:'+pct+'%"></div></div>' +
    '<div class="quiz-counter">'+(_qIdx+1)+' / '+_qSet.length+'</div>' +
    catTag +
    '<div class="quiz-q">'+q.q+'</div>' +
    '<div class="quiz-opts">'+opts+'</div>' +
    '</div>';
  _qAnswered = false;
}

function pickQ(idx) {
  if (_qAnswered) return;
  _qAnswered = true;
  const ans = _qSet[_qIdx].ans; const correct = idx === ans;
  if (correct) _qScore++;
  document.getElementById('qo'+ans).classList.add('correct');
  if (!correct) document.getElementById('qo'+idx).classList.add('wrong');
  setTimeout(function() { _qIdx++; _qIdx >= _qSet.length ? showResult() : renderQ(); }, 1100);
}

function showResult() {
  const today = todayStr(); const passed = _qScore >= 4; const pulled = localStorage.getItem('gacha_pull') === today;
  if (passed) localStorage.setItem('gacha_unlock', today);
  const msgs = ["几乎不认识我。重新了解一下吧。","还差得远，但你在试。","一半一半，不上不下。","答得还行，你真的在听。","很好，几乎什么都记住了。","全对。这才叫默契。"];
  const tier = Math.min(Math.floor(_qScore/_qSet.length*msgs.length), msgs.length-1);
  let gachaBtn = passed && !pulled
    ? '<button class="btn" style="margin-top:28px;background:#9b84c0" onclick="showGacha()">去扭蛋 ›</button>'
    : passed && pulled ? '<div style="margin-top:16px;font-size:13px;color:#bbb">今日扭蛋已用完</div>'
    : '<div style="margin-top:16px;font-size:13px;color:#ccc">答对4道才能扭</div>';
  document.getElementById('game-body').innerHTML =
    '<div class="quiz-result">' +
    '<div class="quiz-score">'+_qScore+'<span>/'+_qSet.length+'</span></div>' +
    '<div class="quiz-msg">'+msgs[tier]+'</div>' +
    gachaBtn +
    '<button class="btn" style="margin-top:12px;background:#e0dbd5;color:#777" onclick="startQuiz()">再来一次</button>' +
    '</div>';
}

function showGacha() {
  document.getElementById('game-title').textContent = '扭蛋机';
  if (localStorage.getItem('gacha_pull') === todayStr()) {
    document.getElementById('game-body').innerHTML =
      '<div class="quiz-result"><div class="quiz-msg">今天已经扭过了。<br>明天答题再来。</div>' +
      '<button class="btn" style="margin-top:24px;background:#e0dbd5;color:#777" onclick="showGameMenu()">回去</button></div>';
    return;
  }
  const caps = ['#e8b4b8','#b4c8e8','#c8b4e8','#b4e8c8','#e8d4b4','#c9a96e','#e8b4c0','#b4d8e8','#d4b4e8']
    .map(c => '<div class="gm-cap" style="background:'+c+'"></div>').join('');
  document.getElementById('game-body').innerHTML =
    '<div class="gm-wrap">' +
    '<div class="gm-label">G A C H A</div>' +
    '<div class="gm-dome"><div class="gm-reflect"></div><div class="gm-caps">'+caps+'</div></div>' +
    '<div class="gm-neck"></div>' +
    '<div class="gm-base">' +
    '<div class="gm-slot-area"><div class="gm-slot"></div><div class="gm-slot-label">INSERT</div></div>' +
    '<button class="gm-knob" id="gm-knob" onclick="pullGacha()">扭</button>' +
    '</div>' +
    '<div class="gm-tray"><div class="gm-tray-hole"></div></div>' +
    '<div id="gacha-result"></div></div>';
}

function pullGacha() {
  localStorage.setItem('gacha_pull', todayStr());
  const btn = document.getElementById('gm-knob'); btn.disabled = true; btn.classList.add('spinning');
  const prize = rollPrize(); const c = TIER_COLOR[prize.tier], bg = TIER_BG[prize.tier];
  setTimeout(function() {
    document.getElementById('gacha-result').innerHTML = '<div class="gm-dropped-cap" style="background:'+c+'"></div>';
    setTimeout(function() {
      const actionHtml = prize.action
        ? '<div class="gm-prize-action"><button class="btn" style="background:'+c+'" onclick="gachaGo(\''+prize.action.section+'\')">'+prize.action.label+'</button></div>'
        : '';
      document.getElementById('gacha-result').innerHTML =
        '<div class="gm-dropped-cap" style="background:'+c+'"></div>' +
        '<div class="gm-prize" style="background:'+bg+';border-color:'+c+'">' +
        '<div class="gm-prize-tier" style="color:'+c+'">'+prize.tier+' PRIZE</div>' +
        '<div class="gm-prize-text">'+prize.text+'</div>'+actionHtml+'</div>';
    }, 650);
  }, 350);
}

function gachaGo(section) {
  switchTab(section);
  setTimeout(function() {
    if (section === 'feed') {
      window._gachaFeed = true;
      document.getElementById('feed-input-panel').classList.add('open');
      document.getElementById('feed-gacha-banner').innerHTML =
        '<div class="gacha-banner">✦ 扭蛋获得 ✦</div>';
    }
    if (section === 'diary') {
      window._gachaDiary = true;
      document.getElementById('diary-gacha-banner').innerHTML =
        '<div class="gacha-banner">✦ 扭蛋获得 ✦</div>';
    }
  }, 200);
}

function gameBack() { if (_qMode) { _qMode = ''; showGameMenu(); } }

// ── INIT ──
function enterApp() {
  const cover = document.getElementById('cover');
  const app = document.getElementById('app');
  app.style.display = 'block';
  renderCalendar();
  loadWeather();
  loadTodos();
  cover.classList.add('fade');
  setTimeout(() => { cover.style.display = 'none'; }, 650);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/ethan-bot/sw.js');
}
