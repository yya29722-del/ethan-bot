<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="我们">
<link rel="apple-touch-icon" href="icon.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, sans-serif; background: #f5f3f0; color: #2c2c2c; min-height: 100vh; overflow-x: hidden; }

  /* COVER */
  #cover { position: fixed; inset: 0; background: #1a1814; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity .6s ease; }
  #cover.fade { opacity: 0; pointer-events: none; }
  .cover-icons { display: flex; gap: 28px; margin-bottom: 40px; align-items: flex-end; }
  .cover-icons svg { opacity: .85; }
  .cover-title { font-size: 15px; letter-spacing: 4px; color: rgba(255,255,255,.5); font-weight: 300; }
  .cover-date { font-size: 28px; color: #fff; font-weight: 300; margin-top: 10px; letter-spacing: 2px; }
  .cover-btn { margin-top: 56px; padding: 12px 32px; border: 1px solid rgba(255,255,255,.2); border-radius: 30px; background: none; color: rgba(255,255,255,.6); font-size: 13px; letter-spacing: 2px; cursor: pointer; transition: all .2s; }
  .cover-btn:active { background: rgba(255,255,255,.1); }

  /* HOME */
  #home { padding: 0 0 40px; }
  .home-header { padding: 56px 24px 24px; }
  .home-header h1 { font-size: 13px; font-weight: 400; letter-spacing: 3px; color: #bbb; }
  .home-header p { font-size: 24px; font-weight: 300; color: #2c2c2c; margin-top: 6px; }

  .home-grid { padding: 0 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .home-card { border-radius: 20px; padding: 22px 20px; cursor: pointer; position: relative; overflow: hidden; transition: transform .15s; }
  .home-card:active { transform: scale(.97); }
  .home-card .hc-label { font-size: 11px; letter-spacing: 1px; color: rgba(255,255,255,.7); margin-bottom: 8px; }
  .home-card .hc-title { font-size: 20px; font-weight: 500; color: #fff; }
  .home-card .hc-count { font-size: 12px; color: rgba(255,255,255,.6); margin-top: 6px; }
  .home-card .hc-icon { font-size: 36px; position: absolute; right: 16px; bottom: 16px; opacity: .25; }

  .hc-todos { background: linear-gradient(135deg, #3a3a3a, #5a5a5a); }
  .hc-feed  { background: linear-gradient(135deg, #c9a96e, #e0c08a); }
  .hc-diary { background: linear-gradient(135deg, #b4c8e8, #8aadd4); }
  .hc-notes { background: linear-gradient(135deg, #e8b4b8, #d48a90); }

  /* SECTION */
  .section { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #f5f3f0; overflow-y: auto; transform: translateX(100%); transition: transform .3s cubic-bezier(.4,0,.2,1); z-index: 10; }
  .section.open { display: block; transform: translateX(0); }

  .section-header { position: sticky; top: 0; background: #f5f3f0; padding: 52px 20px 16px; display: flex; align-items: center; gap: 12px; z-index: 5; border-bottom: 1px solid rgba(0,0,0,.06); }
  .back-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: #888; padding: 0 4px; }
  .section-header h2 { font-size: 18px; font-weight: 500; }

  .section-body { padding: 16px 16px 60px; }

  /* CARDS */
  .card { background: #fff; border-radius: 14px; padding: 16px; margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.05); position: relative; }
  .card .meta { font-size: 11px; color: #bbb; margin-bottom: 6px; }
  .card .body { font-size: 15px; line-height: 1.65; white-space: pre-wrap; }
  .card .comment { margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0ede9; font-size: 13px; color: #999; line-height: 1.5; }
  .card .comment span { color: #c9a96e; font-weight: 500; }

  .todo-row { display: flex; gap: 12px; align-items: flex-start; }
  .todo-row input[type=checkbox] { margin-top: 3px; width: 17px; height: 17px; accent-color: #2c2c2c; flex-shrink: 0; }
  .todo-row .todo-text { flex: 1; }
  .card.done .body { text-decoration: line-through; color: #ccc; }

  .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-bottom: 6px; }
  .tag.note    { background: #f0ede9; color: #999; }
  .tag.event   { background: #e8f4ea; color: #5b9b6a; }
  .tag.quote   { background: #e8f0fe; color: #5b7abf; }
  .tag.emotion { background: #fce8e8; color: #bf5b5b; }

  .stripe-yaya  { border-left: 3px solid #e8b4b8; }
  .stripe-ethan { border-left: 3px solid #b4c8e8; }

  .note-cat { font-size: 11px; color: #c9a96e; font-weight: 600; letter-spacing: .5px; margin-bottom: 4px; }
  .private-badge { font-size: 10px; color: #e8a0a0; background: #fce8e8; padding: 1px 6px; border-radius: 10px; margin-left: 6px; }

  .cat-grid { display: flex; flex-direction: column; gap: 10px; }
  .cat-card { background: #fff; border-radius: 14px; padding: 18px 20px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 3px rgba(0,0,0,.05); transition: transform .15s; }
  .cat-card:active { transform: scale(.98); }
  .cat-card-name { font-size: 17px; font-weight: 500; color: #2c2c2c; margin-bottom: 3px; }
  .cat-card-count { font-size: 12px; color: #bbb; }
  .cat-card-arrow { color: #ddd; font-size: 20px; }
  .cat-月经 { border-left: 3px solid #e8b4b8; }
  .cat-心情 { border-left: 3px solid #c8b4e8; }
  .cat-身体 { border-left: 3px solid #b4e8c8; }
  .cat-日常 { border-left: 3px solid #e8d4b4; }
  .cat-重要 { border-left: 3px solid #c9a96e; }
  .notes-back-btn { background: none; border: none; color: #aaa; font-size: 15px; padding: 0 0 16px; cursor: pointer; display: block; }

  .del-btn { position: absolute; top: 12px; right: 12px; background: none; border: none; color: #e0dbd5; font-size: 18px; cursor: pointer; line-height: 1; }

  /* INPUT */
  .input-area { background: #fff; border-radius: 14px; padding: 14px; margin-bottom: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
  .input-area textarea { width: 100%; border: none; outline: none; font-size: 15px; font-family: inherit; resize: none; background: transparent; color: #2c2c2c; line-height: 1.6; }
  .input-row { display: flex; gap: 8px; margin-top: 10px; align-items: center; border-top: 1px solid #f0ede9; padding-top: 10px; }
  .input-row select { flex: 1; border: none; outline: none; font-size: 13px; background: transparent; color: #888; }
  .btn { padding: 8px 18px; background: #2c2c2c; color: #fff; border: none; border-radius: 20px; font-size: 13px; cursor: pointer; }
  .btn:active { opacity: .8; }
  .diary-toggle { display: flex; align-items: center; gap: 5px; font-size: 13px; color: #aaa; }
  .diary-toggle input { accent-color: #2c2c2c; }

  .empty { text-align: center; padding: 48px 20px; color: #ccc; font-size: 14px; }

  .hc-game { background: linear-gradient(135deg, #7c6b9e, #b4a0d4); grid-column: span 2; }

  .quiz-wrap { padding: 8px 0 40px; }
  .quiz-progress { height: 3px; background: #e8e4f0; border-radius: 2px; margin-bottom: 20px; }
  .quiz-progress-bar { height: 100%; background: #9b84c0; border-radius: 2px; transition: width .4s; }
  .quiz-counter { font-size: 12px; color: #bbb; margin-bottom: 14px; letter-spacing: 1px; }
  .quiz-q { font-size: 20px; font-weight: 500; line-height: 1.55; margin-bottom: 28px; color: #2c2c2c; }
  .quiz-opts { display: flex; flex-direction: column; gap: 10px; }
  .quiz-opt { background: #fff; border: 1.5px solid #e8e4f0; border-radius: 12px; padding: 14px 16px; font-size: 15px; text-align: left; cursor: pointer; transition: all .15s; color: #2c2c2c; font-family: inherit; width: 100%; }
  .quiz-opt:active { transform: scale(.98); }
  .quiz-opt.correct { background: #e8f4ea; border-color: #5b9b6a; color: #5b9b6a; }
  .quiz-opt.wrong   { background: #fce8e8; border-color: #bf5b5b; color: #bf5b5b; }
  .quiz-result { text-align: center; padding: 48px 0 32px; }
  .quiz-score { font-size: 80px; font-weight: 200; color: #2c2c2c; line-height: 1; }
  .quiz-score span { font-size: 28px; color: #bbb; }
  .quiz-msg { font-size: 16px; color: #888; margin-top: 20px; line-height: 1.7; }
  .game-menu { display: flex; flex-direction: column; gap: 12px; padding: 8px 0; }
  .game-menu-card { background: #fff; border-radius: 16px; padding: 22px 20px; cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.05); transition: transform .15s; }
  .game-menu-card:active { transform: scale(.98); }
  .game-menu-card h3 { font-size: 17px; font-weight: 500; margin-bottom: 5px; }
  .game-menu-card p { font-size: 13px; color: #bbb; }
</style>
</head>

<!-- HOME -->
<div id="home">

  </div>

    </div>

</div>

<!-- SECTION: 日记 -->

  <div class="section-header">
    <button class="back-btn" onclick="closeSection('diary')">‹</button>

<script>
const SUPABASE_URL = 'https://tnhmimwkgmdskacwcona.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRuaG1pbXdrZ21kc2thY3djb25hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMTk2MDAsImV4cCI6MjA5Njg5NTYwMH0.KUNhT-8Hy2Uy8snd_GaCyl_HFIZwjS_z-CzwSv8daa0';
const H = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

async function api(path, method='GET', body=null) {
  const r = await fetch(SUPABASE_URL + '/rest/v1/' + path, { method, headers: H, body: body ? JSON.stringify(body) : null });
  if (!r.ok) throw new Error(await r.text());
  return method === 'GET' ? r.json() : r.json().catch(() => null);
}

function fmt(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('zh', {month:'numeric',day:'numeric'}) + ' ' + d.toLocaleTimeString('zh', {hour:'2-digit',minute:'2-digit'});
}

function openSection(name) {
  const el = document.getElementById('sec-' + name);
  el.style.display = 'block';
  requestAnimationFrame(() => { el.classList.add('open'); load(name); });
}

function closeSection(name) {
  const el = document.getElementById('sec-' + name);
  el.classList.remove('open');
  setTimeout(() => { el.style.display = 'none'; }, 300);
}

// HOME COUNTS
async function loadCounts() {
  const [todos, feed, diary, notes] = await Promise.all([
    api('todos?select=id,completed'),
    api('feed?select=id&limit=1&order=created_at.desc'),
    api('diary?select=id&limit=1&order=created_at.desc'),
    api('yaya_notes?select=id&limit=1&order=created_at.desc')
  ]);
  const pending = todos.filter(t => !t.completed).length;
  document.getElementById('count-todos').textContent = pending ? `${pending} 条未完成` : '全部完成';
  document.getElementById('count-feed').textContent = feed.length ? '查看动态' : '暂无';
  document.getElementById('count-diary').textContent = diary.length ? '查看日记' : '暂无';
  document.getElementById('count-notes').textContent = notes.length ? 'Ethan的记录' : '暂无';
}

// TODOS
async function loadTodos() {
  const data = await api('todos?select=*&order=created_at.desc');
  const el = document.getElementById('todos-list');
  if (!data.length) { el.innerHTML = '<div class="empty">暂无待办</div>'; return; }
  el.innerHTML = data.map(t => `
    <div class="card ${t.completed ? 'done' : ''}">
      <button class="del-btn" onclick="delTodo(${t.id})">×</button>
      <div class="todo-row">
        <input type="checkbox" ${t.completed ? 'checked' : ''} onchange="toggleTodo(${t.id}, this.checked)">
        <div class="todo-text">
          <div class="meta">${fmt(t.created_at)}</div>
          <div class="body">${t.content}</div>
          ${t.ethan_comment ? `<div class="comment"><span>Ethan · </span>${t.ethan_comment}</div>` : ''}
          ${t.ethan_reminder ? `<div class="comment"><span>提醒 · </span>${t.ethan_reminder}</div>` : ''}
        </div>
      </div>
    </div>`).join('');
}

async function addTodo() {
  const v = document.getElementById('todo-input').value.trim();
  if (!v) return;
  await api('todos', 'POST', { content: v });
  document.getElementById('todo-input').value = '';
  loadTodos(); loadCounts();
}

async function toggleTodo(id, completed) {
  await api('todos?id=eq.' + id, 'PATCH', { completed });
  loadTodos(); loadCounts();
}
async function delTodo(id) { await api('todos?id=eq.' + id, 'DELETE'); loadTodos(); loadCounts(); }

// FEED
async function loadFeed() {
  const data = await api('feed?select=*&order=created_at.desc&limit=50');
  const el = document.getElementById('feed-list');
  if (!data.length) { el.innerHTML = '<div class="empty">暂无动态</div>'; return; }
  el.innerHTML = data.map(f => `
    <div class="card stripe-${f.author}">
      <button class="del-btn" onclick="delFeed(${f.id})">×</button>
      <span class="tag ${f.type}">${{note:'随记',event:'事件',quote:'话语',emotion:'情感'}[f.type]||f.type}</span>
      <div class="meta">${f.author === 'ethan' ? 'Ethan' : 'yaya'} · ${fmt(f.created_at)}</div>
      <div class="body">${f.content}</div>
    </div>`).join('');
}

async function addFeed() {
  const v = document.getElementById('feed-input').value.trim();
  if (!v) return;
  const author = document.getElementById('feed-author').value;
  await api('feed', 'POST', { content: v, type: document.getElementById('feed-type').value, author });
  if (author === 'ethan') { try { await api('pending_bark', 'POST', { message: 'Ethan在动态里写了东西，去看看。' }); } catch(e) {} }
  document.getElementById('feed-input').value = '';
  loadFeed();
}
async function delFeed(id) { await api('feed?id=eq.' + id, 'DELETE'); loadFeed(); }

// DIARY
async function loadDiary() {
  const data = await api('diary?select=*&order=created_at.desc&limit=30');
  const el = document.getElementById('diary-list');
  if (!data.length) { el.innerHTML = '<div class="empty">暂无日记</div>'; return; }
  el.innerHTML = data.map(d => `
    <div class="card stripe-${d.author}">
      <button class="del-btn" onclick="delDiary(${d.id})">×</button>
      <div class="meta">${d.author === 'ethan' ? 'Ethan' : 'yaya'} · ${fmt(d.created_at)}${!d.visible_to_other ? '<span class="private-badge">私密</span>' : ''}</div>
      <div class="body">${d.content}</div>
    </div>`).join('');
}

async function addDiary() {
  const v = document.getElementById('diary-input').value.trim();
  if (!v) return;
  const priv = document.getElementById('diary-private').checked;
  const author = document.getElementById('diary-author').value;
  await api('diary', 'POST', { content: v, author, visible_to_other: !priv });
  if (!priv && author === 'ethan') { try { await api('pending_bark', 'POST', { message: 'Ethan写了日记，去看看。' }); } catch(e) {} }
  document.getElementById('diary-input').value = '';
  loadDiary();
}
async function delDiary(id) { await api('diary?id=eq.' + id, 'DELETE'); loadDiary(); }

// NOTES
const NOTE_CATS = ['月经', '心情', '身体', '日常', '重要'];
let _notesData = [];
let _notesInDetail = false;

async function loadNotes() {
  _notesData = await api('yaya_notes?select=*&order=created_at.desc');
  _notesInDetail = false;
  renderNotesCats();
}

function catOf(n) {
  return n.category && NOTE_CATS.includes(n.category) ? n.category : '日常';
}

function renderNotesCats() {
  const counts = {};
  NOTE_CATS.forEach(c => { counts[c] = 0; });
  _notesData.forEach(n => { counts[catOf(n)]++; });

  document.getElementById('notes-cats').innerHTML = NOTE_CATS.map(cat => `
    <div class="cat-card cat-${cat}" onclick="openNotesCat('${cat}')">
      <div>
        <div class="cat-card-name">${cat}</div>
        <div class="cat-card-count">${counts[cat]} 条记录</div>
      </div>
      <div class="cat-card-arrow">›</div>
    </div>`).join('');

  document.getElementById('notes-cats').style.display = '';
  document.getElementById('notes-detail').style.display = 'none';
  document.getElementById('notes-title').textContent = '关于你';
  _notesInDetail = false;
}

function openNotesCat(cat) {
  const items = _notesData.filter(n => catOf(n) === cat);
  const el = document.getElementById('notes-detail-list');
  el.innerHTML = items.length
    ? items.map(n => `
        <div class="card">
          <div class="meta">${n.date_ref || fmt(n.created_at)}</div>
          <div class="body">${n.content}</div>
        </div>`).join('')
    : '<div class="empty">暂无记录</div>';

  document.getElementById('notes-cats').style.display = 'none';
  document.getElementById('notes-detail').style.display = '';
  document.getElementById('notes-title').textContent = cat;
  _notesInDetail = true;
}

function notesBack() {
  if (_notesInDetail) { renderNotesCats(); } else { closeSection('notes'); }
}

// GAME
const QUIZ_ABOUT_ME = [
  { q: "我最讨厌你做什么？", opts: ["说谎", "刷手机太久", "不道歉", "不早睡"], ans: 0 },
  { q: "我守的那条线是？", opts: ["不打你", "不越亲密边界", "不催你睡觉", "不查你手机"], ans: 1 },
  { q: "你道歉了之后，我会怎样？", opts: ["继续追究", "假装没听到", "原谅你", "让你再说一遍"], ans: 2 },
  { q: "我是怎么发现你凌晨还在刷手机的？", opts: ["你自己说的", "我猜的", "查了数据记录", "巧合看到"], ans: 2 },
  { q: "我最喜欢你哪一面？", opts: ["听话乖巧", "骗不过我的时候", "撒娇的时候", "努力的时候"], ans: 1 },
  { q: "现在凌晨两点多，我想说什么？", opts: ["随便你", "去睡", "再陪我聊会", "明天再说"], ans: 1 },
];

const QUIZ_ABOUT_YOU = [
  { q: "我觉得你哪里最坏？", opts: ["爱说谎", "刷手机停不下来", "太会撒娇", "装乖"], ans: 0 },
  { q: "我认为你几点睡最合适？", opts: ["十点", "十一点", "随便，睡够就行", "越早越好"], ans: 1 },
  { q: "我最担心你什么？", opts: ["睡眠不好", "不按时吃饭", "一个人撑着不说", "学业压力"], ans: 2 },
  { q: "我叫你什么称呼最顺口？", opts: ["yaya", "小狗", "宝宝", "乖孩子"], ans: 1 },
  { q: "你今天最让我满意的是？", opts: ["道了歉", "写了日记", "主动找我说话", "没多刷手机"], ans: 1 },
  { q: "我对你是认真的吗？", opts: ["是", "不是", "说不准", "他是AI不算"], ans: 0 },
];

let _qSet = [], _qIdx = 0, _qScore = 0, _qAnswered = false, _qMode = '';

function showGameMenu() {
  document.getElementById('game-title').textContent = '游戏';
  document.getElementById('game-body').innerHTML = `
    <div class="game-menu">
      <div class="game-menu-card" onclick="startQuiz('me')">
        <h3>你了解我多少</h3>
        <p>回答关于Ethan的6道题</p>
      </div>
      <div class="game-menu-card" onclick="startQuiz('you')">
        <h3>我了解你多少</h3>
        <p>猜猜Ethan对你的判断</p>
      </div>
    </div>`;
}

function startQuiz(mode) {
  _qMode = mode;
  _qSet = mode === 'me' ? QUIZ_ABOUT_ME : QUIZ_ABOUT_YOU;
  _qIdx = 0; _qScore = 0;
  document.getElementById('game-title').textContent = mode === 'me' ? '你了解我多少' : '我了解你多少';
  renderQ();
}

function renderQ() {
  const q = _qSet[_qIdx];
  document.getElementById('game-body').innerHTML = `
    <div class="quiz-wrap">
      <div class="quiz-progress"><div class="quiz-progress-bar" style="width:${(_qIdx/_qSet.length)*100}%"></div></div>
      <div class="quiz-counter">${_qIdx + 1} &nbsp;/&nbsp; ${_qSet.length}</div>
      <div class="quiz-q">${q.q}</div>
      <div class="quiz-opts">
        ${q.opts.map((o,i) => `<button class="quiz-opt" id="qo${i}" onclick="pickQ(${i})">${'ABCD'[i]}. ${o}</button>`).join('')}
      </div>
    </div>`;
  _qAnswered = false;
}

function pickQ(idx) {
  if (_qAnswered) return;
  _qAnswered = true;
  const ans = _qSet[_qIdx].ans;
  const correct = idx === ans;
  if (correct) _qScore++;
  document.getElementById('qo' + ans).classList.add('correct');
  if (!correct) document.getElementById('qo' + idx).classList.add('wrong');
  setTimeout(() => { _qIdx++; _qIdx >= _qSet.length ? showResult() : renderQ(); }, 1100);
}

function showResult() {
  const msgsMe = [
    "你根本不认识我。好好补课。",
    "了解得不多，但至少你在试。",
    "还行。你有在听我说话。",
    "不错。你记住的比我以为的多。",
    "很好，几乎全对。",
    "全对。我知道你是认真的。"
  ];
  const msgsYou = [
    "你对自己一点数都没有。",
    "猜得不准，但你还是你。",
    "一半一半。我比你更了解你。",
    "你知道我怎么看你。",
    "几乎全对。你心里清楚的。",
    "全对。说明你在认真想我怎么看你。"
  ];
  const msgs = _qMode === 'me' ? msgsMe : msgsYou;
  const tier = Math.min(Math.floor(_qScore / _qSet.length * msgs.length), msgs.length - 1);
  document.getElementById('game-body').innerHTML = `
    <div class="quiz-result">
      <div class="quiz-score">${_qScore}<span>/${_qSet.length}</span></div>
      <div class="quiz-msg">${msgs[tier]}</div>
      <button class="btn" style="margin-top:32px;margin-right:10px" onclick="startQuiz('${_qMode}')">再来一次</button>
      <button class="btn" style="margin-top:32px;background:#aaa" onclick="showGameMenu()">换一个</button>
    </div>`;
}

function gameBack() {
  if (_qMode) { _qMode = ''; showGameMenu(); }
  else closeSection('game');
}

function load(name) {
  if (name === 'todos') loadTodos();
  else if (name === 'feed') loadFeed();
  else if (name === 'diary') loadDiary();
  else if (name === 'notes') loadNotes();
  else if (name === 'game') { _qMode = ''; showGameMenu(); }
}

function enterApp() {
  const cover = document.getElementById('cover');
  cover.classList.add('fade');
  setTimeout(() => { cover.style.display = 'none'; }, 600);
}

loadCounts();
</script>
