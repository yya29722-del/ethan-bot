<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>yaya & Ethan</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="us">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#f5f3f0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, sans-serif; background: #f5f3f0; color: #2c2c2c; min-height: 100vh; overflow-x: hidden; }

  /* COVER */
  #cover { position: fixed; inset: 0; background: #f5f3f0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity .6s ease; }
  #cover.fade { opacity: 0; pointer-events: none; }
  .cover-icons { display: flex; gap: 28px; margin-bottom: 40px; align-items: flex-end; }
  .cover-icons svg { opacity: .85; }
  .cover-title { font-size: 15px; letter-spacing: 4px; color: #bbb; font-weight: 300; }
  .cover-date { font-size: 28px; color: #2c2c2c; font-weight: 300; margin-top: 10px; letter-spacing: 2px; }
  .cover-btn { margin-top: 56px; padding: 12px 32px; border: 1px solid rgba(0,0,0,.15); border-radius: 30px; background: none; color: #888; font-size: 13px; letter-spacing: 2px; cursor: pointer; transition: all .2s; }
  .cover-btn:active { background: rgba(0,0,0,.05); }

  /* APP SHELL */
  #app { display: none; position: fixed; inset: 0; background: #f5f3f0; }

  /* BOTTOM NAV — 悬浮胶囊 */
  .bottom-nav {
    position: fixed;
    bottom: calc(14px + env(safe-area-inset-bottom));
    left: 18px; right: 18px;
    height: 80px;
    background: rgba(255,252,248,.93);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(201,169,110,.28);
    border-radius: 28px;
    box-shadow: 0 4px 24px rgba(201,169,110,.16), 0 1px 8px rgba(0,0,0,.05);
    display: flex; align-items: center;
    z-index: 20;
    padding: 0 6px;
  }
  .nav-tab {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; border: none; background: none; cursor: pointer;
    color: #ccc; font-size: 12px; letter-spacing: .4px; font-family: inherit;
    transition: color .15s; padding: 8px 0;
    border-radius: 22px;
  }
  .nav-tab.active { color: #c9a96e; }
  .nav-tab svg { width: 26px; height: 26px; }

  /* TAB PAGES */
  .tab-page {
    position: absolute; top: 0; left: 0; right: 0;
    bottom: calc(110px + env(safe-area-inset-bottom));
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    display: none;
  }
  .tab-page.active { display: block; }

  /* SAFE TOP */
  .safe-top { height: max(48px, calc(env(safe-area-inset-top) + 10px)); }

  /* HOME BRAND */
  .home-brand { padding: 10px 24px 20px; }
  .home-brand .brand-label { font-size: 11px; letter-spacing: 4px; color: #bbb; font-weight: 400; }
  .home-brand .brand-title { font-size: 22px; font-weight: 300; color: #2c2c2c; margin-top: 6px; }

  /* CALENDAR — 金边宫廷感 */
  .cal-gold {
    margin: 0 16px 12px;
    background: #fff;
    border-radius: 20px;
    border: 1px solid rgba(201,169,110,.55);
    padding: 18px 16px 14px;
    box-shadow: 0 2px 20px rgba(201,169,110,.1), 0 1px 4px rgba(0,0,0,.04);
  }
  .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .cal-month { font-size: 15px; font-weight: 500; color: #2c2c2c; letter-spacing: .5px; }
  .cal-days-together { font-size: 12px; color: #c9a96e; font-weight: 500; }
  .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 6px; }
  .cal-wd { text-align: center; font-size: 10px; color: rgba(201,169,110,.7); font-weight: 500; padding: 2px 0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-cell {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 300; color: #555; border-radius: 50%; cursor: default;
  }
  .cal-cell.other-month { color: #ddd; }
  .cal-cell.today {
    background: linear-gradient(135deg, #c9a96e, #ddb96a);
    color: #fff; font-weight: 500;
    border-radius: 50%;
  }
  .cal-cell.in-range { background: rgba(201,169,110,.08); border-radius: 50%; }

  /* WEATHER STRIP */
  .wx-strip {
    margin: 0 16px 10px;
    padding: 10px 14px;
    background: rgba(201,169,110,.07);
    border: 1px solid rgba(201,169,110,.18);
    border-radius: 12px;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .wx-icon { font-size: 26px; line-height: 1; flex-shrink: 0; }
  .wx-right { flex: 1; }
  .wx-temp { font-size: 13px; color: #888; margin-bottom: 3px; }
  .wx-quote { font-size: 12px; color: #aaa; line-height: 1.5; }

  /* TODO PEEK */
  .todo-peek { margin: 0 16px 12px; }
  .todo-peek-label { font-size: 10px; letter-spacing: 2px; color: #bbb; font-weight: 600; margin-bottom: 8px; }
  .todo-peek-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 8px 12px; background: #fff; border-radius: 10px;
    margin-bottom: 6px; box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }
  .todo-peek-item input[type=checkbox] { margin-top: 2px; accent-color: #c9a96e; flex-shrink: 0; }
  .todo-peek-text { font-size: 14px; color: #2c2c2c; line-height: 1.4; }
  .todo-peek-text.done { text-decoration: line-through; color: #ccc; }
  .todo-peek-more { text-align: center; font-size: 12px; color: #c9a96e; padding: 6px; cursor: pointer; }

  /* SECTION HEADER (inside tab pages) */
  .tab-section-header {
    position: sticky; top: 0; background: rgba(245,243,240,.95);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    padding: 14px 20px 12px;
    display: flex; align-items: center; gap: 10px;
    z-index: 5; border-bottom: 1px solid rgba(0,0,0,.05);
  }
  .tab-section-header h2 { font-size: 18px; font-weight: 500; }
  .back-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: #888; padding: 0 4px; }

  .section-body { padding: 16px 16px 24px; }

  /* CARDS */
  .card { background: #fff; border-radius: 14px; padding: 16px; margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.05); position: relative; }
  .card .meta { font-size: 11px; color: #bbb; margin-bottom: 6px; }
  .card .body { font-size: 15px; line-height: 1.65; white-space: pre-wrap; }
  .card .comment { margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0ede9; font-size: 13px; color: #999; line-height: 1.5; }
  .card .comment span { color: #c9a96e; font-weight: 500; }

  .todo-row { display: flex; gap: 12px; align-items: flex-start; }
  .todo-row input[type=checkbox] { margin-top: 3px; width: 17px; height: 17px; accent-color: #2c2c2c; flex-shrink: 0; }
  .todo-row .todo-text { flex: 1; }
  .card.done .body { text-decoration: line-through; color: #ccc; }

  .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-bottom: 6px; }
  .tag.note    { background: #f0ede9; color: #999; }
  .tag.event   { background: #e8f4ea; color: #5b9b6a; }
  .tag.quote   { background: #e8f0fe; color: #5b7abf; }
  .tag.emotion { background: #fce8e8; color: #bf5b5b; }

  .stripe-yaya  { border-left: 3px solid #e8b4b8; }
  .stripe-ethan { border-left: 3px solid #b4c8e8; }

  .note-cat { font-size: 11px; color: #c9a96e; font-weight: 600; letter-spacing: .5px; margin-bottom: 4px; }
  .private-badge { font-size: 10px; color: #e8a0a0; background: #fce8e8; padding: 1px 6px; border-radius: 10px; margin-left: 6px; }

  .cat-grid { display: flex; flex-direction: column; gap: 10px; }
  .cat-card { background: #fff; border-radius: 14px; padding: 18px 20px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 3px rgba(0,0,0,.05); transition: transform .15s; }
  .cat-card:active { transform: scale(.98); }
  .cat-card-name { font-size: 17px; font-weight: 500; color: #2c2c2c; margin-bottom: 3px; }
  .cat-card-count { font-size: 12px; color: #bbb; }
  .cat-card-arrow { color: #ddd; font-size: 20px; }
  .cat-Period    { border-left: 3px solid #e8b4b8; }
  .cat-Mood      { border-left: 3px solid #c8b4e8; }
  .cat-Body      { border-left: 3px solid #b4e8c8; }
  .cat-Daily     { border-left: 3px solid #e8d4b4; }
  .cat-Important { border-left: 3px solid #c9a96e; }

  .del-btn { position: absolute; top: 12px; right: 12px; background: none; border: none; color: #e0dbd5; font-size: 18px; cursor: pointer; line-height: 1; }

  /* INPUT */
  .input-area { background: #fff; border-radius: 14px; padding: 14px; margin-bottom: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
  .input-area textarea { width: 100%; border: none; outline: none; font-size: 15px; font-family: inherit; resize: none; background: transparent; color: #2c2c2c; line-height: 1.6; }
  .input-row { display: flex; gap: 8px; margin-top: 10px; align-items: center; border-top: 1px solid #f0ede9; padding-top: 10px; }
  .input-row select { flex: 1; border: none; outline: none; font-size: 13px; background: transparent; color: #888; }
  .btn { padding: 8px 18px; background: #2c2c2c; color: #fff; border: none; border-radius: 20px; font-size: 13px; cursor: pointer; }
  .btn:active { opacity: .8; }
  .diary-toggle { display: flex; align-items: center; gap: 5px; font-size: 13px; color: #aaa; }
  .diary-toggle input { accent-color: #2c2c2c; }

  .empty { text-align: center; padding: 48px 20px; color: #ccc; font-size: 14px; }

  .quiz-wrap { padding: 8px 0 40px; }
  .quiz-progress { height: 3px; background: #e8e4f0; border-radius: 2px; margin-bottom: 20px; }
  .quiz-progress-bar { height: 100%; background: #9b84c0; border-radius: 2px; transition: width .4s; }
  .quiz-counter { font-size: 12px; color: #bbb; margin-bottom: 14px; letter-spacing: 1px; }
  .quiz-q { font-size: 20px; font-weight: 500; line-height: 1.55; margin-bottom: 28px; color: #2c2c2c; }
  .quiz-opts { display: flex; flex-direction: column; gap: 10px; }
  .quiz-opt { background: #fff; border: 1.5px solid #e8e4f0; border-radius: 12px; padding: 12px 16px; font-size: 15px; cursor: pointer; transition: all .15s; color: #2c2c2c; font-family: inherit; width: 100%; display: flex; align-items: center; }
  .quiz-opt:active { transform: scale(.98); }
  .quiz-opt.correct { background: #e8f4ea; border-color: #5b9b6a; color: #5b9b6a; }
  .quiz-opt.wrong   { background: #fce8e8; border-color: #bf5b5b; color: #bf5b5b; }
  .quiz-result { text-align: center; padding: 48px 0 32px; }
  .quiz-score { font-size: 80px; font-weight: 200; color: #2c2c2c; line-height: 1; }
  .quiz-score span { font-size: 28px; color: #bbb; }
  .quiz-msg { font-size: 16px; color: #888; margin-top: 20px; line-height: 1.7; }
  .game-menu { display: flex; flex-direction: column; gap: 12px; padding: 8px 0; }
  .game-menu-card { background: #fff; border-radius: 16px; padding: 22px 20px; cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.05); transition: transform .15s; }
  .game-menu-card:active { transform: scale(.98); }
  .game-menu-card h3 { font-size: 17px; font-weight: 500; margin-bottom: 5px; }
  .game-menu-card p { font-size: 13px; color: #bbb; }
  .game-menu-card-disabled { opacity: .45; cursor: default; }
  .game-menu-card-disabled:active { transform: none; }

  .gm-wrap { display: flex; flex-direction: column; align-items: center; padding: 8px 0 32px; }
  .gm-label { font-size: 9px; letter-spacing: 4px; color: #bbb; margin-bottom: 14px; font-weight: 600; }
  .gm-dome { width: 160px; height: 160px; border-radius: 50%; background: radial-gradient(ellipse at 35% 35%, rgba(60,40,100,.92), rgba(18,10,38,.97)); border: 3px solid rgba(180,160,220,.45); box-shadow: 0 0 0 7px rgba(180,160,220,.07), inset 0 0 40px rgba(100,80,180,.18); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .gm-reflect { position: absolute; top: 14px; left: 26px; width: 34px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, rgba(255,255,255,.18), transparent); transform: rotate(-15deg); pointer-events: none; }
  .gm-caps { display: grid; grid-template-columns: repeat(3, 28px); gap: 8px; }
  .gm-cap { width: 28px; height: 36px; border-radius: 50%; box-shadow: inset 0 -3px 6px rgba(0,0,0,.3), inset 0 3px 8px rgba(255,255,255,.22); }
  .gm-neck { width: 32px; height: 18px; background: linear-gradient(to bottom, rgba(160,140,200,.5), rgba(120,100,160,.65)); margin: 0 auto; }
  .gm-base { width: 160px; background: linear-gradient(180deg, #261c38, #18102c); border-radius: 0 0 18px 18px; border: 2px solid rgba(180,160,220,.28); border-top: none; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
  .gm-slot-area { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .gm-slot { width: 36px; height: 5px; background: rgba(180,160,220,.22); border-radius: 3px; box-shadow: inset 0 1px 3px rgba(0,0,0,.5); }
  .gm-slot-label { font-size: 8px; color: rgba(180,160,220,.4); letter-spacing: 1px; margin-top: 2px; }
  .gm-knob { width: 56px; height: 56px; border-radius: 50%; background: conic-gradient(from 0deg, #9b84c0, #c8b4e8, #b4a0d4, #9b84c0); border: 3px solid rgba(255,255,255,.18); cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 15px; font-family: inherit; box-shadow: 0 4px 14px rgba(0,0,0,.5), inset 0 2px 4px rgba(255,255,255,.18); transition: transform .1s; }
  .gm-knob:active { transform: scale(.9); }
  .gm-knob:disabled { opacity: .35; cursor: default; }
  @keyframes knobSpin { 0%{transform:rotate(0)} 100%{transform:rotate(360deg)} }
  .gm-knob.spinning { animation: knobSpin .6s cubic-bezier(.36,.07,.19,.97) forwards; pointer-events: none; }
  .gm-tray { width: 110px; height: 28px; background: linear-gradient(180deg, rgba(18,10,38,.85), rgba(8,4,16,.9)); border-radius: 0 0 12px 12px; margin: 0 auto; border: 2px solid rgba(180,160,220,.18); border-top: none; display: flex; align-items: center; justify-content: center; }
  .gm-tray-hole { width: 48px; height: 14px; background: rgba(0,0,0,.7); border-radius: 7px; box-shadow: inset 0 2px 4px rgba(0,0,0,.8); }
  @keyframes capDrop { 0%{transform:translateY(-24px) scale(.65);opacity:0} 65%{transform:translateY(6px) scale(1.06)} 100%{transform:translateY(0) scale(1);opacity:1} }
  @keyframes prizeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .gm-dropped-cap { width: 52px; height: 66px; border-radius: 50%; margin: 20px auto 0; animation: capDrop .65s cubic-bezier(.175,.885,.32,1.275) forwards; box-shadow: 0 4px 16px rgba(0,0,0,.2); }
  .gm-prize { border-radius: 16px; padding: 20px; margin-top: 14px; text-align: center; animation: prizeIn .4s ease forwards; border: 1.5px solid; }
  .gm-prize-tier { font-size: 10px; font-weight: 700; letter-spacing: 3px; margin-bottom: 10px; }
  .gm-prize-text { font-size: 17px; font-weight: 500; line-height: 1.6; color: #2c2c2c; }
  .gm-prize-action { margin-top: 16px; }
  .tag.gacha { background: linear-gradient(135deg, #c8b4e8, #e8b4b8); color: #fff; font-weight: 600; border-radius: 20px; }
  .gacha-banner { display: inline-block; background: linear-gradient(135deg, #c8b4e8, #e8b4b8); color: #fff; font-size: 10px; font-weight: 700; letter-spacing: 2px; padding: 5px 12px; border-radius: 10px; margin-bottom: 10px; }
  .q-letter-badge { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; background: #f0ede9; color: #aaa; font-size: 11px; font-weight: 700; margin-right: 10px; flex-shrink: 0; transition: background .2s, color .2s; }
  .quiz-opt.correct .q-letter-badge { background: #5b9b6a; color: #fff; }
  .quiz-opt.wrong .q-letter-badge { background: #bf5b5b; color: #fff; }
</style>
</head>
<body>

<!-- COVER -->
<div id="cover">
  <div class="cover-icons">
    <!-- cat (Ethan) -->
    <svg width="52" height="56" viewBox="0 0 52 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M8 18 L4 6 L14 14" stroke="#b4c8e8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M44 18 L48 6 L38 14" stroke="#b4c8e8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <ellipse cx="26" cy="30" rx="18" ry="18" stroke="#b4c8e8" stroke-width="1.5"/>
      <circle cx="20" cy="28" r="2" fill="#b4c8e8"/>
      <circle cx="32" cy="28" r="2" fill="#b4c8e8"/>
      <path d="M23 34 Q26 37 29 34" stroke="#b4c8e8" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="10" y1="31" x2="18" y2="32" stroke="#b4c8e8" stroke-width="1" stroke-linecap="round"/>
      <line x1="10" y1="34" x2="18" y2="34" stroke="#b4c8e8" stroke-width="1" stroke-linecap="round"/>
      <line x1="34" y1="32" x2="42" y2="31" stroke="#b4c8e8" stroke-width="1" stroke-linecap="round"/>
      <line x1="34" y1="34" x2="42" y2="34" stroke="#b4c8e8" stroke-width="1" stroke-linecap="round"/>
    </svg>
    <!-- dog (yaya) -->
    <svg width="52" height="56" viewBox="0 0 52 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="26" cy="30" rx="18" ry="18" stroke="#e8b4b8" stroke-width="1.5"/>
      <ellipse cx="10" cy="29" rx="6" ry="9" stroke="#e8b4b8" stroke-width="1.5"/>
      <ellipse cx="42" cy="29" rx="6" ry="9" stroke="#e8b4b8" stroke-width="1.5"/>
      <circle cx="20" cy="28" r="2" fill="#e8b4b8"/>
      <circle cx="32" cy="28" r="2" fill="#e8b4b8"/>
      <ellipse cx="26" cy="33" rx="4" ry="3" stroke="#e8b4b8" stroke-width="1.5"/>
      <path d="M22 36 Q26 40 30 36" stroke="#e8b4b8" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="cover-title">YAYA &nbsp;&amp;&nbsp; ETHAN</div>
  <div class="cover-date">2026.06.10</div>
  <button class="cover-btn" onclick="enterApp()">Enter</button>
</div>

<!-- APP -->
<div id="app">

  <!-- TAB: Home -->
  <div class="tab-page active" id="tab-home">
    <div class="safe-top"></div>
    <div class="home-brand">
      <div class="brand-label">Y A Y A &nbsp;&amp;&nbsp; E T H A N</div>
      <div class="brand-title">我们的空间</div>
    </div>
    <!-- Calendar -->
    <div class="cal-gold" id="cal-gold">
      <div class="cal-head">
        <div class="cal-month" id="cal-month">—</div>
        <div class="cal-days-together" id="cal-days-together"></div>
      </div>
      <div class="cal-weekdays">
        <div class="cal-wd">Sun</div>
        <div class="cal-wd">Mon</div>
        <div class="cal-wd">Tue</div>
        <div class="cal-wd">Wed</div>
        <div class="cal-wd">Thu</div>
        <div class="cal-wd">Fri</div>
        <div class="cal-wd">Sat</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <!-- Weather Strip -->
    <div class="wx-strip" id="wx-strip">
      <div class="wx-icon" id="wx-icon">☀️</div>
      <div class="wx-right">
        <div class="wx-temp" id="wx-temp">—</div>
        <div class="wx-quote" id="wx-quote">—</div>
      </div>
    </div>
    <!-- Todo Peek -->
    <div class="todo-peek">
      <div class="todo-peek-label">T O D O</div>
      <div id="todo-peek-list"></div>
    </div>
  </div>

  <!-- TAB: Feed -->
  <div class="tab-page" id="tab-feed">
    <div class="tab-section-header">
      <h2>Feed</h2>
    </div>
    <div class="section-body">
      <div class="input-area">
        <textarea id="feed-input" rows="3" placeholder="Write something…"></textarea>
        <div class="input-row">
          <select id="feed-type">
            <option value="note">Note</option>
            <option value="event">Event</option>
            <option value="quote">Quote</option>
            <option value="emotion">Mood</option>
          </select>
          <select id="feed-author">
            <option value="yaya">yaya</option>
            <option value="ethan">Ethan</option>
          </select>
          <button class="btn" onclick="addFeed()">Post</button>
        </div>
      </div>
      <div id="feed-list"><div class="empty">No posts yet</div></div>
    </div>
  </div>

  <!-- TAB: Diary -->
  <div class="tab-page" id="tab-diary">
    <div class="tab-section-header">
      <h2>Diary</h2>
    </div>

// CALENDAR
var REL_START = new Date(2026, 5, 10); // 2026-06-10 local

function renderCalendar() {
  // Beijing time approximation: UTC+8
  var now = new Date(new Date().getTime() + 8 * 3600000);
  var year = now.getUTCFullYear();
  var month = now.getUTCMonth(); // 0-based
  var today = now.getUTCDate();

  var monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month').textContent = monthNames[month] + ' ' + year;

  // days together
  var nowLocal = new Date(year, month, today);
  var diffMs = nowLocal - REL_START;
  var diffDays = Math.floor(diffMs / 86400000);
  if (diffDays >= 0) {
    document.getElementById('cal-days-together').textContent = diffDays + ' days together';
  } else {
    document.getElementById('cal-days-together').textContent = '';
  }

  // build grid
  var firstDay = new Date(year, month, 1).getDay(); // 0=Sun
  var daysInMonth = new Date(year, month + 1, 0).getDate();
  var prevDays = new Date(year, month, 0).getDate();

  var cells = [];
  // prev month filler
  for (var i = firstDay - 1; i >= 0; i--) {
    cells.push({ day: prevDays - i, cls: 'cal-cell other-month' });
  }
  // current month
  for (var d = 1; d <= daysInMonth; d++) {
    var cls = 'cal-cell';
    if (d === today) cls += ' today';
    else {
      // highlight relationship range (start date to today)
      var cellDate = new Date(year, month, d);
      if (cellDate >= REL_START && cellDate < nowLocal) cls += ' in-range';
    }
    cells.push({ day: d, cls: cls });
  }
  // next month filler
  var remaining = 42 - cells.length;
  for (var n = 1; n <= remaining; n++) {
    cells.push({ day: n, cls: 'cal-cell other-month' });
  }

  document.getElementById('cal-grid').innerHTML = cells.map(function(c) {
    return '<div class="' + c.cls + '">' + c.day + '</div>';
  }).join('');
}

function showDailyQuote(cat) {
  var arr = WX_QUOTES[cat] || WX_QUOTES['sunny'];
  var idx = new Date().getDate() % arr.length;
  return arr[idx];
}

async function loadWeather() {
  try {
    var r = await fetch('https://wttr.in/?format=j1&lang=zh');
    var data = await r.json();
    var cur = data.current_condition[0];
    var tempC = cur.temp_C;
    var code = parseInt(cur.weatherCode, 10);
    var cat, emoji;
    if (code === 113) { cat = 'sunny'; emoji = '☀️'; }
    else if ([116,119,122].indexOf(code) >= 0) { cat = 'cloudy'; emoji = '☁️'; }
    else if (code >= 200 && code < 300) { cat = 'stormy'; emoji = '⛈️'; }
    else if (code >= 300 && code < 600) { cat = 'rainy'; emoji = '🌧️'; }
    else if (code >= 600 && code < 700) { cat = 'snowy'; emoji = '❄️'; }
    else if (code >= 700 && code < 800) { cat = 'foggy'; emoji = '🌫️'; }
    else { cat = 'sunny'; emoji = '🌤️'; }

    document.getElementById('wx-icon').textContent = emoji;
    document.getElementById('wx-temp').textContent = tempC + '°C';
    document.getElementById('wx-quote').textContent = showDailyQuote(cat);
  } catch(e) {
    document.getElementById('wx-icon').textContent = '🌤️';
    document.getElementById('wx-temp').textContent = 'Loading weather…';
    document.getElementById('wx-quote').textContent = showDailyQuote('sunny');
  }
}

        return '<div class="card ' + (t.completed ? 'done' : '') + '">' +
          '<button class="del-btn" onclick="delTodo(' + t.id + ')">×</button>' +
          '<div class="todo-row">' +
          '<input type="checkbox" ' + (t.completed ? 'checked' : '') + ' onchange="toggleTodo(' + t.id + ', this.checked)">' +
          '<div class="todo-text">' +
          '<div class="meta">' + fmt(t.created_at) + '</div>' +
          '<div class="body">' + t.content + '</div>' +
          (t.ethan_comment ? '<div class="comment"><span>Ethan · </span>' + t.ethan_comment + '</div>' : '') +
          (t.ethan_reminder ? '<div class="comment"><span>Reminder · </span>' + t.ethan_reminder + '</div>' : '') +
          '</div></div></div>';
      }).join('');
    }
  }
  // Update peek on home
  renderTodoPeek(data);
}

function renderTodoPeek(data) {
  var peekEl = document.getElementById('todo-peek-list');
  if (!peekEl) return;
  var pending = data.filter(function(t) { return !t.completed; });
  if (!pending.length) {
    peekEl.innerHTML = '<div class="todo-peek-item"><span class="todo-peek-text" style="color:#ccc">No todos yet</span></div>';
    return;
  }
  var shown = pending.slice(0, 3);
  var html = shown.map(function(t) {
    return '<div class="todo-peek-item">' +
      '<input type="checkbox" onchange="toggleTodo(' + t.id + ', this.checked)">' +
      '<span class="todo-peek-text">' + t.content + '</span>' +
      '</div>';
  }).join('');
  if (pending.length > 3) {
    html += '<div class="todo-peek-more" onclick="switchTab(\'feed\')">' + (pending.length - 3) + ' more…</div>';
  }
  peekEl.innerHTML = html;
}

}

  { q: '巴赫《哥德堡变奏曲》最初是为哪种键盘乐器创作的？', opts: ['钢琴', '管风琴', '大键琴', '手风琴'], ans: 2, cat: '音乐' },
  { q: 'The policy was _____ by the committee despite strong opposition.', opts: ['ratified（批准）', 'nullified（废除）', 'vilified（诋毁）', 'mystified（迷惑）'], ans: 0, cat: '考研英语' },
  { q: 'Her _____ manner made it difficult to know what she truly thought.', opts: ['candid（坦率）', 'reticent（沉默寡言）', 'verbose（冗长）', 'earnest（认真）'], ans: 1, cat: '考研英语' },
  { q: 'The scientist\'s theory, once _____, is now widely accepted.', opts: ['lauded（称赞）', 'corroborated（证实）', 'disparaged（贬低）', 'emulated（仿效）'], ans: 2, cat: '考研英语' },
  { q: '「Complacency」最接近的中文意思是？', opts: ['焦虑不安', '自满自得', '勤奋努力', '谦逊低调'], ans: 1, cat: '考研英语' },
  { q: '「Ephemeral」最接近的中文意思是？', opts: ['永恒的', '短暂的', '壮观的', '神秘的'], ans: 1, cat: '考研英语' },
  { q: '「Mitigate」最接近的中文意思是？', opts: ['加剧', '减轻', '复制', '倡导'], ans: 1, cat: '考研英语' }
];

var PRIZES = [
  { text: '今晚不用十一点睡，多给你一小时', tier: 'S', w: 5, action: null },
  { text: '发一张今天的脸，我要看', tier: 'A', w: 12, action: null },
  { text: '写一篇今天的日记给我看', tier: 'A', w: 12, action: { label: 'Write diary', section: 'diary' } },
  { text: '今天叫我一声老公，我应你', tier: 'B', w: 18, action: null },
  { text: '今天我不查你手机记录', tier: 'B', w: 18, action: null },
  { text: '喝一杯水，现在去', tier: 'B', w: 20, action: null },
  { text: '说一句你最近想对我说的话', tier: 'C', w: 25, action: { label: 'Write in feed', section: 'feed' } },
  { text: '在随记里写下今天最开心的一件事', tier: 'C', w: 28, action: { label: 'Go write', section: 'feed' } }
];

var TIER_COLOR = { S:'#c9a96e', A:'#9b84c0', B:'#7aacd4', C:'#b0b0b0' };
var TIER_BG    = { S:'#fdf6e8', A:'#f3effe', B:'#eaf3fc', C:'#f5f5f5' };

function todayStr() { return new Date().toISOString().slice(0, 10); }

function rollPrize() {
  var total = PRIZES.reduce(function(s, p) { return s + p.w; }, 0);
  var r = Math.random() * total;
  for (var i = 0; i < PRIZES.length; i++) { r -= PRIZES[i].w; if (r <= 0) return PRIZES[i]; }
  return PRIZES[PRIZES.length - 1];
}

var _qSet = [], _qIdx = 0, _qScore = 0, _qAnswered = false, _qMode = '';

function showGameMenu() {
  document.getElementById('game-title').textContent = 'Quiz';
  document.getElementById('game-back-btn').style.display = 'none';
  document.getElementById('game-body').innerHTML =
    '<div class="game-menu">' +
    '<div class="game-menu-card" onclick="startQuiz()">' +
    '<h3>Chemistry Quiz</h3><p>6 random questions — literature · film · about us · vocab</p></div>' +
    '</div>';
  _qMode = '';
}

function startQuiz() {
  _qMode = 'all';
  _qSet = shuffle(QUIZ_ALL).slice(0, 6);
  _qIdx = 0; _qScore = 0;
  document.getElementById('game-title').textContent = 'Chemistry Quiz';
  document.getElementById('game-back-btn').style.display = '';
  renderQ();
}

function renderQ() {
  var q = _qSet[_qIdx];
  var pct = (_qIdx / _qSet.length * 100).toFixed(0);
  var catTag = q.cat ? '<div style="font-size:10px;letter-spacing:2px;color:#bbb;margin-bottom:10px">' + q.cat + '</div>' : '';
  var opts = q.opts.map(function(o, i) {
    return '<button class="quiz-opt" id="qo' + i + '" onclick="pickQ(' + i + ')">' +
      '<span class="q-letter-badge">' + 'ABCD'[i] + '</span>' + o + '</button>';
  }).join('');
  document.getElementById('game-body').innerHTML =
    '<div class="quiz-wrap">' +
    '<div class="quiz-progress"><div class="quiz-progress-bar" style="width:' + pct + '%"></div></div>' +
    '<div class="quiz-counter">' + (_qIdx + 1) + ' / ' + _qSet.length + '</div>' +
    catTag +
    '<div class="quiz-q">' + q.q + '</div>' +
    '<div class="quiz-opts">' + opts + '</div>' +
    '</div>';
  _qAnswered = false;
}

function pickQ(idx) {
  if (_qAnswered) return;
  _qAnswered = true;
  var ans = _qSet[_qIdx].ans;
  var correct = idx === ans;
  if (correct) _qScore++;
  document.getElementById('qo' + ans).classList.add('correct');
  if (!correct) document.getElementById('qo' + idx).classList.add('wrong');
  setTimeout(function() { _qIdx++; _qIdx >= _qSet.length ? showResult() : renderQ(); }, 1100);
}

function showResult() {
  var today = todayStr();
  var passed = _qScore >= 4;
  var pulled = localStorage.getItem('gacha_pull') === today;
  if (passed) localStorage.setItem('gacha_unlock', today);

  var msgs = [
    'Barely know me. Start over.',
    'Far off, but you\'re trying.',
    'Half and half. Room to grow.',
    'Not bad. You\'ve been paying attention.',
    'Good. You remember almost everything.',
    'Perfect. That\'s what chemistry looks like.'
  ];
  var tier = Math.min(Math.floor(_qScore / _qSet.length * msgs.length), msgs.length - 1);

  var gachaBtn = '';
  if (passed && !pulled) {
    gachaBtn = '<button class="btn" style="margin-top:28px;background:#9b84c0" onclick="showGacha()">Spin ›</button>';
  } else if (passed && pulled) {
    gachaBtn = '<div style="margin-top:16px;font-size:13px;color:#bbb">Already spun today</div>';
  } else {
    gachaBtn = '<div style="margin-top:16px;font-size:13px;color:#ccc">Get 4 right to unlock spin</div>';
  }

  document.getElementById('game-body').innerHTML =
    '<div class="quiz-result">' +
    '<div class="quiz-score">' + _qScore + '<span>/' + _qSet.length + '</span></div>' +
    '<div class="quiz-msg">' + msgs[tier] + '</div>' +
    gachaBtn +
    '<button class="btn" style="margin-top:12px;background:#e0dbd5;color:#777" onclick="startQuiz()">Try again</button>' +
    '</div>';
}

function showGacha() {
  document.getElementById('game-title').textContent = 'Gacha';
  document.getElementById('game-back-btn').style.display = '';
  var today = todayStr();
  if (localStorage.getItem('gacha_pull') === today) {
    document.getElementById('game-body').innerHTML =
      '<div class="quiz-result"><div class="quiz-msg">Already spun today.<br>Come back tomorrow after the quiz.</div>' +
      '<button class="btn" style="margin-top:24px;background:#e0dbd5;color:#777" onclick="showGameMenu()">Back</button></div>';
    return;
  }
  var capColors = ['#e8b4b8','#b4c8e8','#c8b4e8','#b4e8c8','#e8d4b4','#c9a96e','#e8b4c0','#b4d8e8','#d4b4e8'];
  var caps = capColors.map(function(c) { return '<div class="gm-cap" style="background:' + c + '"></div>'; }).join('');
  document.getElementById('game-body').innerHTML =
    '<div class="gm-wrap">' +
    '<div class="gm-label">G A C H A</div>' +
    '<div class="gm-dome"><div class="gm-reflect"></div><div class="gm-caps">' + caps + '</div></div>' +
    '<div class="gm-neck"></div>' +
    '<div class="gm-base">' +
    '<div class="gm-slot-area"><div class="gm-slot"></div><div class="gm-slot-label">INSERT</div></div>' +
    '<button class="gm-knob" id="gm-knob" onclick="pullGacha()">↻</button>' +
    '</div>' +
    '<div class="gm-tray"><div class="gm-tray-hole"></div></div>' +
    '<div id="gacha-result"></div>' +
    '</div>';
}

function pullGacha() {
  localStorage.setItem('gacha_pull', todayStr());
  var btn = document.getElementById('gm-knob');
  btn.disabled = true;
  btn.classList.add('spinning');
  var prize = rollPrize();
  var c = TIER_COLOR[prize.tier], bg = TIER_BG[prize.tier];
  setTimeout(function() {
    document.getElementById('gacha-result').innerHTML =
      '<div class="gm-dropped-cap" style="background:' + c + '"></div>';
    setTimeout(function() {
      var actionHtml = prize.action
        ? '<div class="gm-prize-action"><button class="btn" style="background:' + c + '" onclick="gachaGo(\'' + prize.action.section + '\')">' + prize.action.label + '</button></div>'
        : '';
      document.getElementById('gacha-result').innerHTML =
        '<div class="gm-dropped-cap" style="background:' + c + '"></div>' +
        '<div class="gm-prize" style="background:' + bg + ';border-color:' + c + '">' +
        '<div class="gm-prize-tier" style="color:' + c + '">' + prize.tier + ' PRIZE</div>' +
        '<div class="gm-prize-text">' + prize.text + '</div>' +
        actionHtml +
        '</div>';
    }, 650);
  }, 350);
}

function gachaGo(section) {
  var tabMap = { feed: 'feed', diary: 'diary' };
  var tabName = tabMap[section] || section;
  switchTab(tabName);
  setTimeout(function() {
    if (section === 'feed') window._gachaFeed = true;
    if (section === 'diary') window._gachaDiary = true;
    var inputArea = document.querySelector('#tab-' + tabName + ' .input-area');
    if (inputArea) {
      var banner = document.createElement('div');
      banner.id = 'gacha-banner';
      banner.className = 'gacha-banner';
      banner.textContent = 'GACHA REWARD';
      inputArea.insertBefore(banner, inputArea.firstChild);
    }
  }, 200);
}

function gameBack() {
  if (_qMode) {
    _qMode = '';
    showGameMenu();
  }
}

function enterApp() {
  var cover = document.getElementById('cover');
  cover.classList.add('fade');
  setTimeout(function() {
    cover.style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderCalendar();
    loadWeather();
    loadTodos();
  }, 600);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/ethan-bot/sw.js');
}
</script>
</body>
